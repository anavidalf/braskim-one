<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestão Logística · Braskim</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ============================================================
   GESTÃO LOGÍSTICA — Design System herdado do PPCP Braskim
   Tema claro corporativo · Barlow Condensed + Inter · azul b*
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --b50:#eef4fb;--b100:#d8e6f5;--b200:#aecbe8;--b300:#7ea9d7;--b400:#4f84c4;
  --b500:#2f67ac;--b600:#255491;--b700:#1c4276;--b800:#16345d;--b900:#0f2543;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e6ebf1;--g300:#cfd6e0;--g400:#9aa6b6;
  --g500:#6b7789;--g600:#4d5766;--g700:#374150;--g800:#232b38;--g900:#141a24;
  --ok:#15803d;--ok-bg:#dcfce7;--warn:#b45309;--warn-bg:#fef3c7;
  --danger:#b91c1c;--danger-bg:#fee2e2;--info:#1d4ed8;--info-bg:#dbeafe;
  --line:#e6ebf1;--card:#ffffff;--bg:#f4f6f9;
}
html,body,#root{height:100%}
body{font-family:'Inter',system-ui,sans-serif;color:var(--g800);background:var(--bg);-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.title{font-family:'Barlow Condensed','Inter',sans-serif;letter-spacing:.01em}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0}
.content{flex:1;overflow-y:auto}
.page-wrap{padding:22px 26px;display:flex;flex-direction:column;gap:18px}

/* Sidebar */
.sb{width:232px;flex-shrink:0;background:var(--b800);color:#dbe6f2;display:flex;flex-direction:column}
.sb-brand{display:flex;align-items:center;gap:11px;padding:16px 18px;border-bottom:1px solid #ffffff14}
.sb-logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--b400),var(--b600));
  display:grid;place-items:center;color:#fff;box-shadow:0 2px 8px #0003}
.sb-name{font-family:'Barlow Condensed';font-weight:700;font-size:18px;color:#fff;line-height:1}
.sb-sub{font-size:11px;color:#9db6d1;margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.sb-nav{flex:1;overflow-y:auto;padding:10px 12px}
.sb-nav::-webkit-scrollbar{width:6px}.sb-nav::-webkit-scrollbar-thumb{background:#ffffff22;border-radius:6px}
.sb-group{margin-bottom:4px}
.sb-group-hd{display:flex;align-items:center;gap:6px;width:100%;background:none;border:none;cursor:pointer;
  color:#8fabca;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  padding:10px 10px 6px;font-family:inherit}
.sb-group-hd svg{margin-left:auto;transition:.2s}
.sb-group-hd.collapsed svg{transform:rotate(-90deg)}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:8px 11px;border:none;background:none;
  border-radius:8px;color:#c4d4e6;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;
  transition:.12s;margin-bottom:1px;text-align:left}
.nav-item:hover{background:#ffffff12;color:#fff}
.nav-item.active{background:var(--b600);color:#fff;font-weight:600;box-shadow:0 1px 4px #0003}
.nav-item.soon{color:#7791b0;cursor:default}
.nav-item.soon:hover{background:none;color:#7791b0}
.nav-soon{margin-left:auto;font-size:8.5px;background:#ffffff14;color:#9db6d1;padding:2px 6px;border-radius:5px;font-weight:600}
.sb-foot{padding:12px 16px;border-top:1px solid #ffffff14;display:flex;align-items:center;gap:10px}
.sb-ava{width:32px;height:32px;border-radius:9px;background:var(--b500);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700}
.sb-foot-n{font-size:13px;font-weight:600;color:#fff}
.sb-foot-r{font-size:11px;color:#9db6d1}

/* Topbar */
.tb{height:52px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;
  padding:0 24px;gap:14px;flex-shrink:0}
.tb-bc{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--g500)}
.tb-appname{font-weight:600;color:var(--g700)}
.tb-sep{color:var(--g300)}
.tb-page{font-family:'Barlow Condensed';font-weight:600;font-size:16px;color:var(--g900);letter-spacing:.01em}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.role-pill{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--b700);
  background:var(--b50);border:1px solid var(--b100);padding:5px 11px;border-radius:20px}
.role-dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}

/* Card */
.card{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:hidden}
.card-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
.card-title{font-family:'Barlow Condensed';font-weight:700;font-size:16px;color:var(--g900);letter-spacing:.01em}
.card-title-sub{font-size:12px;color:var(--g500);font-weight:400;margin-left:auto}
.card-body{padding:18px}

/* Page head */
.page-head{display:flex;align-items:flex-end;gap:14px}
.page-title{font-family:'Barlow Condensed';font-weight:700;font-size:26px;color:var(--g900);line-height:1;display:flex;align-items:center;gap:11px}
.page-title .pcount{font-family:'Inter';font-size:12px;font-weight:600;color:var(--g500);background:var(--g100);padding:3px 10px;border-radius:20px}
.page-sub{font-size:13px;color:var(--g500);margin-top:5px}
.page-head-actions{margin-left:auto;display:flex;align-items:center;gap:10px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 15px;border-radius:9px;font-size:13px;
  font-weight:600;cursor:pointer;border:1px solid transparent;font-family:'Inter';transition:.15s}
.btn-primary{background:var(--b600);color:#fff;box-shadow:0 2px 8px #25549133}
.btn-primary:hover{background:var(--b700)}
.btn-primary:disabled{opacity:.65;cursor:default}
.btn-secondary{background:var(--b50);color:var(--b700);border-color:var(--b100)}
.btn-secondary:hover{background:var(--b100)}
.btn-ghost{background:var(--card);border-color:var(--line);color:var(--g700)}
.btn-ghost:hover{background:var(--g50)}
.btn-sm{height:32px;padding:0 11px;font-size:12px}

/* KPI */
.kpi-grid{display:grid;gap:13px}
.kpi-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;display:flex;gap:13px;align-items:center}
.kpi-ico{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex-shrink:0}
.kpi-ico.info{background:var(--info-bg);color:var(--info)}
.kpi-ico.ok{background:var(--ok-bg);color:var(--ok)}
.kpi-ico.warn{background:var(--warn-bg);color:var(--warn)}
.kpi-ico.danger{background:var(--danger-bg);color:var(--danger)}
.kpi-ico.b{background:var(--b50);color:var(--b600)}
.kpi-val{font-family:'Barlow Condensed';font-weight:700;font-size:27px;line-height:1;color:var(--g900)}
.kpi-lbl{font-size:11.5px;color:var(--g500);margin-top:3px;font-weight:500}

/* Alert */
.alert-banner{display:flex;align-items:center;gap:11px;padding:12px 16px;border-radius:11px;font-size:13px;font-weight:500}
.alert-warn{background:var(--warn-bg);color:#92400e;border:1px solid #fde68a}
.alert-warn svg{color:var(--warn);flex-shrink:0}
.alert-banner .btn{margin-left:auto}

/* Badge */
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
.badge-neutral{background:var(--g100);color:var(--g600)}
.badge-ok{background:var(--ok-bg);color:var(--ok)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}

/* Table */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:auto}
.tbl thead th{text-align:center;font-size:9.5px;font-weight:700;color:var(--g400);text-transform:uppercase;
  letter-spacing:.03em;padding:9px 8px;border-bottom:1px solid var(--line);background:var(--g50);white-space:nowrap}
.tbl th.num,.tbl td.num{text-align:center}
.tbl tbody td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:middle;text-align:center;font-size:12px;word-break:break-word;overflow-wrap:anywhere}
.tbl td.num{white-space:nowrap}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--g50)}
.t-strong{font-weight:600;color:var(--g900)}
.t-dim{color:var(--g500)}
.pill{font-size:11px;font-weight:600;background:var(--g100);border:1px solid var(--line);padding:2px 9px;border-radius:6px}
.cat-pill{font-size:11px;font-weight:600;color:var(--b700);background:var(--b50);padding:2px 8px;border-radius:6px}
.cub-pill{font-weight:700;color:#0f766e;background:#ecfdf5;padding:3px 9px;border-radius:6px;font-size:12.5px}
.driver-cell{display:flex;align-items:center;gap:10px;justify-content:center}
.driver-ava{width:28px;height:28px;border-radius:8px;background:var(--g200);color:var(--g600);display:grid;place-items:center;font-size:10.5px;font-weight:700;flex-shrink:0}
.row-act{display:flex;gap:4px;justify-content:center}
.row-act button{width:30px;height:30px;border-radius:7px;border:none;background:none;color:var(--g400);cursor:pointer;display:grid;place-items:center;transition:.12s}
.row-act button:hover{background:var(--g100);color:var(--g700)}
.row-act .del:hover{background:var(--danger-bg);color:var(--danger)}
.tbl-empty{text-align:center;padding:44px;color:var(--g400)}
.tbl-empty p{margin-top:9px;font-size:13px}

/* Search */
.search{display:flex;align-items:center;gap:8px;background:var(--g50);border:1px solid var(--line);border-radius:9px;padding:0 12px;height:38px;color:var(--g400)}
.search input{border:none;background:none;outline:none;font-family:inherit;font-size:13px;width:150px;color:var(--g800)}

/* Info strip */
.info-strip{display:flex;gap:10px;align-items:flex-start;background:var(--b50);border:1px solid var(--b100);color:var(--b800);
  padding:12px 15px;border-radius:11px;font-size:12.5px;line-height:1.5}
.info-strip svg{flex-shrink:0;margin-top:1px;color:var(--b600)}
.info-strip b{font-weight:700}

/* ---------- Roteirização ---------- */
.rz{display:flex;height:100%;min-height:0}
.rz-panel{width:468px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column}
.rz-panel::-webkit-scrollbar{width:8px}.rz-panel::-webkit-scrollbar-thumb{background:var(--g200);border-radius:8px}
.rz-ptop{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:3}
.rz-ptop .btn{margin-left:auto}
.rz-ptitle{font-family:'Barlow Condensed';font-weight:700;font-size:17px;color:var(--g900)}
.rz-ptitle span{font-size:12px;color:var(--g500);font-weight:400;font-family:'Inter';margin-left:7px}
.rz-strip{display:flex;gap:0;border-bottom:1px solid var(--line)}
.rz-strip>div{flex:1;padding:11px 14px;text-align:center;border-right:1px solid var(--line)}
.rz-strip>div:last-child{border-right:none}
.rz-strip-v{font-family:'Barlow Condensed';font-weight:700;font-size:19px;color:var(--g900)}
.rz-strip-l{font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.rz-sec{display:flex;align-items:center;gap:8px;padding:13px 18px 8px}
.rz-sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--g500)}
.rz-sec-c{margin-left:auto;font-size:11px;color:var(--g500);background:var(--g100);padding:2px 8px;border-radius:20px}
.rz-pool{padding:0 12px 8px;display:flex;flex-direction:column;gap:2px}
.rz-poolrow{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:9px;transition:.12s}
.rz-poolrow.hov{background:var(--g50)}
.rz-poolrow-m{flex:1;min-width:0}
.rz-poolrow-t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rz-poolrow-s{font-size:11px;color:var(--g500);margin-top:1px}
.rz-poolmeta{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--g600)}
.type-ico{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.type-ico.ent{background:var(--b50);color:var(--b600)}
.type-ico.col{background:#ecfdf5;color:#059669}
.rz-hint{margin:14px 16px;font-size:11.5px;line-height:1.5;color:var(--g500);background:var(--g50);padding:12px 13px;border-radius:10px;border:1px solid var(--line)}
.rz-hint b{color:var(--g800)}
.rz-routes{padding:0 12px 4px;display:flex;flex-direction:column;gap:9px}
.rz-route{border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.rz-route::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c)}
.rz-route:hover{border-color:var(--g300)}
.rz-route.sel{border-color:var(--c);box-shadow:0 3px 14px #0000001a}
.rz-route.hid{opacity:.5}
.rz-rhead{display:flex;align-items:center;gap:9px}
.rz-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rz-rid{flex:1;min-width:0}
.rz-rname{font-family:'Barlow Condensed';font-weight:700;font-size:15px;color:var(--g900)}
.rz-rveic{font-size:11px;color:var(--g500);display:flex;align-items:center;gap:4px;margin-top:1px}
.rz-rkpi{display:flex;flex-direction:column;align-items:flex-end;line-height:1.3}
.rz-rkpi b{font-size:13px;font-weight:700}
.rz-rkpi span{font-size:10.5px;color:var(--g500)}
.ico-btn{width:28px;height:28px;border-radius:7px;border:none;background:transparent;color:var(--g400);cursor:pointer;display:grid;place-items:center;transition:.12s}
.ico-btn:hover{background:var(--g100);color:var(--g700)}
.ico-btn.open svg{transform:rotate(180deg);transition:.2s}
.rz-rdriver{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g600);margin-top:8px}
.rz-rcost{margin-left:auto;font-weight:700;color:var(--g900)}
.rz-caps{display:flex;gap:12px;margin-top:11px}
.cap{flex:1}
.cap-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.cap-l{font-size:10px;color:var(--g500);text-transform:uppercase}
.cap-v{font-size:11px;font-weight:700}.cap-v em{font-style:normal;color:var(--g400);font-weight:500}
.cap-track{height:4px;background:var(--g100);border-radius:3px;overflow:hidden}
.cap-fill{height:100%;background:var(--g400);border-radius:3px;transition:width .5s}
.cap-fill.warn{background:var(--warn)}
.rz-stops{margin-top:12px;padding-top:11px;border-top:1px dashed var(--line);position:relative}
.rz-stop{display:flex;align-items:center;gap:9px;padding:5px 4px;border-radius:8px;transition:.12s}
.rz-stop[draggable=true]{cursor:grab}.rz-stop[draggable=true]:active{cursor:grabbing}
.rz-stop.hov{background:var(--g50)}
.grip{color:var(--g300);flex-shrink:0}
.rz-stop-n{width:20px;height:20px;border-radius:50%;border:1.6px solid;display:grid;place-items:center;font-size:10.5px;font-weight:700;flex-shrink:0;background:#fff;font-variant-numeric:tabular-nums}
.rz-stop-m{flex:1;min-width:0}
.rz-stop-t{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rz-stop-s{font-size:10.5px;color:var(--g500);margin-top:1px}
.mini-badge{font-size:8.5px;font-weight:700;padding:1.5px 5px;border-radius:4px;text-transform:uppercase;flex-shrink:0}
.mini-badge.ent{background:var(--b50);color:var(--b600)}
.mini-badge.col{background:#ecfdf5;color:#059669}
.rz-stop-depot{opacity:.75}
.rz-stop-dico{width:20px;height:20px;border-radius:50%;border:1.6px dashed;display:grid;place-items:center;background:#fff;flex-shrink:0}
.rz-stop-td{font-weight:600;color:var(--g600);font-size:11.5px}
.rz-total{display:flex;align-items:center;gap:7px;margin-top:9px;padding:9px 11px;border-radius:8px;background:var(--b50);font-size:11.5px;font-weight:600;color:var(--b800)}
.rz-total b{margin-left:auto;font-family:'Barlow Condensed';font-size:15px}
.rz-total svg{color:var(--b500)}
.rz-mapwrap{flex:1;position:relative;min-width:0;overflow:hidden;background:#e9eef4}
.rz-leaflet{position:absolute;inset:0;z-index:1;background:#e9eef4}
.rz-leaflet .leaflet-container{font:inherit}
.mk{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:700;color:#fff;border:2px solid #fff;box-shadow:0 1px 4px #0003;font-family:'Barlow Condensed',sans-serif}
.mk-depot{width:30px;height:30px;border-radius:7px;background:#16345d;font-size:11px;letter-spacing:.02em}
.mk-ent{background:var(--b600)}
.mk-col{background:#c98a1e}
.mk.off{opacity:.5;filter:grayscale(.35)}
.mk.on{opacity:1}
.mk.hl{transform:scale(1.22);box-shadow:0 0 0 4px #2f67ac33,0 2px 6px #0004;z-index:5}
.legend,.detail,.opt-overlay{z-index:1100}
.leaflet-control-zoom a{border-radius:6px !important}
.rz-map{width:100%;height:100%;display:block}
.maplbl{fill:var(--g600);font-size:11px;font-weight:600;font-family:'Inter'}
.maplbl-hl{fill:var(--g900);font-size:12px}
.rz-path{stroke-dasharray:2600;stroke-dashoffset:2600;transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1),opacity .3s,stroke-width .2s}
.rz-path.drawn{stroke-dashoffset:0}
.rz-pulse{animation:pulse 1.4s ease-out infinite}
@keyframes pulse{0%{transform:scale(.6);opacity:.4}100%{transform:scale(1.6);opacity:0}}
.opt-overlay{position:absolute;inset:0;background:#0f254388;backdrop-filter:blur(2px);display:grid;place-items:center;z-index:5}
.opt-card{background:#fff;border-radius:15px;padding:22px 24px;width:340px;box-shadow:0 20px 60px #0006}
.opt-spark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--b500),var(--b700));color:#fff;display:grid;place-items:center;margin-bottom:13px}
.opt-spark svg{animation:spin 2s linear infinite}
.opt-title{font-family:'Barlow Condensed';font-size:19px;font-weight:700;margin-bottom:15px}
.opt-steps{list-style:none;display:flex;flex-direction:column;gap:11px}
.opt-steps li{display:flex;align-items:center;gap:11px;font-size:13px;color:var(--g400);transition:.2s}
.opt-steps li.active{color:var(--g900);font-weight:600}
.opt-steps li.done{color:var(--g600)}
.opt-bul{width:22px;height:22px;border-radius:50%;border:1.6px solid var(--g200);display:grid;place-items:center;font-size:11px;font-weight:700;flex-shrink:0;font-variant-numeric:tabular-nums}
.opt-steps li.active .opt-bul{border-color:var(--b600);color:var(--b600)}
.opt-steps li.done .opt-bul{background:var(--ok);border-color:var(--ok);color:#fff}
.legend{position:absolute;left:16px;bottom:16px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;min-width:170px;box-shadow:0 8px 26px #0000001f}
.legend-h{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.legend-row{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:7px;color:var(--g700);font-size:12px;font-weight:500;font-family:inherit;transition:.12s}
.legend-row:hover{background:var(--g50)}
.legend-row.sel{background:var(--b50);color:var(--b700)}
.legend-km{margin-left:auto;color:var(--g500);font-size:11px;font-variant-numeric:tabular-nums}
.legend-types{display:flex;gap:14px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:10.5px;color:var(--g500)}
.legend-types span{display:flex;align-items:center;gap:4px}
.detail{position:absolute;right:16px;top:16px;width:266px;background:#fff;border-radius:14px;padding:15px 16px;box-shadow:0 14px 40px #00000026;border-top:3px solid var(--c)}
.detail-h{display:flex;align-items:center;gap:8px;margin-bottom:13px}
.detail-h b{font-family:'Barlow Condensed';font-size:16px}
.detail-veic{margin-left:auto;font-size:11px;color:var(--g500)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px 14px;margin-bottom:14px}
.kv-k{font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.kv-v{font-size:13px;font-weight:600}
.gmaps{width:100%;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--g50);display:flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--g700);font-family:inherit;transition:.12s}
.gmaps:hover{background:var(--b50);border-color:var(--b100);color:var(--b700)}

/* Drawer */
.overlay{position:fixed;inset:0;background:#0f254344;backdrop-filter:blur(1px);z-index:30;animation:fade .2s}
.drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:92vw;background:var(--card);z-index:31;display:flex;flex-direction:column;box-shadow:-14px 0 50px #0f254326;animation:slide .28s cubic-bezier(.4,0,.2,1)}
@keyframes slide{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.drawer-h{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line)}
.drawer-eyebrow{font-size:10.5px;font-weight:700;color:var(--b600);text-transform:uppercase;letter-spacing:.06em}
.drawer-t{font-family:'Barlow Condensed';font-size:20px;font-weight:700;margin-top:3px}
.x-btn{width:34px;height:34px;border-radius:8px;border:none;background:var(--g100);color:var(--g500);cursor:pointer;display:grid;place-items:center;transition:.12s}
.x-btn:hover{background:var(--g200);color:var(--g800)}
.drawer-b{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.drawer-f{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--line)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow-3{grid-template-columns:1fr 1fr 1fr}
.fgroup-t{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-top:4px;padding-top:12px;border-top:1px dashed var(--line)}
.form-label{display:flex;flex-direction:column;gap:5px}
.form-lbl{font-size:12px;font-weight:600;color:var(--g600)}
.form-help{font-size:11px;color:var(--g500)}
.form-input{height:40px;border:1px solid var(--line);border-radius:9px;padding:0 12px;font-family:inherit;font-size:13.5px;color:var(--g900);background:var(--card);outline:none;transition:.12s;width:100%}
.form-input:focus{border-color:var(--b500);box-shadow:0 0 0 3px #2f67ac26}
select.form-input{cursor:pointer}
.cub-box{display:flex;align-items:center;justify-content:space-between;background:#f0fdf9;border:1px solid #ccf0e4;border-radius:11px;padding:14px 16px}
.cub-box-l{font-size:11px;font-weight:600;color:#0f766e;text-transform:uppercase;letter-spacing:.04em}
.cub-box-v{font-family:'Barlow Condensed';font-size:24px;font-weight:700;color:#0f766e;margin-top:2px}
.cub-box-v span{font-size:12px;opacity:.7;font-family:'Inter';font-weight:600}
.cub-box-f{font-size:12px;color:#0f766e;opacity:.75;background:#dcfce7;padding:4px 9px;border-radius:6px;font-variant-numeric:tabular-nums}

/* Pedidos */
.filter-seg{display:inline-flex;background:var(--g100);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;width:fit-content}
.filter-seg button{border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--g500);padding:7px 13px;border-radius:7px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:7px}
.filter-seg button.on{background:#fff;color:var(--b700);box-shadow:0 1px 3px #0000001a}
.seg-count{font-size:10px;background:var(--g200);color:var(--g600);padding:1px 6px;border-radius:10px;font-variant-numeric:tabular-nums}
.filter-seg button.on .seg-count{background:var(--b50);color:var(--b600)}
.region-card{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff}
.region-card.mixed{border-color:var(--b200)}
.region-head{display:flex;align-items:center;gap:11px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--g50)}
.region-card.mixed .region-head{background:var(--b50)}
.region-title{font-family:'Barlow Condensed';font-weight:700;font-size:16px;color:var(--g900);display:flex;align-items:center;gap:8px}
.region-counts{display:flex;gap:7px}
.consolidate{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--b700);background:#fff;border:1px solid var(--b200);padding:5px 11px;border-radius:20px}
.addr-cell{display:flex;flex-direction:column;gap:2px;align-items:center;min-width:0}
.addr-main{font-size:11.5px;color:var(--g700);line-height:1.35}
.addr-alt{font-size:11px;color:var(--b700);display:flex;align-items:center;gap:5px}
.addr-badge{font-size:8.5px;font-weight:700;background:var(--b50);color:var(--b600);padding:1.5px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.03em}
.alt-btn{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--b600);background:var(--b50);border:1px solid var(--b100);padding:6px 10px;border-radius:7px;cursor:pointer;font-family:inherit;transition:.12s;white-space:nowrap}
.alt-btn:hover{background:var(--b100)}
.radio-row{display:flex;flex-direction:column;gap:9px}
.radio-opt{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:.12s}
.radio-opt.on{border-color:var(--b400);background:var(--b50)}
.radio-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--g300);flex-shrink:0;margin-top:1px;display:grid;place-items:center}
.radio-opt.on .radio-dot{border-color:var(--b600)}
.radio-opt.on .radio-dot::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--b600)}
.radio-t{font-size:12.5px;font-weight:600}
.radio-s{font-size:11.5px;color:var(--g500);margin-top:2px}

/* Roteirização seleção */
.rz-selall{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--g500);font-weight:600;cursor:pointer}
.rz-selall input,.rz-chk{width:15px;height:15px;accent-color:var(--b600);cursor:pointer;flex-shrink:0}
.sel-row{cursor:pointer}
.sel-row.off{opacity:.5}
.sel-row.off .rz-poolrow-t{text-decoration:line-through;text-decoration-color:var(--g300)}

/* Transportadora */
.tp-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.tp-card{border:1px solid var(--line);border-radius:13px;background:#fff;overflow:hidden}
.tp-head{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);background:var(--g50)}
.tp-ped{font-family:'Barlow Condensed';font-weight:700;font-size:16px;color:var(--g900)}
.tp-cli{font-size:12.5px;color:var(--g600);font-family:'Inter';font-weight:500}
.tp-dest{font-size:11.5px;color:var(--g500);margin-top:1px}
.tp-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.tp-sec-t{font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.cot-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:10px}
.cot-tbl th{text-align:center;font-size:10px;color:var(--g400);text-transform:uppercase;font-weight:700;padding:6px 10px;border-bottom:1px solid var(--line)}
.cot-tbl td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;text-align:center}
.cot-tbl tr:last-child td{border-bottom:none}
.cot-tbl tr.chosen{background:var(--b50)}
.cot-tags{display:flex;gap:5px;flex-wrap:wrap}
.cot-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.02em}
.cot-tag.preco{background:var(--ok-bg);color:var(--ok)}
.cot-tag.prazo{background:var(--info-bg);color:var(--info)}
.cot-tag.cb{background:#f3e8ff;color:#7c3aed}
.cot-choose{width:26px;height:26px;border-radius:50%;border:2px solid var(--g300);background:#fff;cursor:pointer;display:inline-grid;place-items:center;color:#fff;transition:.12s}
.cot-choose.on{border-color:var(--b600);background:var(--b600)}
.cot-form{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:9px;align-items:end;background:var(--g50);padding:12px;border-radius:10px;margin-top:4px}
.tp-dispatch{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tp-status-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tp-empty{padding:40px;text-align:center;color:var(--g400)}
.btn:disabled{opacity:.5;cursor:default}

/* Prioridade select */
.prio-sel{font-family:'Inter';font-size:12px;font-weight:600;border:1px solid var(--line);border-radius:7px;padding:5px 8px;background:#fff;cursor:pointer;color:var(--g600);outline:none;transition:.12s}
.prio-sel:focus{border-color:var(--b500);box-shadow:0 0 0 3px #2f67ac22}
.prio-sel.prio-urgente{color:var(--danger);border-color:#f0c9c9;background:var(--danger-bg)}
.prio-sel.prio-programado{color:var(--info);border-color:#c6d6f5;background:var(--info-bg)}

/* Transportadora — agrupamento */
.tp-group{border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#fff}
.tp-group-h{display:flex;align-items:center;gap:11px;padding:12px 18px;background:var(--b50);border-bottom:1px solid var(--line)}
.tp-group-t{font-family:'Barlow Condensed';font-weight:700;font-size:17px;color:var(--g900);display:flex;align-items:center;gap:8px}
.tp-group-total{margin-left:auto;font-weight:700;color:var(--b700);font-size:14px}
.tp-group-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.tp-rep{font-size:12px;color:var(--g600);display:flex;align-items:center;gap:6px;background:var(--g50);padding:8px 11px;border-radius:8px}
.tp-rep b{color:var(--g800)}
.tp-emails{display:flex;flex-direction:column;gap:5px;background:var(--ok-bg);border-radius:8px;padding:9px 11px}
.tp-email{font-size:11.5px;color:var(--ok);font-weight:600;display:flex;align-items:center;gap:6px}
.tp-locked{font-size:11.5px;color:var(--g500);display:flex;align-items:center;gap:6px}
.form-input:disabled{background:var(--g50);color:var(--g500);cursor:not-allowed}

/* Roteirização — veículo primeiro */
.rz-step-t{display:flex;align-items:center;gap:9px;padding:14px 18px 8px;font-size:12px;font-weight:700;color:var(--g700);text-transform:uppercase;letter-spacing:.03em}
.rz-step-n{width:20px;height:20px;border-radius:50%;background:var(--b600);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700;flex-shrink:0}
.rz-step-t .rz-selall{margin-left:auto}
.rz-veh{padding:0 16px 6px}
.rz-veh .form-input{margin-bottom:10px}
.rz-veh-meta{display:flex;gap:14px;font-size:11.5px;color:var(--g600);margin-bottom:11px;flex-wrap:wrap}
.rz-veh-meta span{display:flex;align-items:center;gap:5px}
.rz-rodizio{color:var(--b700);font-weight:600}
.rz-over{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--danger);background:var(--danger-bg);padding:8px 11px;border-radius:8px;margin-top:10px}
.rz-link{background:none;border:none;color:var(--b600);font-family:inherit;font-size:inherit;font-weight:600;cursor:pointer;padding:0;text-decoration:underline}
.legend-step{font-size:11.5px;color:var(--g600);padding:3px 0}
.rodizio-pill{font-size:11px;font-weight:600;background:var(--b50);color:var(--b700);padding:2px 9px;border-radius:6px}
.rodizio-note{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--g600);background:var(--g50);border:1px solid var(--line);padding:10px 12px;border-radius:9px;margin-top:2px}
.rodizio-note b{color:var(--b700)}
.date-pill{font-size:11.5px;font-weight:600;background:var(--g100);color:var(--g700);padding:2px 9px;border-radius:6px}

.date-pill{display:inline-flex;flex-direction:column;align-items:center;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:6px;line-height:1.3}
.date-pill em{font-style:normal;font-size:9.5px;font-weight:600;opacity:.85}
.date-pill.date-red{background:var(--danger-bg);color:var(--danger)}
.date-pill.date-yellow{background:var(--warn-bg);color:var(--warn)}
.date-pill.date-green{background:var(--ok-bg);color:var(--ok)}
.contato-cell{display:flex;flex-direction:column;align-items:center;gap:1px}
.cot-tags{justify-content:center}

.rz-city{margin-bottom:4px}
.rz-city-h{display:flex;align-items:center;gap:7px;padding:7px 8px;font-size:11.5px;font-weight:700;color:var(--g700);background:var(--b50);border-radius:7px;cursor:pointer;text-transform:uppercase;letter-spacing:.02em}
.rz-city-h svg{color:var(--b600)}
.rz-city-c{margin-left:auto;background:var(--b100);color:var(--b700);border-radius:20px;padding:0 8px;font-size:10.5px}
.rz-city .rz-poolrow{margin-left:6px}
.rz-published{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ok);background:var(--ok-bg);border:1px solid #b8e0c8;border-radius:9px;padding:10px 14px;margin:14px 16px 0}

.alert-strip{display:flex;align-items:flex-start;gap:10px;background:var(--danger-bg);border:1px solid #f0c9c9;color:#8f2a2a;border-radius:11px;padding:12px 15px;font-size:12.5px;line-height:1.5}
.alert-strip svg{color:var(--danger);flex-shrink:0;margin-top:1px}
.row-alert{background:#fdf1f1!important}
.row-alert td{border-bottom-color:#f3d5d5!important}
.days-pill{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:var(--g600);background:var(--g100);padding:2px 9px;border-radius:6px}
.days-pill.days-warn{background:var(--warn-bg);color:var(--warn)}
.days-pill.days-alert{background:var(--danger);color:#fff}

.rz-col-note{font-size:10px;color:var(--g400);font-style:italic}

.rz-pool-div{font-size:10px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.03em;margin:12px 4px 6px;padding-top:9px;border-top:1px dashed var(--line)}
.rz-city.off-uf{opacity:.7}
.rz-city.off-uf .rz-city-h{background:var(--g50);color:var(--g500)}
.rz-uf-tag{font-size:9.5px;font-weight:700;background:var(--g200);color:var(--g600);border-radius:5px;padding:1px 6px;margin-left:2px}

.alt-btn.ico{padding:6px;gap:0}
.alt-btn.ico svg{display:block}

.addr-cep{font-size:10.5px;color:var(--g400);font-weight:600;white-space:nowrap;letter-spacing:.02em}

/* Romaneios */
.rom-card{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden}
.rom-card.done{opacity:.9}
.rom-head{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.rom-num{font-family:'Barlow Condensed';font-weight:700;font-size:19px;color:var(--g900);letter-spacing:.01em}
.rom-meta{font-size:11.5px;color:var(--g500);margin-top:1px}
.rom-driver{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--g700);font-weight:600;margin-left:auto}
.rom-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line)}
.rom-kpis>div{background:#fff;padding:12px 16px;display:flex;flex-direction:column;gap:2px}
.rom-kpis b{font-size:16px;color:var(--g900)}
.rom-kpis span{font-size:10.5px;color:var(--g500);text-transform:uppercase;letter-spacing:.03em}
.rom-seq{padding:14px 18px;display:flex;flex-direction:column;gap:2px}
.rom-stop{display:flex;align-items:center;gap:12px;padding:7px 0}
.rom-stop.depot{font-size:12px;font-weight:600;color:var(--b700)}
.rom-dep{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:#fff;flex-shrink:0}
.rom-dep.out{background:#16345d}.rom-dep.in{background:var(--g500)}
.rom-seq-n{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--b500);color:var(--b600);display:grid;place-items:center;font-size:11px;font-weight:700;flex-shrink:0}
.rom-stop-m{flex:1}
.rom-stop-t{font-size:13px;font-weight:600;color:var(--g900);display:flex;align-items:center;gap:8px}
.rom-stop-s{font-size:11.5px;color:var(--g500);margin-top:1px}

.kml-cell{display:flex;flex-direction:column;gap:1px;font-size:10.5px;color:var(--g600);line-height:1.35}
.rz-mot{margin-bottom:10px}

.prod-desc{text-align:left;max-width:340px}

.import-note{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--g500);background:var(--g50);border:1px solid var(--line);border-radius:9px;padding:8px 12px}
.import-note svg{color:var(--b500);flex-shrink:0}
.unify-strip{background:var(--b50);border:1px solid var(--b100);border-radius:11px;padding:12px 15px}
.unify-h{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--b800);margin-bottom:9px}
.unify-list{display:flex;flex-wrap:wrap;gap:8px}
.unify-item{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px 8px 6px 12px}
.unify-cli{font-size:12.5px;font-weight:600;color:var(--g800)}
.unify-n{font-size:11px;color:var(--g500)}
.rom-link-badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;color:var(--ok);background:var(--ok-bg);border-radius:5px;padding:1px 6px;margin-top:3px}
.grp-badge{display:inline-block;font-size:9px;font-weight:700;color:var(--b700);background:var(--b100);border-radius:5px;padding:1px 6px;margin-top:3px;text-transform:uppercase;letter-spacing:.03em}

.rom-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

.unify-cliw{display:flex;flex-direction:column;line-height:1.25}
.unify-date{font-size:9.5px;color:var(--g500);text-transform:uppercase;letter-spacing:.02em}

.ped-list{display:flex;flex-direction:column;gap:7px}
.ped-row{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 14px}
.ped-row.alert{background:#fdf1f1;border-color:#f3d5d5}
.ped-row.sel{border-color:var(--b400);box-shadow:0 0 0 3px #2f67ac1a}
.ped-row.cancel{opacity:.6}
.ped-chk{width:16px;height:16px;accent-color:var(--b600);cursor:pointer;flex-shrink:0}
.ped-idc{width:190px;flex-shrink:0;min-width:0}
.ped-numline{display:flex;align-items:center;gap:7px}
.ped-num{font-family:'Barlow Condensed';font-weight:700;font-size:17px;color:var(--g900);letter-spacing:.01em}
.ped-cli{font-size:13px;font-weight:600;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ped-idc .rom-link-badge{margin-top:2px}
.ped-addr{flex:1;min-width:0}
.ped-addr-l{font-size:12px;color:var(--g700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ped-meta{font-size:10.5px;color:var(--g400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

function RouteMap({stops,allIds,order,inRoute,hov,setHov,phase,locked,onToggle,color}){
  const el=useRef(null),mapRef=useRef(null),lg=useRef(null),done=(phase==="done"||locked);
  const ids=(done?order:allIds).filter(id=>stops[id]);
  const idsSig=ids.join("|"),inSig=[...inRoute].join("|");
  useEffect(()=>{
    if(mapRef.current||!el.current||!window.L)return;
    const map=L.map(el.current,{zoomControl:false,attributionControl:true}).setView([DEPOT_GEO.lat,DEPOT_GEO.lng],8);
    L.control.zoom({position:"topright"}).addTo(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
    lg.current=L.layerGroup().addTo(map);mapRef.current=map;
    setTimeout(()=>map.invalidateSize(),80);
    return ()=>{map.remove();mapRef.current=null;};
  },[]);
  // markers + route line
  useEffect(()=>{const map=mapRef.current,layer=lg.current;if(!map||!layer||!window.L)return;
    layer.clearLayers();
    L.marker([DEPOT_GEO.lat,DEPOT_GEO.lng],{icon:L.divIcon({className:"",html:'<div class="mk mk-depot">CD</div>',iconSize:[30,30],iconAnchor:[15,15]}),zIndexOffset:2000}).addTo(layer).bindTooltip("Braskim · SJC (saída/retorno)",{direction:"top"});
    if(done&&ids.length){const pts=[[DEPOT_GEO.lat,DEPOT_GEO.lng],...ids.map(id=>[stops[id].lat,stops[id].lng]),[DEPOT_GEO.lat,DEPOT_GEO.lng]];
      L.polyline(pts,{color,weight:4,opacity:.85}).addTo(layer);}
    const pin=(col,label)=>'<svg width="26" height="34" viewBox="0 0 24 32" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.35))"><path d="M12 0C5.4 0 0 5.4 0 12c0 8.4 12 20 12 20s12-11.6 12-20C24 5.4 18.6 0 12 0z" fill="'+col+'" stroke="#fff" stroke-width="1.5"/>'+(label?'<text x="12" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" font-family="Barlow Condensed,Inter,sans-serif">'+label+'</text>':'<circle cx="12" cy="12" r="4.4" fill="#fff"/>')+'</svg>';
    ids.forEach((id,i)=>{const s=stops[id];const on=inRoute.has(id);
      const col=done?color:(s.type==="coleta"?(on?"#c98a1e":"#d8c08a"):(on?"#2f67ac":"#9db4cd"));
      const label=done?String(i+1):"";
      const mk=L.marker([s.lat,s.lng],{icon:L.divIcon({className:"",html:pin(col,label),iconSize:[26,34],iconAnchor:[13,34],tooltipAnchor:[0,-30]}),opacity:on||done?1:.8,zIndexOffset:on?1000:200}).addTo(layer);
      mk.bindTooltip(s.nome+" · "+s.cidade+"/"+s.uf+(s.approx?" (aprox.)":""),{direction:"top"});
      mk.on("mouseover",()=>setHov(id));mk.on("mouseout",()=>setHov(null));
      if(phase==="select")mk.on("click",()=>onToggle(id));
    });
  },[idsSig,inSig,phase,locked,color,done]);
  // fit bounds only when the shown set changes
  useEffect(()=>{const map=mapRef.current;if(!map)return;
    const pts=[[DEPOT_GEO.lat,DEPOT_GEO.lng],...ids.map(id=>[stops[id].lat,stops[id].lng])];
    if(pts.length>1){try{map.fitBounds(L.latLngBounds(pts).pad(0.25),{animate:false});}catch(e){}}
    else map.setView([DEPOT_GEO.lat,DEPOT_GEO.lng],8);
    setTimeout(()=>map.invalidateSize(),60);
  },[idsSig,phase,locked]);
  return <div ref={el} className="rz-leaflet"></div>;
}

function Roteirizacao({peds,coletas,veiculos,motoristas,transportadoras,onPublish,go,initReg,clearInitReg}){
  const reduced=useReduced();
  const ativos=veiculos.filter(v=>v.situacao==="Ativo");

  const[vehId,setVehId]=useState(()=>ativos[0]?ativos[0].id:null);
  const[selStops,setSelStops]=useState(()=>new Set());
  const[modo,setModo]=useState("entrega");
  const[transpId,setTranspId]=useState(()=>transpAtivas[0]?transpAtivas[0].id:null);
  const retira=modo!=="entrega";
  const[phase,setPhase]=useState("select");
  const[step,setStep]=useState(0);
  const[route,setRoute]=useState(null);
  const[drawn,setDrawn]=useState(false);
  const[hov,setHov]=useState(null);
  const[toast,setToast]=useState(null);
  const drag=useRef(null);
  const STEPS=["Geocodificando endereços","Calculando matriz de distâncias · Routes API","Otimizando sequência · OR-Tools","Montando romaneio"];
  const COLOR="#255491";

  const STOPS=useMemo(()=>{
    const out={};const idx={};

function Pedidos({peds,setPeds,prod,repres,go}){
  const[fil,setFil]=useState("todos");
  const[q,setQ]=useState("");
  const[alt,setAlt]=useState(null);
  const[toast,setToast]=useState(null);
  const[sel,setSel]=useState(()=>new Set());
  const fireToast=m=>{setToast(m);setTimeout(()=>setToast(null),4200);};
  const PIDX=Object.fromEntries((prod||[]).map(p=>[String(p.codigo).trim(),p]));
  const cg=itens=>{let m3=0,peso=0,cx=0;(itens||[]).forEach(it=>{const pr=PIDX[String(it.codigo).trim()];if(pr){m3+=(pr.cubagem||0)*it.qtd;peso+=(pr.pesoBruto||0)*it.qtd;}cx+=it.qtd;});return{m3:+m3.toFixed(2),peso:Math.round(peso),caixas:cx};};

  const frota=peds.filter(p=>p.modalidade==="frota");
  const transpCount=peds.filter(p=>p.modalidade==="transportadora").length;
  const match=(k,p)=>k==="todos"?true:k==="avincular"?(p.status!=="cancelado"&&!p.romaneioId):k==="vinculados"?!!p.romaneioId:k==="cancelados"?p.status==="cancelado":true;
  const counts={todos:frota.length,avincular:frota.filter(p=>match("avincular",p)).length,vinculados:frota.filter(p=>p.romaneioId).length,cancelados:frota.filter(p=>p.status==="cancelado").length};
  const shown=frota.filter(p=>match(fil,p)&&(!q.trim()||(p.numero+" "+p.cliente+" "+p.endereco.cidade+" "+(p.representante||"")).toLowerCase().includes(q.toLowerCase())))
    .sort((a,b)=>{const d=String(b.dataEmissao||"").localeCompare(String(a.dataEmissao||""));return d!==0?d:String(b.numero).localeCompare(String(a.numero),undefined,{numeric:true});});

  const toggleSel=id=>setSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const selArr=frota.filter(p=>sel.has(p.id));
  const ck=p=>norm(String(p.cliente||"").replace(/\u00a0/g," ")).replace(/\s+/g," ").trim();
  const dk=p=>String(p.dataEmissao||"").slice(0,10);
  const sameGroup=selArr.length>=2&&selArr.every(p=>!p.romaneioId&&p.status!=="cancelado"&&dk(p)===dk(selArr[0]));
  const diffClient=sameGroup&&selArr.some(p=>ck(p)!==ck(selArr[0]));
  const uniReason=selArr.length<2?"Selecione ao menos 2 pedidos"
    :selArr.some(p=>p.romaneioId)?"Há pedido já vinculado a romaneio na seleção"
    :selArr.some(p=>p.status==="cancelado")?"Há pedido cancelado na seleção"
    :selArr.some(p=>dk(p)!==dk(selArr[0]))?"Datas de emissão diferentes — só é possível unir pedidos do mesmo dia"
    :"";
  const uniteSel=()=>{if(!sameGroup)return;const gid="G"+Math.min(...selArr.map(p=>p.id));setPeds(prev=>prev.map(p=>sel.has(p.id)?{...p,grupoId:gid}:p));setSel(new Set());fireToast(selArr.length+" pedidos unificados");};
  const separar=gid=>setPeds(prev=>prev.map(p=>p.grupoId===gid?{...p,grupoId:null}:p));
  const excluir=id=>{setPeds(prev=>prev.filter(p=>p.id!==id));setSel(s=>{const n=new Set(s);n.delete(id);return n;});};

  const fileRef=useRef(null);
  const onImport=async ev=>{const f=ev.target.files&&ev.target.files[0];if(!f)return;
    try{
      const buf=await f.arrayBuffer();const wb=XLSX.read(buf,{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
      if(!rows.length){fireToast("Arquivo sem linhas.");ev.target.value="";return;}
      const val=(r,cands)=>{const ks=Object.keys(r);for(const c of cands){const hit=ks.find(k=>norm(k)===norm(c))||ks.find(k=>norm(k).includes(norm(c)));if(hit)return r[hit];}return "";};

/* ---------------- FRETES: COTAÇÕES + TRANSPORTADORA ---------------- */
const CARRIER_ST={aguardando_cotacao:{l:"Aguardando cotação",b:"badge-neutral"},cotado:{l:"A despachar",b:"badge-info"},despachado:{l:"Despachado · em trânsito",b:"badge-warn"},concluida:{l:"Concluída",b:"badge-ok"}};
const SULSUD=["RS","SC","PR","MG","RJ","ES"];
const regCat=uf=>uf==="SP"?"SP":SULSUD.includes((uf||"").toUpperCase())?"SS":"OUT";
const regCatLabel={SP:"São Paulo",SS:"Sul/Sudeste",OUT:"Demais estados"};
// custo-benefício = valor do frete / valor total dos pedidos vinculados. Retorna % e status (ok|aprov|rej)
const cbAvaliar=(frete,total,uf)=>{
  if(!total||total<=0)return{pct:null,st:"ok",motivo:"sem preço — verifique manualmente"};
  const pct=frete/total*100;const cat=regCat(uf);let st;
  if(cat==="SP")st=pct<=3?"ok":pct<=5?"aprov":"rej";
  else if(cat==="SS")st=(total>100000?(pct<=3?"ok":"aprov"):(pct<=5?"ok":"aprov"));
  else st=pct<=8?"ok":"aprov";
  if(pct>10)st="rej"; // regra global: acima de 10% sempre rejeitado
  return{pct,st,cat};
};
const CB_LABEL={ok:"Libera direto",aprov:"Precisa aprovação",rej:"Rejeitado"};
const CB_CLASS={ok:"cb-ok",aprov:"cb-aprov",rej:"cb-rej"};
function bestTags(cots){
  if(!cots.length)return{};
  const minPreco=Math.min(...cots.map(c=>+c.valor));const minPrazo=Math.min(...cots.map(c=>+c.prazo));
  const vs=cots.map(c=>+c.valor),ps=cots.map(c=>+c.prazo);
  const vmin=Math.min(...vs),vmax=Math.max(...vs),pmin=Math.min(...ps),pmax=Math.max(...ps);
  const score=c=>(vmax>vmin?(+c.valor-vmin)/(vmax-vmin):0)+(pmax>pmin?(+c.prazo-pmin)/(pmax-pmin):0);
  let cb=null,best=Infinity;cots.forEach(c=>{const s=score(c);if(s<best){best=s;cb=c.id;}});
  const t={};cots.forEach(c=>{t[c.id]={preco:+c.valor===minPreco,prazo:+c.prazo===minPrazo,cb:c.id===cb};});return t;
}

      const uft={};r.paradas.forEach(p=>{uft[p.uf]=(uft[p.uf]||0)+1;});const romUF=Object.keys(uft).sort((a,b)=>uft[b]-uft[a])[0]||"SP";const cat=regCat(romUF);

/* Transportadora — follow-up dos romaneios com transportadora definida */
function Transportadora({peds,setPeds,romaneios,setRomaneios,repres,user}){
  const[toast,setToast]=useState(null);
  const fireToast=m=>{setToast(m);setTimeout(()=>setToast(null),4200);};
  const updRom=(id,patch)=>setRomaneios(prev=>prev.map(r=>r.id===id?{...r,...patch}:r));
  const roms=(romaneios||[]).filter(r=>r.viaTransportadora&&(r.frete==="definido"||r.frete==="despachado"||r.frete==="concluida"));
  const repEmail=nome=>{const rp=(repres||[]).find(x=>norm(x.nome)===norm(nome));return rp?rp.email:"";};
  const repsDoRom=r=>{const set={};(r.pedidoIds||[]).forEach(id=>{const p=peds.find(x=>x.id===id);if(p&&p.representante)set[p.representante]=true;});return Object.keys(set);};
  const emailLine=r=>{const rs=repsDoRom(r);return rs.length?rs.map(n=>n+(repEmail(n)?" ("+repEmail(n)+")":"")).join(", "):"representantes dos pedidos";};
  const despachar=r=>{if(!r.dataDespacho||!r.entregaPrevista)return;updRom(r.id,{frete:"despachado"});fireToast("E-mail de despacho enviado aos representantes: "+emailLine(r));};
  const concluir=r=>{updRom(r.id,{frete:"concluida",dataConclusao:isoDate(new Date())});fireToast("E-mail de entrega enviado aos representantes: "+emailLine(r));};
  const totalPedRom=r=>(r.pedidoIds||[]).reduce((a,id)=>{const p=peds.find(x=>x.id===id);return a+(p?p.valorTotal||0:0);},0);
  const freteVal=r=>{const c=(r.cotacoes||[]).find(x=>x.id===r.escolhidaId);return c?c.valor:0;};
  const counts={definido:roms.filter(r=>r.frete==="definido").length,despachado:roms.filter(r=>r.frete==="despachado").length,concluida:roms.filter(r=>r.frete==="concluida").length};

  return(<div className="page-wrap">
    <div className="page-head">
      <div><div className="page-title"><Icon n="building" s={22} c="var(--b600)"/> Transportadora<span className="pcount num">{roms.length}</span></div>
      <div className="page-sub">Follow-up dos romaneios via transportadora · despacho, previsão e e-mail aos representantes</div></div>
    </div>
    <div className="tp-kpis" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
      {[["definido","A despachar","receipt","info"],["despachado","Em trânsito","truck","warn"],["concluida","Concluídos","check","ok"]].map(([k,l,ic,t])=>(
        <div className="kpi-card" key={k}><div className={"kpi-ico "+t}><Icon n={ic} s={20}/></div>
          <div><div className="kpi-val num">{counts[k]}</div><div className="kpi-lbl">{l}</div></div></div>))}
    </div>
    {roms.length===0&&<div className="card"><div className="tp-empty"><Icon n="building" s={26}/><p style={{marginTop:9}}>Nenhum romaneio com transportadora definida. Defina uma na aba <b>Cotações</b> (após escolher/aprovar a cotação, ele aparece aqui).</p></div></div>}
    {roms.map(r=>{const locked=r.frete==="despachado"||r.frete==="concluida";const done=r.frete==="concluida";const reps=repsDoRom(r);
      const cidades=[...new Set(r.paradas.map(p=>p.cidade))].join(", ");
      return(
      <div className="tp-card" key={r.id}>
        <div className="tp-head">
          <div style={{flex:1}}>
            <div className="tp-ped">{r.numero} <span className="tp-cli">· {r.transportadora}</span></div>
            <div className="tp-dest">{r.paradas.length} pedido(s) · valor pedidos {money(totalPedRom(r))} · frete {money(freteVal(r))} · {cidades}</div>
          </div>
          <span className={"badge "+(done?"badge-ok":r.frete==="despachado"?"badge-warn":"badge-info")}>{done?"Concluído":r.frete==="despachado"?"Em trânsito":"A despachar"}</span>
        </div>
        <div className="tp-body">
          <div className="tp-rep"><Icon n="user" s={13}/> Representantes dos pedidos: <b>{reps.length?reps.join(", "):"—"}</b></div>
          <div className="tp-dispatch">
            <Fld label="Data de despacho"><input className="form-input" type="date" value={r.dataDespacho||""} disabled={locked} onChange={e=>updRom(r.id,{dataDespacho:e.target.value})}/></Fld>
            <Fld label="Data prevista de entrega"><input className="form-input" type="date" value={r.entregaPrevista||""} disabled={locked} onChange={e=>updRom(r.id,{entregaPrevista:e.target.value})}/></Fld>
          </div>
          <div className="tp-status-row">
            {r.frete==="definido"&&<button className="btn btn-secondary btn-sm" disabled={!r.dataDespacho||!r.entregaPrevista} title={(!r.dataDespacho||!r.entregaPrevista)?"Preencha data de despacho e previsão de entrega":"Marcar despachado e enviar e-mail aos representantes"} onClick={()=>despachar(r)}><Icon n="truck" s={14}/> Despachar + e-mail aos representantes</button>}
            {r.frete==="despachado"&&<button className="btn btn-primary btn-sm" onClick={()=>concluir(r)}><Icon n="check" s={14}/> Marcar entregue (notificar representantes)</button>}
            {done&&<span className="badge badge-ok"><Icon n="check" s={12}/> Entrega concluída</span>}
          </div>
          {locked&&<div className="tp-emails">
            <div className="tp-email" style={{color:"var(--g600)"}}><Icon n="truck" s={12}/> <b>Despachado em {r.dataDespacho?fmtDate(r.dataDespacho):"—"}</b> · previsão de entrega {r.entregaPrevista?fmtDate(r.entregaPrevista):"—"}{done&&r.dataConclusao&&<> · <b>Concluído em {fmtDate(r.dataConclusao)}</b></>}</div>
            <div className="tp-email"><Icon n="check" s={12}/> Despacho notificado aos representantes ({emailLine(r)})</div>
            {done&&<div className="tp-email"><Icon n="check" s={12}/> Entrega notificada aos representantes</div>}
          </div>}
        </div>
      </div>);})}
    {toast&&<div className="toast"><Icon n="check" s={15}/> {toast}</div>}
  </div>);
}

/* ---------------- POR REGIÃO (a romanear) ---------------- */
function Regioes({peds,go,onRoteirizar}){
  const abertos=peds.filter(p=>p.status!=="cancelado"&&!p.romaneioId);
  const grupos={};
  abertos.forEach(p=>{const reg=regiaoDe(p.endereco.cidade,p.endereco.uf);(grupos[reg]=grupos[reg]||[]).push(p);});
  const rank=n=>{const i=REGIOES.findIndex(r=>r.nome===n);if(i>=0)return i;if(n==="Outras cidades de SP")return 900;return 1000;};
  const regioes=Object.keys(grupos).sort((a,b)=>rank(a)-rank(b)||a.localeCompare(b));
  const totM3=abertos.reduce((a,p)=>a+(p.m3||0),0);
  return(<div className="page-wrap">
    <PageHead icon="map" title="Pedidos a romanear — por região" sub="Somente pedidos ainda não vinculados a um romaneio, agrupados por região de entrega"
      count={abertos.length} extra={nf(totM3,1)+" m³"}/>
    {abertos.length===0&&<div className="card"><div className="tp-empty"><Icon n="map" s={26}/><p style={{marginTop:9}}>Nenhum pedido a romanear. Importe pedidos ou publique romaneios na <b>Roteirização</b>.</p></div></div>}
    {regioes.map(reg=>{const arr=grupos[reg].sort((a,b)=>String(b.dataEmissao).localeCompare(String(a.dataEmissao)));
      const aguardando=arr.filter(p=>p.status==="aguardando");
      const liberados=arr.filter(p=>p.status!=="aguardando");
      const m3=arr.reduce((a,p)=>a+(p.m3||0),0);
      return(
      <div className="card reg-card" key={reg}>
        <div className="reg-head">
          <div><div className="reg-name"><Icon n="map" s={15} c="var(--b600)"/> {reg}</div>
            <div className="reg-sub">{arr.length} pedido(s) · <span className="num">{nf(m3,1)} m³</span> · {liberados.length} liberável(is) · {aguardando.length} aguardando</div></div>
          <button className="btn btn-secondary btn-sm" onClick={()=>onRoteirizar?onRoteirizar(reg):go("roteirizacao")}><Icon n="route" s={13}/> Roteirizar região</button>
        </div>
        {aguardando.length>0&&liberados.length>0&&(
          <div className="reg-pcp"><Icon n="alert" s={15}/>
            <span><b>{aguardando.length} pedido(s) aguardando liberação</b> na mesma região de {liberados.length} já liberável(is). Vale verificar com o <b>PCP</b> a liberação destes para consolidar a entrega e aproveitar a viagem.</span></div>)}
        <div className="reg-list">
          {arr.map(p=>{const a=p.entregaEm==="alt"&&p.enderecoAlt?p.enderecoAlt:p.endereco;const aguard=p.status==="aguardando";
            return(
            <div className={"reg-row"+(aguard?" aguard":"")} key={p.id}>
              <div className="reg-row-id"><span className="ped-num">{p.numero}</span><span className="reg-row-cli">{p.cliente}</span></div>
              <div className="reg-row-addr">{a.cidade}/{a.uf}{p.representante?" · Rep.: "+p.representante:""}</div>
              <div className="reg-row-m3 num">{nf(p.m3,2)} m³</div>
              <span className={"badge "+ST_BADGE[p.status]}>{ST_LABEL[p.status]}</span>
            </div>);})}
        </div>
      </div>);})}
  </div>);
}

/* ---------------- ROMANEIOS ---------------- */
function Romaneios({rows,setRomaneios}){
  const[fil,setFil]=useState("todos");
  const[q,setQ]=useState("");
  const counts={todos:rows.length,aberto:rows.filter(r=>r.status==="aberto").length,concluido:rows.filter(r=>r.status==="concluido").length,retira:rows.filter(r=>r.clienteRetira).length};
  const match=r=>fil==="retira"?r.clienteRetira:(fil==="todos"||r.status===fil);
  const shown=rows.filter(r=>match(r)&&(!q.trim()||(r.numero+" "+(r.nomusRom||"")+" "+r.placa+" "+r.motorista).toLowerCase().includes(q.toLowerCase())));
  const abertos=shown.filter(r=>r.status==="aberto");
  const nkey=r=>r.nomusRom&&r.nomusRom.trim()?r.nomusRom.trim():"\uffff";
  const concluidos=shown.filter(r=>r.status==="concluido").sort((a,b)=>nkey(a).localeCompare(nkey(b),undefined,{numeric:true}));
  const setStatus=(id,st)=>setRomaneios(p=>p.map(r=>r.id===id?{...r,status:st}:r));
  const setNomus=(id,v)=>setRomaneios(p=>p.map(r=>r.id===id?{...r,nomusRom:v}:r));
  const setExped=(id,v)=>setRomaneios(p=>p.map(r=>r.id===id?{...r,dataExpedicao:v}:r));
  const nomusDup=r=>{const v=(r.nomusRom||"").trim();return !!v&&rows.some(x=>x.id!==r.id&&(x.nomusRom||"").trim()===v);};
  const motivoBloqueio=r=>!(r.nomusRom||"").trim()?"Informe o Nº romaneio NOMUS":nomusDup(r)?"Nº romaneio NOMUS já usado em outro romaneio":!(r.dataExpedicao||"").trim()?"Informe a data de expedição":"";
  const concluir=r=>{if(motivoBloqueio(r))return;setRomaneios(p=>p.map(x=>x.id===r.id?{...x,status:"concluido"}:x));};
  const fmtDate=iso=>iso?iso.split("-").reverse().join("/"):"—";
  const A=s=>String(s==null?"":s).replace(/[—–]/g,"-").replace(/[●•]/g,"").replace(/[“”]/g,'"').replace(/[‘’]/g,"'").replace(/\u00a0/g," ");
  const AH=a=>a.map(r=>r.map(A));
  const AB=a=>a.map(r=>r.map(c=>(c&&typeof c==="object")?{...c,content:A(c.content)}:A(c)));
  const pdfHeader=(doc,titulo,r,center)=>{const W=doc.internal.pageSize.getWidth();const cx=center?W/2:12;const opt=center?{align:"center"}:undefined;
    try{doc.addImage(BRASKIM_LOGO,"PNG",W-58,7,46,11.1);}catch(e){}
    doc.setFont("helvetica","bold");doc.setFontSize(15);doc.setTextColor(22,52,93);doc.text(A(titulo),cx,15,opt);
    doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(90,90,90);
    const tipoLinha=r.clienteRetira?"CLIENTE RETIRA - o cliente retira no CD (SJC/SP)":r.viaTransportadora?("TRANSPORTADORA: "+(r.transportadora||"-")+" - sem rota de entrega"):("Veiculo: "+r.placa+" - "+r.tipo+"    |    Motorista: "+r.motorista+"    |    Rodizio SP: "+r.rodizio);
    const l1="Romaneio: "+r.numero+"    |    No NOMUS: "+(r.nomusRom||"-")+"    |    Data: "+fmtDate(r.data)+(r.dataExpedicao?"    |    Expedicao: "+fmtDate(r.dataExpedicao):"");
    doc.text(A(l1),cx,22,opt);
    if(r.clienteRetira||r.viaTransportadora){doc.setTextColor(180,90,10);doc.setFont("helvetica","bold");doc.text(A(tipoLinha),cx,27.5,opt);doc.setFont("helvetica","normal");doc.setTextColor(90,90,90);}
    else doc.text(A(tipoLinha),cx,27.5,opt);
    return 33;};
  const gerarSeparacao=r=>{const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const startY=pdfHeader(doc,"Separacao de estoque",r);
    const body=[];
    r.paradas.filter(p=>p.tipo==="entrega").forEach(p=>{const agg={};(p.itens||[]).forEach(it=>{const k=it.codigo;(agg[k]=agg[k]||{codigo:it.codigo,descricao:it.descricao,qtd:0}).qtd+=it.qtd;});
      Object.values(agg).forEach(it=>body.push([p.cliente,(p.numeros||[]).join(" + "),it.codigo,it.descricao,String(it.qtd),""]));});
    const total=r.paradas.filter(p=>p.tipo==="entrega").reduce((a,p)=>a+(p.caixas||0),0);
    body.push([{content:"Total de caixas",colSpan:4,styles:{halign:"right",fontStyle:"bold"}},{content:String(total),styles:{fontStyle:"bold",halign:"center"}},""]);
    doc.autoTable({startY,head:AH([["Cliente","Pedido(s)","Codigo","Descricao","Qtd (cx)","Separado (OK)"]]),body:AB(body),
      styles:{fontSize:7.5,cellPadding:1.8,lineColor:[210,210,210],lineWidth:.1,overflow:"visible",valign:"middle"},
      headStyles:{fillColor:[37,84,145],textColor:255,fontSize:7.5,halign:"center",overflow:"visible"},
      columnStyles:{0:{cellWidth:54},1:{cellWidth:22,halign:"center"},2:{cellWidth:17,halign:"center"},3:{cellWidth:"auto"},4:{cellWidth:12,halign:"center"},5:{cellWidth:17,halign:"center"}},
      didParseCell:d=>{if(d.section==="body"&&d.column.index===5)d.cell.styles.minCellHeight=8;}});
    doc.save("separacao_"+r.numero+".pdf");};
  const gerarMotorista=r=>{const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
    const startY=pdfHeader(doc,"Roteiro do motorista",r,true);
    doc.setFontSize(8);doc.setTextColor(90,90,90);doc.text(A("Saida/Retorno: Braskim - Av. Joao Rodolfo Castelli, 690, Putim, Sao Jose dos Campos/SP"),doc.internal.pageSize.getWidth()/2,startY-1,{align:"center"});
    const body=r.paradas.map(p=>[String(p.seq),p.tipo==="coleta"?"Coleta":"Entrega",p.cliente,p.logradouro||"",p.cidade+"/"+p.uf,p.cep||"",p.tipo==="entrega"?String(p.caixas||0):"",(p.numeros||[]).join(" + "),"",""]);
    doc.autoTable({startY:startY+3,head:AH([["Seq","Tipo","Cliente/Fornecedor","Endereco","Municipio/UF","CEP","Cx","Pedido(s)","Cor do pedido","Ocorrencias"]]),body:AB(body),
      styles:{fontSize:7.5,cellPadding:1.8,lineColor:[210,210,210],lineWidth:.1,minCellHeight:9},
      headStyles:{fillColor:[37,84,145],textColor:255,fontSize:7.5,halign:"center"},
      columnStyles:{0:{cellWidth:9,halign:"center"},1:{cellWidth:16,halign:"center"},2:{cellWidth:42},3:{cellWidth:"auto"},4:{cellWidth:30,halign:"center"},5:{cellWidth:20,halign:"center"},6:{cellWidth:10,halign:"center"},7:{cellWidth:24,halign:"center"},8:{cellWidth:26},9:{cellWidth:34}}});
    doc.save("motorista_"+r.numero+".pdf");};
  return(<div className="page-wrap">
    <div className="page-head">
      <div><div className="page-title"><Icon n="clipboard" s={22} c="var(--b600)"/> Romaneios<span className="pcount num">{rows.length}</span></div>
      <div className="page-sub">Documentos de carga gerados pela roteirização · saída e retorno no CD (SJC)</div></div>
      <div className="page-head-actions"><div className="search"><Icon n="search" s={15}/><input placeholder="Buscar romaneio, placa, motorista…" value={q} onChange={e=>setQ(e.target.value)}/></div></div>
    </div>
    <div className="filter-seg">
      {[["todos","Todos"],["aberto","Em aberto"],["concluido","Concluídos"],["retira","Cliente retira"]].map(([k,l])=>(
        <button key={k} className={fil===k?"on":""} onClick={()=>setFil(k)}>{l}<span className="seg-count num">{counts[k]}</span></button>))}
    </div>
    {shown.length===0&&<div className="card"><div className="tp-empty"><Icon n="clipboard" s={26}/><p style={{marginTop:9}}>Nenhum romaneio. Publique uma rota na aba <b>Roteirização</b>.</p></div></div>}
    {abertos.map(r=>{const ent=r.paradas.filter(p=>p.tipo==="entrega").length;const col=r.paradas.filter(p=>p.tipo==="coleta").length;
      return(
      <div className="rom-card" key={r.id}>
        <div className="rom-head">
          <div className="rom-id">
            <div className="rom-num">{r.numero}</div>
            <div className="rom-meta">{fmtDate(r.data)} · {r.placa} · {r.tipo} · Rodízio SP {r.rodizio}</div>
          </div>
          <div className="rom-nomus"><label>Nº romaneio NOMUS <b style={{color:"#c0392b"}}>*</b></label>
            <input className={"form-input"+((!(r.nomusRom||"").trim()||nomusDup(r))?" req-empty":"")} value={r.nomusRom||""} placeholder="obrigatório" onChange={e=>setNomus(r.id,e.target.value)}/>
            {nomusDup(r)&&<div style={{fontSize:10,color:"#c0392b",marginTop:2}}>Nº já usado</div>}</div>
          <div className="rom-nomus"><label>Data de expedição <b style={{color:"#c0392b"}}>*</b></label>
            <input type="date" className={"form-input"+(!(r.dataExpedicao||"").trim()?" req-empty":"")} value={r.dataExpedicao||""} onChange={e=>setExped(r.id,e.target.value)}/></div>
          <div className="rom-driver"><Icon n="user" s={13}/> {r.clienteRetira?"Cliente retira":r.viaTransportadora?("Transp.: "+(r.transportadora||"—")):r.motorista}</div>
          {r.clienteRetira&&<span className="badge badge-info">Cliente retira</span>}
          {r.viaTransportadora&&<span className="badge badge-info">Transportadora</span>}
          <span className="badge badge-warn">Em aberto</span>
          <div className="rom-actions">
            <button className="btn btn-secondary btn-sm" onClick={()=>gerarSeparacao(r)} title="Lista de separação por cliente/produto"><Icon n="download" s={13}/> Separação (PDF)</button>
            {!r.clienteRetira&&!r.viaTransportadora&&<button className="btn btn-secondary btn-sm" onClick={()=>gerarMotorista(r)} title="Roteiro do motorista"><Icon n="download" s={13}/> Motorista (PDF)</button>}
            <button className="btn btn-primary btn-sm" disabled={!!motivoBloqueio(r)} title={motivoBloqueio(r)||"Concluir romaneio"} onClick={()=>concluir(r)}><Icon n="check" s={14}/> Concluir</button>
          </div>
        </div>
        <div className="rom-kpis">
          <div><b className="num">{r.paradas.length}</b><span>paradas · {ent}E / {col}C</span></div>
          <div><b className="num">{nf(r.km,1)} km</b><span>distância</span></div>
          <div><b className="num">{fmtMin(r.tempoMin)}</b><span>tempo (ida/volta CD)</span></div>
          <div><b className="num">{money(r.custo)}</b><span>custo est.</span></div>
          <div><b className="num">{r.ocupacao}%</b><span>ocupação</span></div>
        </div>
        <div className="rom-seq">
          <div className="rom-stop depot"><span className="rom-dep out"><Icon n="up" s={11}/></span> Saída · Braskim (SJC/SP)</div>
          {r.paradas.map(p=>(
            <div className="rom-stop" key={p.seq}>
              <span className="rom-seq-n">{p.seq}</span>
              <div className="rom-stop-m"><div className="rom-stop-t">{p.nome}<span className={"mini-badge "+(p.tipo==="coleta"?"col":"ent")}>{p.tipo==="coleta"?"Coleta":"Entrega"}</span></div>
                <div className="rom-stop-s">{p.cidade}/{p.uf}{p.tipo==="entrega"?" · "+p.m3+" m³":""}</div></div>
            </div>))}
          <div className="rom-stop depot"><span className="rom-dep in"><Icon n="down" s={11}/></span> Retorno · Braskim (SJC/SP)</div>
        </div>
      </div>);})}

    {concluidos.length>0&&<>
      <div className="rom-list-h"><Icon n="check" s={14} c="#2e9e5b"/> Concluídos · ordenados por Nº romaneio NOMUS</div>
      <div className="rom-list">
        {concluidos.map(r=>{const ent=r.paradas.filter(p=>p.tipo==="entrega").length;const col=r.paradas.filter(p=>p.tipo==="coleta").length;
          return(
          <div className="rom-row" key={r.id}>
            <div className="rom-row-nomus"><label>Nº NOMUS</label>
              <input className="form-input" value={r.nomusRom||""} placeholder="—" onChange={e=>setNomus(r.id,e.target.value)}/></div>
            <div className="rom-row-id"><div className="rom-row-num">{r.numero}</div>
              <div className="rom-row-meta">Exped. {fmtDate(r.dataExpedicao)} · {r.clienteRetira?"Cliente retira":r.viaTransportadora?("Transp.: "+(r.transportadora||"—")):r.placa+" · "+r.tipo}</div></div>
            <div className="rom-row-kpi"><span className="num t-strong">{r.paradas.length}</span> paradas · {ent}E/{col}C</div>
            {r.clienteRetira&&<span className="badge badge-info">Cliente retira</span>}
            {r.viaTransportadora&&<span className="badge badge-info">Transportadora</span>}
            <span className="badge badge-ok">Concluído</span>
            <div className="rom-row-act">
              <button className="alt-btn ico" onClick={()=>gerarSeparacao(r)} title="Separação (PDF)"><Icon n="download" s={14}/></button>
              {!r.clienteRetira&&!r.viaTransportadora&&<button className="alt-btn ico" onClick={()=>gerarMotorista(r)} title="Motorista (PDF)"><Icon n="truck" s={14}/></button>}
              <button className="alt-btn ico" onClick={()=>setStatus(r.id,"aberto")} title="Reabrir"><Icon n="rotate" s={14}/></button>
            </div>
          </div>);})}
      </div>
    </>}
  </div>);
}

/* ---------------- STUB ---------------- */
function Stub({label}){
  return(<div className="stub"><div><div className="stub-ico"><Icon n="clock" s={28}/></div>
    <h2>{label}</h2><p>Este módulo faz parte do plano de desenvolvimento e será construído nas próximas fases.</p></div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
