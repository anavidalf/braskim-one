function AddList({label,items,onChange,placeholder}){
  const [v,setV]=useState("");
  const add=()=>{const t=v.trim();if(!t)return;onChange([...(items||[]),t]);setV("");};
  return <div>
    {label&&<div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">{label}</div>}
    <div className="flex gap-2"><input value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();add();}}} placeholder={placeholder||"Adicionar…"} className="flex-1 text-sm border border-slate-300 rounded-md px-2.5 py-1.5 outline-none focus:ring-2 ring-brand/30"/>
      <button onClick={add} className="px-3 py-1.5 text-sm border border-brand text-brand rounded-md hover:bg-brand/5 whitespace-nowrap">+ Adicionar</button></div>
    {(items||[]).length>0&&<div className="flex flex-wrap gap-1.5 mt-2">{items.map((it,i)=>(
      <span key={i} className="inline-flex items-center gap-1 text-xs bg-slate-100 text-slate-700 pl-2 pr-1 py-1 rounded-md">{it}
        <button onClick={()=>onChange(items.filter((_,j)=>j!==i))} className="text-slate-400 hover:text-red-500 w-4 h-4 grid place-items-center">×</button></span>))}</div>}
  </div>;
}
// Editor de texto simples com negrito e lista numerada automática
function RichText({label,value,onChange,placeholder}){
  const ref=useRef(null);
  useEffect(()=>{ if(ref.current&&ref.current.innerHTML!==(value||"")) ref.current.innerHTML=value||""; },[]);
  const cmd=(c)=>{ document.execCommand(c,false,null); ref.current&&ref.current.focus(); onChange&&onChange(ref.current.innerHTML); };
  const onInput=()=>onChange&&onChange(ref.current.innerHTML);
  const vazio=!value||value==="<br>"||value.replace(/<[^>]*>/g,"").trim()==="";
  return <div>
    {label&&<div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">{label}</div>}
    <div className="border border-slate-300 rounded-md overflow-hidden focus-within:ring-2 ring-brand/30">
      <div className="flex items-center gap-0.5 px-2 py-1.5 border-b border-slate-200 bg-slate-50">
        <button type="button" onMouseDown={e=>{e.preventDefault();cmd("bold");}} className="w-8 h-8 grid place-items-center rounded hover:bg-slate-200 font-bold text-slate-700" title="Negrito (Ctrl+B)">N</button>
        <button type="button" onMouseDown={e=>{e.preventDefault();cmd("italic");}} className="w-8 h-8 grid place-items-center rounded hover:bg-slate-200 italic text-slate-700" title="Itálico (Ctrl+I)">I</button>
        <span className="w-px h-5 bg-slate-300 mx-1"/>
        <button type="button" onMouseDown={e=>{e.preventDefault();cmd("insertOrderedList");}} className="w-8 h-8 grid place-items-center rounded hover:bg-slate-200 text-slate-700" title="Lista numerada">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
        </button>
        <button type="button" onMouseDown={e=>{e.preventDefault();cmd("insertUnorderedList");}} className="w-8 h-8 grid place-items-center rounded hover:bg-slate-200 text-slate-700" title="Lista com marcadores">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/></svg>
        </button>
        <span className="w-px h-5 bg-slate-300 mx-1"/>
        <button type="button" onMouseDown={e=>{e.preventDefault();cmd("outdent");}} className="w-8 h-8 grid place-items-center rounded hover:bg-slate-200 text-slate-700" title="Diminuir recuo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="21" y1="6" x2="7" y2="6"/><line x1="21" y1="12" x2="11" y2="12"/><line x1="21" y1="18" x2="7" y2="18"/><polyline points="7 8 3 12 7 16"/></svg>
        </button>
        <button type="button" onMouseDown={e=>{e.preventDefault();cmd("indent");}} className="w-8 h-8 grid place-items-center rounded hover:bg-slate-200 text-slate-700" title="Aumentar recuo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="17" y2="6"/><line x1="13" y1="12" x2="3" y2="12"/><line x1="3" y1="18" x2="17" y2="18"/><polyline points="17 8 21 12 17 16"/></svg>
        </button>
      </div>
      <div className="relative">
        <div ref={ref} contentEditable suppressContentEditableWarning onInput={onInput} style={{textAlign:"justify"}} className="min-h-[140px] px-3 py-2 text-sm text-slate-700 outline-none [&_ol]:list-decimal [&_ol]:pl-6 [&_ul]:list-disc [&_ul]:pl-6 [&_li]:mb-1"/>
        {vazio&&<div className="absolute top-2 left-3 text-sm text-slate-400 pointer-events-none">{placeholder||"Digite aqui…"}</div>}
      </div>
    </div>
  </div>;
}
// ---------- DICIONÁRIOS DE COMPETÊNCIAS ----------
// Nível exigido é definido POR CARGO (no descritivo), não no dicionário.
const NIVEIS_EXIG=[["1","Básico"],["2","Intermediário"],["3","Avançado"],["4","Referência"]];
const rotuloNivel=n=>{const m=NIVEIS_EXIG.find(([k])=>String(k)===String(n));return m?m[1]:"—";};
const GRUPOS_COMP={
  comportamental:["Relacionamento e Comunicação","Execução e Entrega","Liderança e Influência","Pensamento e Análise","Adaptabilidade e Aprendizado","Ética e Postura"],
  tecnica:["Produção e Processo","Qualidade","Segurança e Meio Ambiente","Sistemas e Ferramentas","Regulatório e Normas","Gestão e Planejamento"],
};
const nPerguntas=c=>(c?.perguntas||[]).filter(p=>String(p||"").trim()).length;

function CompetenciasView({competencias,setCompetencias,cargos,role,busca,notify}){
  const isRH=role==="RH";
  const [tipo,setTipo]=useState("comportamental");
  const [aba,setAba]=useState("dic");
  const [q,setQ]=useState("");
  const [edit,setEdit]=useState(null);
  const [mostrarInativas,setMostrarInativas]=useState(true);
  const [ver,setVer]=useState(null);
  const doTipo=(competencias||[]).filter(c=>c.tipo===tipo);
  const termo=(q||busca||"").trim().toLowerCase();
  const filtrada=doTipo.filter(c=>{
    if(!mostrarInativas&&c.status==="INATIVA")return false;
    if(!termo)return true;
    return [c.nome,c.conceito,c.indicador,c.grupo,...(c.perguntas||[])].filter(Boolean).join(" ").toLowerCase().includes(termo);
  }).sort((a,b)=>(a.grupo||"").localeCompare(b.grupo||"","pt-BR")||(a.nome||"").localeCompare(b.nome||"","pt-BR"));
  const salvar=comp=>{
    setCompetencias(prev=>{
      const i=prev.findIndex(x=>x.id===comp.id);
      if(i>=0){const c=[...prev];c[i]={...comp,atualizadoEm:hoje()};return c;}
      return [...prev,{...comp,criadoEm:hoje(),atualizadoEm:hoje()}];
    });
    notify(`"${comp.nome}" salva ✓`); setEdit(null);
  };
  const excluir=c=>{ if(!window.confirm(`Excluir a competência "${c.nome}"? Esta ação não pode ser desfeita.`))return;
    setCompetencias(prev=>prev.filter(x=>x.id!==c.id)); notify("Competência excluída."); };
  const alternar=c=>setCompetencias(prev=>prev.map(x=>x.id===c.id?{...x,status:x.status==="INATIVA"?"ATIVA":"INATIVA",atualizadoEm:hoje()}:x));
  const exportarExcel=()=>{
    try{
      const linhas=doTipo.map(c=>({ "Competência":c.nome||"", "Grupo":c.grupo||"", "Conceito":c.conceito||"", "Indicador":c.indicador||"",
        "Perguntas relacionadas":(c.perguntas||[]).filter(Boolean).map((p,i)=>`${i+1}. ${p}`).join("\n"), "Status":c.status==="INATIVA"?"Inativa":"Ativa" }));
      if(!linhas.length){notify("Nada para exportar.");return;}
      const ws=XLSX.utils.json_to_sheet(linhas);const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,tipo==="tecnica"?"Técnicas":"Comportamentais");
      XLSX.writeFile(wb,`dicionario-competencias-${tipo}.xlsx`);
    }catch(e){notify("Falha ao exportar: "+String(e.message||e).slice(0,60));}
  };
  const nComp=(competencias||[]).filter(c=>c.tipo==="comportamental").length;
  const nTec=(competencias||[]).filter(c=>c.tipo==="tecnica").length;
  const nCore=doTipo.reduce((s,c)=>s+nPerguntas(c),0);
  const nIncompletas=doTipo.filter(c=>!String(c.indicador||"").trim()||nPerguntas(c)===0).length;
  const card=(t,v,sub,cor)=><div className="bg-white rounded-xl border border-slate-200 shadow-sm px-4 py-3">
    <div className="text-[11px] uppercase tracking-wide text-slate-400">{t}</div>
    <div className={"text-3xl font-bold "+(cor||"text-navy")}>{v}</div>
    {sub&&<div className="text-[11px] text-slate-400 mt-0.5">{sub}</div>}</div>;

  if(edit) return <CompetenciaForm comp={edit} tipo={tipo} existentes={competencias||[]} onClose={()=>setEdit(null)} onSave={salvar}/>;

  return <div className="p-5 space-y-4">
    <div className="flex items-center justify-between flex-wrap gap-3">
      <div className="flex items-center gap-2.5">
        <span className="w-10 h-10 grid place-items-center rounded-xl bg-brand/10 text-brand"><IcBuilding size={22}/></span>
        <div><h1 className="text-xl font-bold text-navy">Competências</h1>
          <p className="text-sm text-slate-500">Dicionário corporativo — alimenta os descritivos de cargo, avaliações e PDI</p></div>
      </div>
      <div className="flex items-center gap-2">
        <button onClick={exportarExcel} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5"><IcDownload/>Exportar Excel</button>
        {isRH&&<button onClick={()=>setEdit({novo:true})} className="bg-brand hover:bg-navy text-white text-sm font-medium px-4 py-2 rounded-md shadow-sm">+ Nova competência</button>}
      </div>
    </div>

    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
      {card("Comportamentais",nComp,"Soft skills · atitudes")}
      {card("Técnicas",nTec,"Hard skills · conhecimentos e habilidades")}
      {card("Perguntas neste dicionário",nCore,"Reutilizáveis em avaliação e entrevista")}
      {card("Cadastros incompletos",nIncompletas,"Sem indicador ou sem perguntas",nIncompletas?"text-amber-500":"text-navy")}
    </div>

    <div className="flex gap-0.5 border-b border-slate-200">
      {[["comportamental","Comportamentais (soft skills)"],["tecnica","Técnicas (hard skills)"],["matriz","Matriz por cargo"]].map(([k,l])=>(
        <button key={k} onClick={()=>k==="matriz"?setAba("matriz"):(setAba("dic"),setTipo(k))} className={"px-4 py-2 text-sm font-medium border-b-2 "+((k==="matriz"?aba==="matriz":aba==="dic"&&tipo===k)?"border-brand text-brand":"border-transparent text-slate-400 hover:text-slate-600")}>{l}</button>))}
    </div>

    {aba==="matriz" ? <MatrizCompetencias competencias={competencias||[]} cargos={cargos||[]} notify={notify}/> : <>
    <div className="flex items-center gap-3 flex-wrap">
      <div className="flex-1 min-w-[260px] flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 shadow-sm">
        <span className="text-slate-400"><IcSearch size={16}/></span>
        <input value={q} onChange={e=>setQ(e.target.value)} className="flex-1 text-sm outline-none bg-transparent text-slate-700 placeholder-slate-400" placeholder="Buscar por competência, grupo ou definição…"/>
      </div>
      <label className="flex items-center gap-2 text-sm text-slate-500 whitespace-nowrap px-1 cursor-pointer select-none"><input type="checkbox" checked={mostrarInativas} onChange={e=>setMostrarInativas(e.target.checked)} className="accent-brand"/>Mostrar inativas</label>
    </div>

    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto">
      <table className="w-full text-sm min-w-[760px]">
        <thead><tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
          <th className="text-left font-semibold px-4 py-2.5">Competência</th>
          <th className="text-left font-semibold px-3 py-2.5">Grupo</th>
          <th className="text-center font-semibold px-3 py-2.5">Indicador</th>
          <th className="text-center font-semibold px-3 py-2.5">Perguntas</th>
          <th className="text-center font-semibold px-3 py-2.5">Status</th>
          <th className="text-center font-semibold px-4 py-2.5">Ações</th></tr></thead>
        <tbody>
          {filtrada.map(c=>{const np=nPerguntas(c);const temInd=!!String(c.indicador||"").trim();return (
            <tr key={c.id} className="border-t border-slate-100 hover:bg-slate-50">
              <td className="px-4 py-2.5"><button onClick={()=>setVer(c)} className="font-medium text-navy hover:text-brand text-left">{c.nome}</button>
                {c.conceito&&<div className="text-[11px] text-slate-400 line-clamp-1 max-w-md">{c.conceito}</div>}</td>
              <td className="px-3 py-2.5 text-slate-600">{c.grupo||"—"}</td>
              <td className="px-3 py-2.5 text-center">{temInd
                ? <span className="text-[11px] font-medium px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600">Definido</span>
                : <span className="text-[11px] text-amber-500">Pendente</span>}</td>
              <td className="px-3 py-2.5 text-center"><span className={"text-xs font-semibold "+(np?"text-navy":"text-amber-500")}>{np}</span></td>
              <td className="px-3 py-2.5 text-center">{c.status==="INATIVA"
                ? <span className="text-[11px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">Inativa</span>
                : <span className="text-[11px] px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600">Ativa</span>}</td>
              <td className="px-4 py-2.5"><div className="flex items-center justify-center gap-1.5">
                <button onClick={()=>setVer(c)} className="text-xs px-2.5 py-1 border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50">Ver</button>
                {isRH&&<><button onClick={()=>setEdit(c)} className="text-xs px-2.5 py-1 border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50">Editar</button>
                <button onClick={()=>alternar(c)} className="text-xs px-2.5 py-1 border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50">{c.status==="INATIVA"?"Ativar":"Inativar"}</button>
                <button onClick={()=>excluir(c)} className="text-xs px-2 py-1 border border-slate-300 rounded-md text-red-500 hover:bg-red-50">Excluir</button></>}
              </div></td>
            </tr>);})}
          {filtrada.length===0&&<tr><td colSpan="6" className="px-4 py-12 text-center text-slate-400">
            {doTipo.length===0?<>Nenhuma competência {tipo==="tecnica"?"técnica":"comportamental"} cadastrada ainda.{isRH&&<> Clique em <b>+ Nova competência</b> para começar.</>}</>:"Nenhuma competência encontrada com esse filtro."}
          </td></tr>}
        </tbody>
      </table>
    </div>
    </>}

    {ver&&<div className="fixed inset-0 z-50 grid place-items-center bg-navy/40 p-4" onClick={()=>setVer(null)}>
      <div className="bg-white rounded-lg shadow-2xl w-full max-w-2xl max-h-[88vh] overflow-auto" onClick={e=>e.stopPropagation()}>
        <div className="p-4 border-b border-slate-200 flex items-start justify-between">
          <div><h2 className="text-lg font-bold text-navy">{ver.nome}</h2>
            <p className="text-sm text-slate-500">{ver.grupo||"Sem grupo"} · {ver.tipo==="tecnica"?"Técnica (hard skill)":"Comportamental (soft skill)"}</p></div>
          <button onClick={()=>setVer(null)} className="text-slate-400 hover:text-slate-600 text-xl">✕</button></div>
        <div className="p-4 space-y-4">
          {ver.conceito&&<div><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">Conceito</div>
            <p className="text-sm text-slate-700 text-justify">{ver.conceito}</p></div>}
          {ver.indicador&&<div><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">Indicador</div>
            <p className="text-sm text-slate-700 text-justify whitespace-pre-line">{ver.indicador}</p></div>}
          <div><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">Perguntas relacionadas <span className="text-slate-300 normal-case">· avaliação e entrevista</span></div>
            {(ver.perguntas||[]).filter(Boolean).length
              ? <ol className="list-decimal pl-5 space-y-1.5">{(ver.perguntas||[]).filter(Boolean).map((p,i)=>
                  <li key={i} className="text-sm text-slate-700 text-justify">{p}</li>)}</ol>
              : <p className="text-sm text-slate-300">Nenhuma pergunta cadastrada.</p>}</div>
          <div className="border-t border-slate-200 pt-3">
            <div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">Exigida nos cargos</div>
            {(()=>{const usos=(cargos||[]).map(cg=>{const r=(cg.competenciasReq||[]).find(x=>x.compId===ver.id);return r?{cargo:cg,nivel:r.nivel}:null;}).filter(Boolean);
              return usos.length
                ? <div className="flex flex-wrap gap-1.5">{usos.map(u=><span key={u.cargo.id} className="text-[11px] bg-slate-100 text-slate-700 px-2 py-1 rounded-md">{u.cargo.titulo} · nível {u.nivel}</span>)}</div>
                : <p className="text-sm text-slate-300">Ainda não vinculada a nenhum cargo.</p>;})()}
          </div>
        </div>
      </div>
    </div>}
  </div>;
}

function MatrizCompetencias({competencias,cargos,notify}){
  const [dep,setDep]=useState("");
  const [soComDef,setSoComDef]=useState(false);
  const [tipoF,setTipoF]=useState("");
  const comps=(competencias||[]).filter(c=>c.status!=="INATIVA"&&(!tipoF||c.tipo===tipoF))
    .sort((a,b)=>(a.tipo||"").localeCompare(b.tipo||"")||(a.grupo||"").localeCompare(b.grupo||"","pt-BR")||(a.nome||"").localeCompare(b.nome||"","pt-BR"));
  const nivelDe=(cg,compId)=>{const r=(cg.competenciasReq||[]).find(x=>x.compId===compId);return r?Number(r.nivel)||0:0;};
  const listaCargos=(cargos||[]).filter(cg=>cg.status!=="INATIVO")
    .filter(cg=>!dep||cg.departamento===dep)
    .filter(cg=>!soComDef||(cg.competenciasReq||[]).length>0)
    .sort((a,b)=>(a.departamento||"").localeCompare(b.departamento||"","pt-BR")||(a.titulo||"").localeCompare(b.titulo||"","pt-BR"));
  const deps=[...new Set((cargos||[]).map(c=>c.departamento).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"pt-BR"));
  const pontCargo=cg=>comps.reduce((s,c)=>s+nivelDe(cg,c.id),0);
  const pontComp=c=>listaCargos.reduce((s,cg)=>s+nivelDe(cg,c.id),0);
  const usosComp=c=>listaCargos.filter(cg=>nivelDe(cg,c.id)>0).length;
  const corNivel=n=>n===0?"text-slate-200":n===1?"bg-slate-100 text-slate-600":n===2?"bg-sky-100 text-sky-700":n===3?"bg-brand/15 text-brand":"bg-emerald-100 text-emerald-700";
  const exportar=()=>{
    try{
      if(!comps.length||!listaCargos.length){notify("Nada para exportar.");return;}
      const linhas=comps.map(c=>{
        const o={"Tipo":c.tipo==="tecnica"?"Técnica":"Comportamental","Grupo":c.grupo||"","Competência":c.nome||""};
        listaCargos.forEach(cg=>{const n=nivelDe(cg,c.id);o[cg.titulo]=n||"";});
        o["Cargos que exigem"]=usosComp(c); o["Pontuação total"]=pontComp(c);
        return o;
      });
      const tot={"Tipo":"","Grupo":"","Competência":"PONTUAÇÃO DO CARGO"};
      listaCargos.forEach(cg=>{tot[cg.titulo]=pontCargo(cg);});
      linhas.push(tot);
      const ws=XLSX.utils.json_to_sheet(linhas);const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,"Matriz");XLSX.writeFile(wb,"matriz-competencias-cargos.xlsx");
    }catch(e){notify("Falha ao exportar: "+String(e.message||e).slice(0,60));}
  };
  const th="text-[11px] font-semibold text-slate-500 uppercase tracking-wide";
  return <div className="space-y-3">
    <div className="flex items-center gap-3 flex-wrap">
      <select value={tipoF} onChange={e=>setTipoF(e.target.value)} className="text-sm border border-slate-300 rounded-md px-2.5 py-2 bg-white">
        <option value="">Todas as competências</option><option value="comportamental">Só comportamentais</option><option value="tecnica">Só técnicas</option></select>
      <select value={dep} onChange={e=>setDep(e.target.value)} className="text-sm border border-slate-300 rounded-md px-2.5 py-2 bg-white">
        <option value="">Todos os departamentos</option>{deps.map(d=><option key={d}>{d}</option>)}</select>
      <label className="flex items-center gap-2 text-sm text-slate-500 cursor-pointer select-none"><input type="checkbox" checked={soComDef} onChange={e=>setSoComDef(e.target.checked)} className="accent-brand"/>Só cargos já mapeados</label>
      <div className="ml-auto flex items-center gap-3">
        <div className="flex items-center gap-2 text-[11px] text-slate-400">
          {NIVEIS_EXIG.map(([k,l])=><span key={k} className={"px-1.5 py-0.5 rounded font-semibold "+corNivel(Number(k))}>{k} {l}</span>)}
        </div>
        <button onClick={exportar} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5"><IcDownload/>Exportar</button>
      </div>
    </div>

    {(!comps.length||!listaCargos.length)
      ? <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-12 text-center text-slate-400 text-sm">
          {!comps.length?"Cadastre competências para montar a matriz.":"Nenhum cargo encontrado com esse filtro."}
        </div>
      : <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-auto max-h-[70vh]">
        <table className="text-sm border-collapse">
          <thead className="sticky top-0 z-20">
            <tr className="bg-slate-50">
              <th className={"sticky left-0 z-30 bg-slate-50 text-left px-3 py-2 border-b border-r border-slate-200 min-w-[240px] "+th}>Competência</th>
              {listaCargos.map(cg=><th key={cg.id} className={"px-1 py-2 border-b border-slate-200 align-bottom "+th} title={`${cg.titulo} · ${cg.departamento||""}`}>
                <div className="h-32 w-8 mx-auto flex items-end justify-center">
                  <span className="whitespace-nowrap origin-bottom-left translate-x-3 -rotate-90 text-[11px] font-medium text-slate-600 normal-case tracking-normal">{truncTxt(cg.titulo,22)}</span>
                </div></th>)}
              <th className={"px-2 py-2 border-b border-l border-slate-200 bg-slate-100 "+th}>Cargos</th>
              <th className={"px-2 py-2 border-b border-slate-200 bg-slate-100 "+th}>Pontos</th>
            </tr>
          </thead>
          <tbody>
            {comps.map((c,i)=>{
              const grupoAnterior=i>0?comps[i-1].tipo:null;
              const cabecalhoTipo=c.tipo!==grupoAnterior;
              return <React.Fragment key={c.id}>
                {cabecalhoTipo&&<tr><td colSpan={listaCargos.length+3} className="sticky left-0 bg-slate-100/70 px-3 py-1.5 text-[11px] font-bold uppercase tracking-wide text-slate-500 border-y border-slate-200">
                  {c.tipo==="tecnica"?"Técnicas (hard skills)":"Comportamentais (soft skills)"}</td></tr>}
                <tr className="hover:bg-slate-50 group">
                  <td className="sticky left-0 z-10 bg-white group-hover:bg-slate-50 px-3 py-1.5 border-b border-r border-slate-200">
                    <div className="font-medium text-navy text-[13px]">{c.nome}</div>
                    {c.grupo&&<div className="text-[10px] text-slate-400">{c.grupo}</div>}</td>
                  {listaCargos.map(cg=>{const n=nivelDe(cg,c.id);return (
                    <td key={cg.id} className="border-b border-slate-100 text-center px-1 py-1.5">
                      {n>0
                        ? <span className={"inline-grid place-items-center w-6 h-6 rounded font-bold text-[11px] "+corNivel(n)} title={`${cg.titulo}: ${rotuloNivel(n)}`}>{n}</span>
                        : <span className="text-slate-200">·</span>}
                    </td>);})}
                  <td className="border-b border-l border-slate-200 bg-slate-50 text-center text-xs font-semibold text-slate-600 px-2">{usosComp(c)}</td>
                  <td className="border-b border-slate-200 bg-slate-50 text-center text-xs font-semibold text-navy px-2">{pontComp(c)}</td>
                </tr>
              </React.Fragment>;})}
            <tr className="bg-slate-100 font-semibold">
              <td className="sticky left-0 z-10 bg-slate-100 px-3 py-2 border-r border-slate-200 text-xs uppercase tracking-wide text-slate-500">Pontuação do cargo</td>
              {listaCargos.map(cg=><td key={cg.id} className="text-center text-xs text-navy px-1 py-2">{pontCargo(cg)||"—"}</td>)}
              <td className="border-l border-slate-200 px-2"></td><td className="px-2"></td>
            </tr>
          </tbody>
        </table>
      </div>}

                    <button onClick={()=>moverPergunta(i,1)} disabled={i===(f.perguntas||[]).length-1} className="w-6 h-5 grid place-items-center text-slate-400 hover:text-brand disabled:opacity-30" title="Descer">▼</button>

}

      {!lateral&&caminhos.length>1&&<div className="text-[11px] text-amber-600 mt-1">Este cargo pertence a {caminhos.length} trilhas — escolha por qual promover.</div>}
      <div className="text-sm text-slate-500 mt-2">{pessoa.vinculo.cargo} <span className="text-slate-300">→</span> {destino?<b className="text-navy">{destino.titulo}</b>:<span className="text-amber-600">sem destino disponível</span>}</div>

    </div></div>;

// --- Ordenação de tabelas (reutilizável) ---
function useSort(defKey,defDir){
  const [sort,setSort]=useState({key:defKey||null,dir:defDir||"asc"});
  const toggle=key=>setSort(s=>s.key===key?{key,dir:s.dir==="asc"?"desc":"asc"}:{key,dir:"asc"});
  const sortBy=(arr,accessors)=>{
    if(!sort.key||!accessors[sort.key])return arr;
    const get=accessors[sort.key];
    const mul=sort.dir==="asc"?1:-1;
    return [...arr].sort((a,b)=>{
      let va=get(a),vb=get(b);
      if(va==null)va="";if(vb==null)vb="";
      if(typeof va==="number"&&typeof vb==="number")return (va-vb)*mul;
      return String(va).localeCompare(String(vb),"pt-BR",{numeric:true,sensitivity:"base"})*mul;
    });
  };
  return {sort,toggle,sortBy};
}
const SortTh=({label,col,sort,onSort,align="left",className=""})=>{
  const active=sort.key===col;
  const arrow=active?(sort.dir==="asc"?"▲":"▼"):"";
  const just=align==="center"?"justify-center":align==="right"?"justify-end":"justify-start";
  return (
    <th className={"font-semibold px-3 py-2.5 select-none cursor-pointer group "+(align==="center"?"text-center":align==="right"?"text-right":"text-left")+" "+className}
        onClick={()=>onSort(col)} title="Ordenar">
      <span className={"inline-flex items-center gap-1 "+just}>
        {label}
        <span className={"text-[9px] transition-opacity "+(active?"opacity-100 text-brand":"opacity-0 group-hover:opacity-40")}>{arrow||"▲"}</span>
      </span>
    </th>
  );
};

function DocsTab({pessoa,onPatch,configs}){
  const pessoaRef=React.useRef(pessoa);

  const tipos=(configs?.tiposDocumento||[]).filter(t=>t.ativo);
  const docs=pessoa.documentos||[];
  const [formAberto,setFormAberto]=useState(null);

  const salvarDoc=f=>{
    const tipo=tipos.find(t=>t.id===f.tipoId);
    if(!tipo){notify&&notify("Selecione um tipo de documento.");return;}
    const status=tipo.temValidade&&f.validade?(f.validade<hoje()?"VENCIDO":"VÁLIDO"):"N/A";
    const doc={id:f.id||uid(),tipoId:f.tipoId,tipo:tipo.nome,validade:f.validade||"",link:f.link||"",status,obrigatorio:tipo.obrigatorio};
    const docsAtuais=pessoaRef.current.documentos||[];
    const novos=f.id?docsAtuais.map(d=>d.id===f.id?doc:d):[...docsAtuais,doc];
    onPatch({...pessoaRef.current,documentos:novos},"Documentos atualizados");
    setFormAberto(null);
  };

    if(!window.confirm("Excluir este documento?"))return;
    const docsAtuais=pessoaRef.current.documentos||[];
    onPatch({...pessoaRef.current,documentos:docsAtuais.filter(d=>d.id!==id)},"Documento removido");
  };

  // separa obrigatórios e opcionais
  const tiposObrig=tipos.filter(t=>t.obrigatorio);
  const tiposOpcional=tipos.filter(t=>!t.obrigatorio);

  // doc já cadastrado para um tipo
  const docDe=tipoId=>docs.find(d=>d.tipoId===tipoId);

  const inpC="w-full text-sm border border-slate-200 rounded-md px-2.5 py-2 outline-none focus:ring-2 ring-brand/30";

  const FormDoc=({f,setF,onSalvar,onCancelar})=><div className="bg-brand/5 border border-brand/20 rounded-xl p-4 space-y-3 mt-2">
    <div className="text-sm font-semibold text-navy">{f.id?"Editar documento":"Cadastrar documento"}</div>
    <div className="grid grid-cols-2 gap-3">
      <div className="col-span-2">
        <label className="text-xs text-slate-500 uppercase tracking-wide">Tipo de Documento *</label>
        <select value={f.tipoId||""} onChange={e=>setF(x=>({...x,tipoId:e.target.value}))} className={inpC+" mt-1"}>
          <option value="">Selecione…</option>
          {tipos.map(t=><option key={t.id} value={t.id}>{t.nome}{t.obrigatorio?" ★":""}</option>)}
        </select>
      </div>
      {tipos.find(t=>t.id===f.tipoId)?.temValidade&&
        <div><label className="text-xs text-slate-500 uppercase tracking-wide">Data de Validade</label>
          <input type="text" value={f.validadeDisplay||brDate(f.validade)||""} onChange={e=>{const v=e.target.value.replace(/\D/g,"").slice(0,8);const mask=v.length<=2?v:v.length<=4?v.slice(0,2)+"/"+v.slice(2):v.slice(0,2)+"/"+v.slice(2,4)+"/"+v.slice(4);setF(x=>({...x,validadeDisplay:mask,validade:v.length===8?v.slice(4)+"-"+v.slice(2,4)+"-"+v.slice(0,2):""}));}} placeholder="DD/MM/AAAA" maxLength={10} className={inpC+" mt-1"}/></div>}
      <div className={tipos.find(t=>t.id===f.tipoId)?.temValidade?"":"col-span-2"}>
        <label className="text-xs text-slate-500 uppercase tracking-wide">Link Google Drive</label>
        <input value={f.link||""} onChange={e=>setF(x=>({...x,link:e.target.value}))} placeholder="https://drive.google.com/…" className={inpC+" mt-1"}/>
      </div>
    </div>

      <button onClick={onCancelar} className="px-3 py-1.5 text-sm border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50">Cancelar</button>
      <button onClick={()=>onSalvar(f)} className="px-4 py-1.5 text-sm bg-brand hover:bg-navy text-white rounded-md font-medium">Salvar</button>
    </div>
  </div>;

  const DocRow=({d,onEdit,onExcluir})=>{
    const vencido=d.validade&&d.validade<hoje();
    return <div className="flex items-center gap-3 px-4 py-3 border-t border-slate-100 hover:bg-slate-50">
      <div className="shrink-0">
        {d.link?<a href={d.link} target="_blank" rel="noreferrer" className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 grid place-items-center hover:bg-blue-100" title="Abrir no Google Drive">

        <button onClick={onExcluir} className="p-1.5 text-slate-400 hover:text-red-500" title="Excluir"><IcTrash/></button>
      </div>
    </div>;
  };

  const [fDoc,setFDoc]=useState({});
  const abrirForm=(tipoId="",docExist=null)=>{
    setFDoc(docExist?{...docExist,validadeDisplay:brDate(docExist.validade).replace(/—/,"")}:{tipoId,validade:"",validadeDisplay:"",link:""});
    setFormAberto(tipoId||"novo");
  };

  return <div className="max-w-3xl space-y-6">
    {/* Documentos Obrigatórios */}
    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div className="px-4 py-3 border-b border-slate-100 flex items-center gap-2">
        <span className="text-sm font-semibold text-navy">Documentos Obrigatórios</span>
        <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">{tiposObrig.filter(t=>!docDe(t.id)).length} pendente(s)</span>
      </div>
      {tiposObrig.map(t=>{
        const d=docDe(t.id);
        return <div key={t.id}>
          {d?<DocRow d={d} onEdit={()=>abrirForm(t.id,d)} onExcluir={()=>excluirDoc(d.id)}/>
          :<div className="flex items-center gap-3 px-4 py-3 border-t border-slate-100 bg-red-50/40">
            <div className="w-8 h-8 rounded-lg bg-red-100 text-red-400 grid place-items-center"><IcFile/></div>
            <div className="flex-1"><div className="text-sm font-medium text-slate-700">{t.nome}</div>
              <div className="text-xs text-red-400">Não cadastrado</div></div>
            <button onClick={()=>abrirForm(t.id)} className="text-xs px-3 py-1.5 bg-brand hover:bg-navy text-white rounded-md font-medium">+ Cadastrar</button>
          </div>}
          {formAberto===t.id&&<div className="px-4 pb-4"><FormDoc f={fDoc} setF={setFDoc} onSalvar={salvarDoc} onCancelar={()=>setFormAberto(null)}/></div>}
        </div>;
      })}
      {tiposObrig.length===0&&<div className="text-sm text-slate-400 text-center py-6">Nenhum tipo obrigatório configurado em Configurações.</div>}
    </div>

    {/* Documentos Opcionais */}
    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
        <span className="text-sm font-semibold text-navy">Outros Documentos</span>

      {docs.filter(d=>!tiposObrig.find(t=>t.id===d.tipoId)).map(d=>
        <div key={d.id}>
          <DocRow d={d} onEdit={()=>abrirForm(d.tipoId,d)} onExcluir={()=>excluirDoc(d.id)}/>
          {formAberto===d.tipoId+"_edit"&&<div className="px-4 pb-4"><FormDoc f={fDoc} setF={setFDoc} onSalvar={salvarDoc} onCancelar={()=>setFormAberto(null)}/></div>}
        </div>)}
      {docs.filter(d=>!tiposObrig.find(t=>t.id===d.tipoId)).length===0&&!formAberto&&
        <div className="text-sm text-slate-400 text-center py-6">Nenhum documento adicional cadastrado.</div>}
    </div>
  </div>;
}

        <div className="text-[11px] uppercase tracking-wide text-brand font-semibold pt-1">Vínculo</div>
        <div className="grid grid-cols-2 gap-3">
          <L t="Cargo *"><select value={f.vinculo.cargo} onChange={e=>escolherCargo(e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5"><option value="">Selecione o cargo</option>{[...(cargos||[])].filter(c=>c.status!=="INATIVO").sort((a,b)=>a.titulo.localeCompare(b.titulo)).map(c=><option key={c.id} value={c.titulo}>{c.titulo}</option>)}</select></L>
          <L t="Departamento * 🔒"><input value={cargoSel?.departamento||f.vinculo.setor||""} readOnly disabled title="Definido pelo cargo — edite no catálogo de Cargos" className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 bg-slate-100 text-slate-500 cursor-not-allowed"/></L>
          <L t="CBO 🔒"><input value={cargoSel?.cbo||f.vinculo.cbo||""} readOnly disabled title="Definido pelo cargo — edite no catálogo de Cargos" className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 bg-slate-100 text-slate-500 cursor-not-allowed"/></L>
          <L t="Unidade"><Inp value={f.vinculo.unidade} onChange={e=>setV("unidade",e.target.value)}/></L><L t="Líder direto"><Inp value={f.vinculo.lider} onChange={e=>setV("lider",e.target.value)}/></L>
          <L t="Contrato"><select value={f.vinculo.tipoContrato} onChange={e=>setV("tipoContrato",e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5">{CONTRATOS.map(c=><option key={c}>{c}</option>)}</select></L>
          <L t="Admissão *"><Inp type="date" value={f.vinculo.admissao} onChange={e=>setV("admissao",e.target.value)}/></L>
          <L t="Salário (R$)"><div className="relative"><Inp type={verSal?"number":"password"} value={f.vinculo.salario} onChange={e=>setV("salario",e.target.value)}/><button type="button" onClick={()=>setVerSal(v=>!v)} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><IcEye open={verSal}/></button></div></L></div>
        {cargoSel&&<div className="text-[11px] text-slate-500 bg-slate-50 rounded-md p-2.5 ring-1 ring-slate-200">Cargo do catálogo <b className="font-mono">{cargoSel.codigo}</b> · faixa {money(cargoSel.faixaMin)}–{money(cargoSel.faixaMax)}. Departamento, CBO e salário sugeridos automaticamente — ajuste se necessário.</div>}
      </div>
      <div className="p-3 border-t border-slate-200 flex justify-end gap-2 bg-slate-50"><button onClick={onClose} className="px-3 py-1.5 text-sm text-slate-500">Cancelar</button>
        <button disabled={!ok} onClick={()=>onCriar(f)} className={"px-4 py-1.5 text-sm font-medium rounded-md text-white "+(ok?"bg-brand hover:bg-navy":"bg-slate-300 cursor-not-allowed")}>Cadastrar pessoa</button></div>
    </div></div>);
}
function ConfigFirebase({mode,onClose,onConnect,iaKey,setIaKey,iaModel,setIaModel}){
  const [txt,setTxt]=useState("");
  const [k,setK]=useState(iaKey||""); const [mdl,setMdl]=useState(iaModel||"claude-sonnet-4-5");
  const go=()=>{try{const m=txt.match(/\{[\s\S]*\}/);if(!m)throw 0;const cfg=Function('"use strict";return ('+m[0]+')')();if(!cfg.projectId)throw 0;onConnect(cfg);}catch(e){alert("Config inválida. Cole o objeto firebaseConfig.");}};
  const salvarIA=()=>{ setIaKey(k.trim()); setIaModel(mdl.trim()||"claude-sonnet-4-5"); onClose(); };
  return <div className="fixed inset-0 z-50 grid place-items-center bg-navy/40 p-4 no-print" onClick={onClose}>
    <div className="bg-white rounded-lg shadow-2xl w-full max-w-md p-5 max-h-[92vh] overflow-auto" onClick={e=>e.stopPropagation()}>
      <h2 className="text-lg font-bold text-navy">Conexões</h2>
      <div className="text-[11px] uppercase tracking-wide text-brand font-semibold mt-4 mb-1">Firebase</div>
      <p className="text-sm text-slate-500">Cole o objeto <code className="font-mono text-xs bg-slate-100 px-1 rounded">firebaseConfig</code>. Todos os módulos compartilham as coleções <b>pessoas</b> e <b>eventos</b> em tempo real.</p>
      <textarea value={txt} onChange={e=>setTxt(e.target.value)} rows="5" placeholder={'{ apiKey:"...", projectId:"braskim---proj...", ... }'} className="w-full mt-2 text-xs font-mono border border-slate-300 rounded-md p-2.5 outline-none focus:ring-2 ring-brand/30"></textarea>
      <div className="flex items-center justify-between mt-2">
        <span className="text-xs text-slate-400">Modo: <b className={mode==="firebase"?"text-emerald-600":"text-amber-600"}>{mode==="firebase"?"Firebase":"Demo (memória)"}</b></span>
        <button onClick={go} className="px-3 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Conectar</button>
      </div>
      <div className="border-t border-slate-200 mt-4 pt-4">
        <div className="text-[11px] uppercase tracking-wide text-brand font-semibold mb-1">🤖 Agente IA (Claude)</div>
        <p className="text-sm text-slate-500">Cole sua chave da API Anthropic para o agente gerar descrições de cargo completas. A chave fica só na memória desta sessão (não é salva no código).</p>
        <label className="block text-[11px] uppercase tracking-wide text-slate-400 mt-2 mb-0.5">Chave de API</label>
        <input type="password" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-..." className="w-full text-sm font-mono border border-slate-300 rounded-md px-2.5 py-1.5 outline-none focus:ring-2 ring-brand/30"/>
        <label className="block text-[11px] uppercase tracking-wide text-slate-400 mt-2 mb-0.5">Modelo</label>
        <input value={mdl} onChange={e=>setMdl(e.target.value)} placeholder="claude-sonnet-4-5" className="w-full text-sm font-mono border border-slate-300 rounded-md px-2.5 py-1.5 outline-none focus:ring-2 ring-brand/30"/>
        <div className="flex items-center justify-between mt-2">
          <span className="text-xs text-slate-400">{iaKey?<span className="text-emerald-600">✓ chave configurada</span>:"sem chave — usa rascunho local"}</span>
          <button onClick={salvarIA} className="px-3 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Salvar IA</button>
        </div>
      </div>
      <div className="flex justify-end mt-4"><button onClick={onClose} className="px-3 py-1.5 text-sm text-slate-500">Fechar</button></div>
    </div></div>;
}

createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
