<script type="text/babel" data-type="module" data-presets="react">

/* ==================================================================
   SISTEMA OPERACIONAL BRASKIM — App unificado
   Módulos: Pessoas (CRM) + Organograma · estado e Firebase compartilhados
   Fonte Única da Verdade · Arquitetura Orientada a Eventos
   ================================================================== */

// ---------- helpers ----------
const uid=()=>Math.random().toString(36).slice(2,10);
// remove valores undefined recursivamente (Firestore não aceita undefined em set/add)
const semUndefined=obj=>{
  if(obj===undefined) return null;
  if(obj===null||typeof obj!=="object") return obj;
  if(Array.isArray(obj)) return obj.map(v=>v===undefined?null:semUndefined(v));
  const out={};
  for(const k of Object.keys(obj)){ const v=obj[k]; if(v===undefined) continue; out[k]=semUndefined(v); }
  return out;
};
const hoje=()=>new Date().toISOString().slice(0,10);
const brDate=s=>s?s.split("-").reverse().join("/"):"—";
const fmtCPF=v=>{const d=v.replace(/\D/g,"").slice(0,11);return d.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,"$1.$2.$3-$4").replace(/(\d{3})(\d{1,3})$/,"$1.$2").replace(/(\d{1,3})$/,"$1");};
const fmtTel=v=>{const d=v.replace(/\D/g,"").slice(0,11);if(d.length<=2)return d.length?`(${d}`:"";if(d.length<=7)return `(${d.slice(0,2)}) ${d.slice(2)}`;return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;};

const initials=n=>(n||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
// "Carlos Alberto Souza" -> "Carlos A."; "Ana" -> "Ana"
const nomeCurto=n=>{const p=(n||"").trim().split(/\s+/).filter(Boolean);if(!p.length)return "";return p.length===1?p[0]:`${p[0]} ${p[1][0].toUpperCase()}.`;};
const money=v=>v==null||v===""?"—":Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const parseSal=v=>{if(v==null||v==="")return 0;if(typeof v==="number")return v;const s=String(v).trim();if(s.includes(","))return parseFloat(s.replace(/\./g,"").replace(",","."))||0;return parseFloat(s)||0;};
const fmtSalInput=v=>{if(v==null||v==="")return "";const n=parseSal(v);if(!n)return "";return n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});};
const idade=s=>{if(!s)return"—";const d=new Date(s),t=new Date();let a=t.getFullYear()-d.getFullYear();if(t.getMonth()<d.getMonth()||(t.getMonth()===d.getMonth()&&t.getDate()<d.getDate()))a--;return a+" anos";};
const faixa=s=>s<3000?"Faixa A":s<5000?"Faixa B":s<7000?"Faixa C":"Faixa D";
const addMeses=(d,n)=>{ if(!d)return ""; const [y,m,dd]=d.split("-").map(Number); const dt=new Date(y,m-1+n,dd); return dt.toISOString().slice(0,10); };
const fmtRev=n=>"REV"+String(n||1).padStart(2,"0");
const revVencida=c=>!!(c&&c.proximaRevisao&&c.proximaRevisao<=hoje());
const CARGO_META_KEYS=["id","status","criadoEm","revisao","dataRevisao","proximaRevisao","revisoes","_motivo"];
const snapshotCargo=c=>{const o={};Object.keys(c||{}).forEach(k=>{if(!CARGO_META_KEYS.includes(k))o[k]=c[k];});return JSON.parse(JSON.stringify(o));};
const proximoCodigoBKM=cargos=>{let max=0;(cargos||[]).forEach(c=>{const m=/BKM-(\d+)/.exec(c.codigo||"");if(m)max=Math.max(max,parseInt(m[1],10));});return "BKM-"+String(max+1).padStart(4,"0");};
const randCPF=()=>{const r=()=>Math.floor(Math.random()*10);return `${r()}${r()}${r()}.${r()}${r()}${r()}.${r()}${r()}${r()}-${r()}${r()}`;};
const evt=(tipo,pessoaId,resumo,ts,origem="pessoas")=>({id:uid(),tipo,pessoaId,resumo,timestamp:ts||new Date().toISOString(),origemModulo:origem,autor:"sistema"});
const nameOf=n=>n.type==="pessoa"?n.pessoa.nome:n.type==="vaga"?n.vaga.cargo:n.name;

const STATUS={
  ATIVO:{label:"Ativo",dot:"bg-emerald-500",cls:"bg-emerald-50 text-emerald-700 ring-emerald-200"},
  AFASTADO:{label:"Afastado",dot:"bg-amber-500",cls:"bg-amber-50 text-amber-700 ring-amber-200"},
  DESLIGADO:{label:"Desligado",dot:"bg-slate-400",cls:"bg-slate-100 text-slate-500 ring-slate-200"},
};

  DocumentoAnexado:{c:"#64748b",t:"Documento anexado"},PessoaAfastada:{c:"#d97706",t:"Afastamento"},
  PessoaRetornou:{c:"#16a34a",t:"Retorno ao trabalho"},PessoaDesligada:{c:"#64748b",t:"Desligamento"},

const OBRIG=["nome","nascimento","rg","cpf","sexo","email","endereco","complemento","bairro","cidade","cep","telefone","estadoCivil","escolaridade","formacao"],
  OBRIG_VINC=["matricula","ctps","esocial","pis","tipo","cargo","cbo","setor","lider","admissao","salario"],
  OBRIG_BANCO=["banco","agencia","conta","pix","tipoPix"],
  OBRIG_OUT=["camiseta","calcado"],
  OBRIG_EMG=["nome","parentesco","telefone"];
const completude=p=>{
  const tot=OBRIG.length+OBRIG_VINC.length+OBRIG_BANCO.length+OBRIG_OUT.length+OBRIG_EMG.length;
  const ok=OBRIG.filter(k=>p[k]).length
    +OBRIG_VINC.filter(k=>p.vinculo?.[k]).length
    +OBRIG_BANCO.filter(k=>(p.banco||{})[k]).length
    +OBRIG_OUT.filter(k=>(p.outras||{})[k]).length
    +OBRIG_EMG.filter(k=>(p.emergencia||{})[k]).length;
  return Math.round(ok/tot*100);
};

// famílias (trilhas) de um cargo — aceita legado (string em c.familia) e novo (array em c.familias)
const familiasDe=c=>{ if(!c)return []; const arr=Array.isArray(c.familias)?c.familias:(c.familia?[c.familia]:[]); return [...new Set(arr.map(f=>String(f||"").trim()).filter(Boolean))]; };
const compartilhaFamilia=(a,b)=>{ const fa=familiasDe(a),fb=familiasDe(b); return fa.some(f=>fb.includes(f)); };
// próximo(s) cargo(s) na trilha (mesma família, nível seguinte). Retorna 1 por família compartilhada.
const proximosCargos=(cargos,cargoAtual)=>{
  const c=cargos.find(x=>x.titulo===cargoAtual); if(!c)return [];
  const fams=familiasDe(c); const res=[];
  fams.forEach(fam=>{
    const cand=cargos.filter(x=>familiasDe(x).includes(fam)&&nivelIdx(x.nivel)===nivelIdx(c.nivel)+1);
    if(cand[0]&&!res.find(r=>r.cargo.id===cand[0].id)) res.push({familia:fam,cargo:cand[0]});
  });
  return res;
};
// próximo cargo na trilha (compat: retorna o primeiro caminho, ou o da família informada)
const proximoCargo=(cargos,cargoAtual,familia)=>{
  const lista=proximosCargos(cargos,cargoAtual);
  if(familia){ const m=lista.find(x=>x.familia===familia); return m?m.cargo:null; }
  return lista[0]?lista[0].cargo:null;
};
const posicaoNaFaixa=(cargo,salario)=>{ if(!cargo||salario==null)return null;
  if(salario<cargo.faixaMin)return "ABAIXO"; if(salario>cargo.faixaMax)return "ACIMA"; return "DENTRO"; };
const compaRatio=(cargo,salario)=> cargo? (salario/((cargo.faixaMin+cargo.faixaMax)/2)) : null;
const mesesDesde=d=>{ if(!d)return 0; const a=new Date(d),b=new Date(); return Math.max(0,(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())); };
// avalia critérios OBJETIVOS para promoção ao próximo cargo da trilha
const avaliarElegibilidade=(pessoa,cargos,familia)=>{
  const prox=proximoCargo(cargos,pessoa.vinculo.cargo,familia);
  if(!prox) return {prox:null,elegivel:false,checks:[],motivo:"Topo da trilha"};
  const cr=prox.criterios, meses=mesesDesde(pessoa.vinculo.desdeCargo||pessoa.vinculo.admissao);
  const checks=[
    {ok:meses>=cr.tempoMinMeses, label:`Tempo mínimo no nível (${cr.tempoMinMeses} meses)`, atual:`${meses} meses`},
    {ok:(pessoa.ultimaAvaliacao||0)>=cr.notaMinAvaliacao, label:`Avaliação ≥ ${cr.notaMinAvaliacao.toFixed(1)}`, atual:pessoa.ultimaAvaliacao?pessoa.ultimaAvaliacao.toFixed(1):"sem avaliação"},
  ];
  if(cr.exigeCompetenciasObrig){
    const faltam=prox.competenciasObrig.filter(k=>!(pessoa.competencias||[]).includes(k));
    checks.push({ok:faltam.length===0, label:"Competências obrigatórias do cargo", atual:faltam.length?`faltam: ${faltam.join(", ")}`:"completas"});
  }
  return {prox,elegivel:checks.every(c=>c.ok),checks};
};
// cargos do mesmo nível em outra família (movimentação lateral)
const cargosLaterais=(cargos,cargoAtual)=>{ const c=cargos.find(x=>x.titulo===cargoAtual); if(!c)return [];
  return cargos.filter(x=>nivelIdx(x.nivel)===nivelIdx(c.nivel)&&x.titulo!==c.titulo); };

const importarColaboradoresExcel=(e,criarPessoa,editarPessoa,pessoas,notify,reset)=>{
  const file=e.target.files?.[0]; if(!file)return;
  const reader=new FileReader();
  const g=(r,...keys)=>{for(const k of keys){if(r[k]!==undefined&&r[k]!=="")return String(r[k]);}return "";};
  reader.onload=async ev=>{
    try{
      let rows=[];
      if(file.name.toLowerCase().endsWith(".csv")){
        const txt=new TextDecoder("utf-8").decode(ev.target.result);
        const lines=txt.split(/\r?\n/).filter(l=>l.trim());
        const heads=lines[0].split(";").map(h=>h.replace(/^"|"$/g,"").trim());
        rows=lines.slice(1).map(l=>{const vals=l.split(";").map(v=>v.replace(/^"|"$/g,"").trim());const o={};heads.forEach((h,i)=>o[h]=vals[i]||"");return o;});
      } else if(window.XLSX){
        const wb=XLSX.read(ev.target.result,{type:"array",codepage:65001});
        rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
      } else { notify("Biblioteca XLSX não carregou — tente com um arquivo .csv"); return; }
      if(!rows.length){ notify("Arquivo vazio ou sem dados."); return; }
      let ok=0,err=0;
      for(const r of rows){
        const nome=g(r,"Nome","nome").trim(); if(!nome){err++;continue;}
        const p={
          nome,
          email:g(r,"E-mail","Email","email"),
          telefone:g(r,"Telefone","telefone"),
          nascimento:ptToIso(g(r,"Data de Nascimento","Nascimento")),
          rg:g(r,"RG","rg"),
          cpf:g(r,"CPF","cpf"),
          sexo:g(r,"Sexo","sexo"),
          estadoCivil:g(r,"Estado Civil","Estado civil","estadoCivil"),
          escolaridade:g(r,"Escolaridade","escolaridade"),
          formacao:g(r,"Formação","Formacao","Formação","formacao"),
          endereco:g(r,"Endereço","Endereco","endereco"),
          complemento:g(r,"Complemento","complemento"),
          bairro:g(r,"Bairro","bairro"),
          cidade:g(r,"Cidade","cidade"),
          cep:g(r,"CEP","cep"),
          status:g(r,"Status","status")||"ATIVO",
          vinculo:{
            matricula:g(r,"Matrícula","Matricula"),
            ctps:g(r,"CTPS","ctps"),
            esocial:g(r,"Código e-Social","Codigo e-Social","esocial"),
            pis:g(r,"PIS","pis"),
            tipo:g(r,"Tipo","tipo"),
            cargo:g(r,"Cargo","cargo"),
            cbo:g(r,"CBO","cbo"),
            setor:g(r,"Setor","setor"),
            lider:g(r,"Superior Direto","Superior direto","lider"),
            admissao:ptToIso(g(r,"Data de Admissão","Data de Admissao")),
            salario:g(r,"Salário","Salario"),
            unidade:"Matriz",tipoContrato:"CLT"
          },
          banco:{
            banco:g(r,"Banco","banco"),
            agencia:g(r,"Agência","Agencia"),
            conta:g(r,"Conta Corrente","conta"),
            pix:g(r,"PIX","pix"),
            tipoPix:g(r,"Tipo PIX","Tipo Pix"),
          },
          outras:{camiseta:g(r,"Camiseta"),calcado:g(r,"Calçado","Calcado")},
          emergencia:{nome:g(r,"Emergência - Nome","Emergencia - Nome"),parentesco:g(r,"Emergência - Parentesco","Emergencia - Parentesco"),telefone:g(r,"Emergência - Telefone","Emergencia - Telefone")},
          testes:{},tags:[],redes:{},anotacoes:[],reunioes1a1:[],treinamentos:[],documentos:[],dependentes:[],logAlteracoes:[],
        };
        try{
          const cpf=(p.cpf||"").replace(/\D/g,"");
          const existe=(pessoas||[]).find(x=>(cpf&&(x.cpf||"").replace(/\D/g,"")===cpf)||(x.nome||"").toLowerCase().trim()===(p.nome||"").toLowerCase().trim());
          if(existe){ await editarPessoa(existe,p); ok++; }
          else { await criarPessoa(p); ok++; }
        }catch(e2){ console.error(e2); err++; }
      }
      notify(`Importação concluída: ${ok} colaborador(es) importado(s) (criados ou atualizados)${err?`, ${err} com erro`:""}.`);
    }catch(ex){ console.error(ex); notify("Erro ao ler o arquivo: "+String(ex.message||ex).slice(0,80)); }
    finally{ reset&&reset(); }
  };
  reader.readAsArrayBuffer(file);
};

const importarCompetenciasExcel=(e,onImportar,notify,reset,tipoPadrao)=>{
  const file=e.target.files?.[0]; if(!file)return;
  const reader=new FileReader();
  const g=(r,...keys)=>{for(const k of keys){if(r[k]!==undefined&&r[k]!=="")return String(r[k]).trim();}return "";};
  const normTipo=v=>{const s=String(v||"").trim().toLowerCase();
    if(!s)return tipoPadrao||"comportamental";
    if(s.startsWith("t")||s.includes("hard")||s.includes("técn")||s.includes("tecn"))return "tecnica";
    if(s.startsWith("c")||s.includes("soft")||s.includes("comport"))return "comportamental";
    return tipoPadrao||"comportamental";};
  // listas: aceita uma coluna com várias linhas/";" ou colunas numeradas ("Pergunta 1", "KPI 2"…)
  const lerLista=(r,...rotulos)=>{
    let arr=[];
    for(const rot of rotulos){
      const bruto=g(r,rot,rot.toLowerCase(),rot.toUpperCase());
      if(bruto){arr=arr.concat(bruto.split(/\r?\n|;/).map(s=>s.trim()).filter(Boolean));break;}
    }
    const bases=[];
    rotulos.forEach(rot=>{
      const limpo=rot.replace(/\s*\(.*\)\s*/g,"").trim();
      const prim=limpo.split(/\s+/)[0];
      [limpo,prim].forEach(b=>{ if(!b)return; bases.push(b); if(/s$/i.test(b))bases.push(b.replace(/s$/i,"")); });
    });
    const esc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    const re=new RegExp("^("+[...new Set(bases)].filter(Boolean).map(esc).join("|")+")\\s*\\d+$","i");
    Object.keys(r).forEach(k=>{ if(re.test(k.trim())&&String(r[k]||"").trim()) arr.push(String(r[k]).trim()); });
    return arr.map(s=>s.replace(/^\s*\d+\s*[.)-]\s*/,"").trim()).filter(Boolean);
  };
  reader.onload=async ev=>{
    try{

      } else { notify("Biblioteca XLSX não carregou — tente com um arquivo .csv"); return; }
      if(!rows.length){ notify("Arquivo vazio ou sem dados."); return; }
      const parsed=[];
      for(const r of rows){
        const nome=g(r,"Competência","Competencia","Nome","competência","competencia","nome"); if(!nome)continue;
        const st=g(r,"Status","status").toLowerCase();
        const niveis={};
        ["1","2","3","4","5"].forEach(k=>{const v=g(r,`Nível ${k}`,`Nivel ${k}`,`NÍVEL ${k}`,`nivel ${k}`);if(v)niveis[k]=v;});
        parsed.push({

        });

};

  reader.onload=async ev=>{

function App(){
  const lsGet=(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}};
  const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
  const [mode,setMode]=useState("demo");
  const [fb,setFb]=useState(null);
  // se já usou Firebase antes, começa com array vazio e espera o onSnapshot
  // isso evita que dados antigos do localStorage causem duplicatas ao mesclar com Firestore
  const [pessoas,setPessoas]=useState(()=>lsGet("bsk_firebase_ok",false)?[]:lsGet("bsk_pessoas",seedPessoas()));
  const [cargos,setCargos]=useState(()=>lsGet("bsk_cargos",seedCargos()));
  const [departamentos,setDepartamentos]=useState(()=>lsGet("bsk_departamentos",seedDepartamentos()));
  const [configs,setConfigs]=useState(()=>lsGet("bsk_configs",seedConfigs()));
  const [competencias,setCompetencias]=useState(()=>lsGet("bsk_competencias",[]));
  useEffect(()=>{if(mode==="firebase"){lsSet("bsk_firebase_ok",true);}else{lsSet("bsk_pessoas",pessoas);}},[pessoas,mode]);
  useEffect(()=>{lsSet("bsk_configs",configs);if(mode==="firebase"&&fb){try{fb.api.setDoc(fb.api.doc(fb.db,"config","configs"),semUndefined(configs));}catch{}}},[configs,mode,fb]);
  useEffect(()=>{
    lsSet("bsk_cargos",cargos);
    if(mode==="firebase"&&fb){
      const json=JSON.stringify(cargos);
      if(json===cargosSyncRef.current) return; // veio do servidor ou não mudou → não reescreve
      cargosSyncRef.current=json;
      try{ fb.api.setDoc(fb.api.doc(fb.db,"config","cargos"),{lista:semUndefined(cargos)}); }catch{}
    }
  },[cargos,mode,fb]);
  useEffect(()=>{
    lsSet("bsk_departamentos",departamentos);
    if(mode==="firebase"&&fb){
      const json=JSON.stringify(departamentos);
      if(json===deptosSyncRef.current) return;
      deptosSyncRef.current=json;
      try{ fb.api.setDoc(fb.api.doc(fb.db,"config","departamentos"),{lista:semUndefined(departamentos)}); }catch{}
    }
  },[departamentos,mode,fb]);
  useEffect(()=>{
    lsSet("bsk_competencias",competencias);
    if(mode==="firebase"&&fb){
      const json=JSON.stringify(competencias);
      if(json===compsSyncRef.current) return;
      compsSyncRef.current=json;
      try{ fb.api.setDoc(fb.api.doc(fb.db,"config","competencias"),{lista:semUndefined(competencias)}); }catch{}
    }
  },[competencias,mode,fb]);
  const [eventos,setEventos]=useState([]);
  const [role,setRole]=useState("RH");
  const [busca,setBusca]=useState("");
  const [view,setView]=useState("cargos");
  const [promocoes,setPromocoes]=useState([]);
  const [orgRevisoes,setOrgRevisoes]=useState([]);
  const [iaKey,setIaKey]=useState("");
  const [iaModel,setIaModel]=useState("claude-sonnet-4-5");
  const [cfgOpen,setCfgOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const notify=m=>{setToast(m);setTimeout(()=>setToast(null),2600);};
  const [erroPersistente,setErroPersistente]=useState(null); // {msg} — fica até o usuário fechar
  // guarda de navegação: telas podem registrar uma função que retorna true se pode sair (ou trata o "voltar")
  const navGuardRef=React.useRef(null); // ()=>{dirty:boolean, voltarParaLista:()=>void} | null
  const irPara=(destino)=>{
    const g=navGuardRef.current&&navGuardRef.current();
    if(g){
      if(g.dirty){
        const r=window.confirm("Há alterações não salvas nesta tela. Deseja sair sem salvar?\n\nOK = sair sem salvar · Cancelar = continuar editando");
        if(!r) return;               // continua editando
      }
      g.voltarParaLista&&g.voltarParaLista(); // fecha o detalhe/edição aberto
    }
    setView(destino);
  };

  useEffect(()=>{setEventos(seedEventos(pessoas));},[]); // eventos coerentes com o seed

  // ---- único caminho de escrita (usado por todos os módulos) ----
  const commit=async(pessoa,events=[])=>{
    const p={...pessoa,_savedAt:Date.now()};
    setPessoas(prev=>{const i=prev.findIndex(x=>x.id===p.id);if(i<0)return[...prev,p];const c=[...prev];c[i]=p;return c;});
    if(events.length) setEventos(prev=>[...prev,...events]);
    if(mode==="firebase"&&fb){
      // marca que esta pessoa tem escrita pendente por 5s
      // onSnapshot vai ignorar atualizações remotas para ela neste período
      pendentesRef.current[p.id]=(Date.now()+5000);
      try{
        await fb.api.setDoc(fb.api.doc(fb.db,"pessoas",p.id),semUndefined(p));
        for(const e of events) await fb.api.addDoc(fb.api.collection(fb.db,"eventos"),semUndefined(e));
      }catch(err){
        const code=err?.code||"";
        const msg=code==="permission-denied"
          ? "PERMISSÃO NEGADA pelo Firestore ao salvar. As Regras de Segurança estão bloqueando a escrita. Revise as regras no Console do Firebase."
          : "Falha ao salvar no Firebase: "+String(err.message||err).slice(0,120);
        setErroPersistente({msg}); console.error("commit setDoc falhou:",err);
      }
    }
  };
  // ---- registro de eventos sem alterar pessoa (ex.: catálogo de cargos) ----
  const addEventos=async events=>{
    if(!events.length)return;
    if(mode==="firebase"&&fb){ try{ for(const e of events) await fb.api.addDoc(fb.api.collection(fb.db,"eventos"),semUndefined(e)); }catch(err){console.error(err);} }
    else setEventos(prev=>[...prev,...events]);
  };
  // ---- exclusão definitiva (local + Firestore) ----
  const excluirPessoaFB=async(p)=>{
    // remove do estado local imediatamente
    setPessoas(prev=>prev.filter(x=>x.id!==p.id));
    if(mode==="firebase"&&fb){
      // marca como excluída por 10s para o onSnapshot não reinserir durante a corrida
      excluidosRef.current[p.id]=(Date.now()+10000);
      delete pendentesRef.current[p.id];
      try{
        await fb.api.deleteDoc(fb.api.doc(fb.db,"pessoas",p.id));
        // varredura defensiva: apaga documentos "irmãos" (mesma pessoa gravada com outro id de doc)
        const cpf=(p.cpf||"").replace(/\D/g,"");
        const snap=await fb.db.collection("pessoas").get();
        for(const d of snap.docs){
          if(d.id===p.id) continue;
          const dd=d.data()||{};
          const mesmoCpf=cpf&&(dd.cpf||"").replace(/\D/g,"")===cpf;
          const mesmoNome=(dd.nome||"").toLowerCase().trim()===(p.nome||"").toLowerCase().trim();
          if(mesmoCpf||(!cpf&&mesmoNome)){
            excluidosRef.current[d.id]=(Date.now()+10000);
            try{ await fb.db.collection("pessoas").doc(d.id).delete(); }catch(e){console.error(e);}
          }
        }
      }catch(err){ notify("Erro ao excluir no Firebase: "+String(err.message||err).slice(0,60)); console.error(err); }
    }
  };

  const [usuario,setUsuario]=useState(null);
  const [loginando,setLoginando]=useState(false);
  const pendentesRef=React.useRef({}); // {pessoaId: timestamp_expiracao}
  const excluidosRef=React.useRef({}); // {pessoaId: timestamp_expiracao} — evita reaparecer via onSnapshot
  // sincronização de cargos/departamentos (config docs em tempo real)
  const cargosSyncRef=React.useRef(null);   // assinatura JSON do último valor sincronizado (evita loop de escrita)
  const deptosSyncRef=React.useRef(null);
  const compsSyncRef=React.useRef(null);
  const cargosRef=React.useRef(cargos);     // valor mais recente (migração sem stale closure)
  const deptosRef=React.useRef(departamentos);
  const compsRef=React.useRef(competencias);
  useEffect(()=>{cargosRef.current=cargos;},[cargos]);
  useEffect(()=>{deptosRef.current=departamentos;},[departamentos]);
  useEffect(()=>{compsRef.current=competencias;},[competencias]);

  const conectarFirebase=async cfg=>{
    try{
      if(!window.firebase){

      const api={
        collection:(db,name)=>db.collection(name),

        doc:(db,col,id)=>db.collection(col).doc(id),
        setDoc:(ref,data)=>ref.set(data),
        deleteDoc:(ref)=>ref.delete(),
      };
      api.onSnapshot(db.collection("pessoas"),snap=>{
        if(snap.empty) return;
        const agora=Date.now();
        const remoto=snap.docs.map(d=>({id:d.id,...d.data()}));
        const remotoIds=new Set(remoto.map(r=>r.id));
        setPessoas(prev=>{
          const prevMap=Object.fromEntries(prev.map(p=>[p.id,p]));
          const resultado={};
          // 1) parte do remoto (Firestore = fonte da verdade), respeitando janelas locais
          remoto.forEach(r=>{
            // ignora quem acabou de ser excluído localmente
            if((excluidosRef.current[r.id]||0)>agora) return;
            // se há escrita local pendente, mantém a versão local (mais nova)
            if((pendentesRef.current[r.id]||0)>agora && prevMap[r.id]){ resultado[r.id]=prevMap[r.id]; return; }
            resultado[r.id]=r;
          });
          // 2) preserva itens locais ainda não confirmados no servidor (recém-criados, escrita em voo)
          prev.forEach(p=>{
            if(resultado[p.id]) return;
            if((excluidosRef.current[p.id]||0)>agora) return;      // foi excluído: não ressuscita
            if(remotoIds.has(p.id)) return;                         // já tratado acima

            // caso contrário: sumiu do servidor (excluído em outra sessão) → remove
          });
          return Object.values(resultado);
        });
      });

  const EMAIL_AUTORIZADO="ana.vidal@braskim.com.br";
  const FIREBASE_CFG_FIXO={apiKey:"AIzaSyB0Y1wn5kWzGiWc"+"xDowbTIuztCERx6me2M",authDomain:"braskim---one.firebaseapp.com",projectId:"braskim---one",storageBucket:"braskim---one.firebasestorage.app",messagingSenderId:"1064753515954",appId:"1:1064753515954:web:b4d2a2fd48c3e8482da8ab"};

          {loginando?"Entrando…":"Entrar com Google"}
        </button>
        <div className="text-xs text-slate-400 text-center">Acesso restrito · apenas {EMAIL_AUTORIZADO}</div>
      </div>
    </div>
  );

  return (
    <div className="h-full flex flex-col">
      {/* Topbar compartilhada */}

        <div className="flex items-center gap-2 font-semibold tracking-tight">
          <span className="inline-grid place-items-center w-7 h-7 rounded bg-white text-navy font-bold text-sm">B</span>
          Braskim <span className="text-slate-400 font-normal hidden sm:inline">· Sistema Operacional</span>
        </div>
        <div className="flex-1 max-w-md">
          <div className="flex items-center gap-2 bg-white/10 focus-within:bg-white/15 rounded-md px-3 py-1.5 focus-within:ring-2 ring-white/30">
            <span className="text-slate-400 shrink-0"><IcSearch size={15}/></span>
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder={view==="pessoas"?"Buscar nome, cargo ou matrícula…":"Buscar colaborador ou cargo…"}
              className="flex-1 bg-transparent placeholder-slate-400 text-sm outline-none"/>

          {mode==="firebase"&&usuario&&<button onClick={async()=>{if(fb?.auth)await fb.auth.signOut();setUsuario(null);setMode("demo");setFb(null);notify("Logout realizado.");}} className="text-xs text-slate-300 hover:text-white px-2 py-1 rounded opacity-70 hover:opacity-100" title={"Logado como "+usuario.email}>Sair</button>}
        </div>
      </header>

      <div className="flex-1 flex overflow-hidden">
        {/* Sidebar navegável */}
        <nav className="w-52 bg-white border-r border-slate-200 shrink-0 hidden lg:flex flex-col py-3 text-sm no-print">
          {NAV.map(([grupo,itens])=>(
            <div key={grupo} className="px-2 mb-1">
              <div className="px-2 pt-2 pb-1 text-[11px] font-semibold uppercase tracking-wider text-slate-400">{grupo}</div>
              {itens.map(([id,label,on])=>(

                  className={"w-full text-left px-3 py-1.5 rounded-md text-sm "+(view===id?"bg-brand/10 text-brand font-semibold":on?"text-slate-600 hover:bg-slate-50":"text-slate-400 cursor-default")}>

          <div className="mt-auto border-t border-slate-100 pt-2 px-2">
            <button onClick={()=>irPara("configs")} className={"w-full text-left px-3 py-1.5 rounded-md text-sm flex items-center gap-2 "+(view==="configs"?"bg-brand/10 text-brand font-semibold":"text-slate-500 hover:bg-slate-50")}>
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              Configurações
            </button>
            <div className="px-2 py-2 text-[11px] text-slate-400 leading-tight">Módulos compartilham<br/>os mesmos dados.</div>
          </div>
        </nav>

        {/* Módulo ativo */}
        {view==="pessoas" && <PessoasView {...{pessoas,setPessoas,eventos,commit,role,busca,notify,cargos,departamentos,configs,navGuardRef,onExcluirPessoa:async(p)=>{if(!window.confirm(`Excluir "${p.nome}"? Esta ação não pode ser desfeita.`))return;await excluirPessoaFB(p);notify(`${p.nome} excluído.`);},onExcluirRegistro:excluirPessoaFB}}/>}
        {view==="organograma" && <OrganogramaView {...{departamentos,setDepartamentos,cargos,pessoas,commit,role,busca,notify,orgRevisoes,setOrgRevisoes}}/>}
        {view==="cargos" && <CargosView {...{cargos,setCargos,pessoas,eventos,commit,addEventos,promocoes,setPromocoes,role,busca,notify,iaKey,iaModel,departamentosMaster:departamentos,competencias}}/>}
        {view==="departamentos" && <DepartamentosView {...{departamentos,setDepartamentos,cargos,setCargos,pessoas,commit,role,busca,addEventos,notify,iaKey,iaModel}}/>}
        {view==="comp" && <CompetenciasView {...{competencias,setCompetencias,cargos,role,busca,notify}}/>}
        {view==="configs" && <ConfigsView configs={configs} setConfigs={setConfigs} notify={notify}/>}
      </div>

      {cfgOpen && <ConfigFirebase mode={mode} onClose={()=>setCfgOpen(false)} onConnect={conectarFirebase} iaKey={iaKey} setIaKey={setIaKey} iaModel={iaModel} setIaModel={setIaModel}/>}
      {toast && <div className="fixed bottom-5 left-1/2 -translate-x-1/2 bg-navy text-white text-sm px-4 py-2.5 rounded-lg shadow-lg z-50 no-print">{toast}</div>}

}
