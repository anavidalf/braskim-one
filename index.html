const brDate=s=>s?s.split("-").reverse().join("/"):"—";
const fmtCPF=v=>{const d=v.replace(/\D/g,"").slice(0,11);return d.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,"$1.$2.$3-$4").replace(/(\d{3})(\d{1,3})$/,"$1.$2").replace(/(\d{1,3})$/,"$1");};

const initials=n=>(n||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();

const fmtSalInput=v=>{if(v==null||v==="")return "";const n=parseSal(v);if(!n)return "";return n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});};
const idade=s=>{if(!s)return"—";const d=new Date(s),t=new Date();let a=t.getFullYear()-d.getFullYear();if(t.getMonth()<d.getMonth()||(t.getMonth()===d.getMonth()&&t.getDate()<d.getDate()))a--;return a+" anos";};
const faixa=s=>s<3000?"Faixa A":s<5000?"Faixa B":s<7000?"Faixa C":"Faixa D";
const addMeses=(d,n)=>{ if(!d)return ""; const [y,m,dd]=d.split("-").map(Number); const dt=new Date(y,m-1+n,dd); return dt.toISOString().slice(0,10); };
const fmtRev=n=>"REV"+String(n||1).padStart(2,"0");

const snapshotCargo=c=>{const o={};Object.keys(c||{}).forEach(k=>{if(!CARGO_META_KEYS.includes(k))o[k]=c[k];});return JSON.parse(JSON.stringify(o));};

  OBRIG_VINC=["matricula","ctps","esocial","pis","tipo","cargo","cbo","setor","lider","admissao","salario"],
  OBRIG_BANCO=["banco","agencia","conta","pix","tipoPix"],
  OBRIG_OUT=["camiseta","calcado"],
  OBRIG_EMG=["nome","parentesco","telefone"];
const completude=p=>{
  const tot=OBRIG.length+OBRIG_VINC.length+OBRIG_BANCO.length+OBRIG_OUT.length+OBRIG_EMG.length;
  const ok=OBRIG.filter(k=>p[k]).length
    +OBRIG_VINC.filter(k=>p.vinculo?.[k]).length
    +OBRIG_BANCO.filter(k=>(p.banco||{})[k]).length
    +OBRIG_OUT.filter(k=>(p.outras||{})[k]).length
    +OBRIG_EMG.filter(k=>(p.emergencia||{})[k]).length;
  return Math.round(ok/tot*100);
};

      escolaridadeMinima:c.requisitos?.formacao&&c.requisitos.formacao.includes("Superior")?"Superior completo":c.requisitos?.formacao?.includes("técnico")?"Curso técnico":"Ensino médio",
      conhecimentos:c.competenciasObrig,habilidades:c.competenciasDesej,

// próximo cargo na trilha (mesma família, nível seguinte)
const proximoCargo=(cargos,cargoAtual)=>{
  const c=cargos.find(x=>x.titulo===cargoAtual); if(!c)return null;
  const cand=cargos.filter(x=>x.familia===c.familia&&nivelIdx(x.nivel)===nivelIdx(c.nivel)+1);
  return cand[0]||null;
};
const posicaoNaFaixa=(cargo,salario)=>{ if(!cargo||salario==null)return null;
  if(salario<cargo.faixaMin)return "ABAIXO"; if(salario>cargo.faixaMax)return "ACIMA"; return "DENTRO"; };
const compaRatio=(cargo,salario)=> cargo? (salario/((cargo.faixaMin+cargo.faixaMax)/2)) : null;
const mesesDesde=d=>{ if(!d)return 0; const a=new Date(d),b=new Date(); return Math.max(0,(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())); };
// avalia critérios OBJETIVOS para promoção ao próximo cargo da trilha
const avaliarElegibilidade=(pessoa,cargos)=>{
  const prox=proximoCargo(cargos,pessoa.vinculo.cargo);
  if(!prox) return {prox:null,elegivel:false,checks:[],motivo:"Topo da trilha"};
  const cr=prox.criterios, meses=mesesDesde(pessoa.vinculo.desdeCargo||pessoa.vinculo.admissao);
  const checks=[
    {ok:meses>=cr.tempoMinMeses, label:`Tempo mínimo no nível (${cr.tempoMinMeses} meses)`, atual:`${meses} meses`},
    {ok:(pessoa.ultimaAvaliacao||0)>=cr.notaMinAvaliacao, label:`Avaliação ≥ ${cr.notaMinAvaliacao.toFixed(1)}`, atual:pessoa.ultimaAvaliacao?pessoa.ultimaAvaliacao.toFixed(1):"sem avaliação"},
  ];
  if(cr.exigeCompetenciasObrig){
    const faltam=prox.competenciasObrig.filter(k=>!(pessoa.competencias||[]).includes(k));
    checks.push({ok:faltam.length===0, label:"Competências obrigatórias do cargo", atual:faltam.length?`faltam: ${faltam.join(", ")}`:"completas"});
  }
  return {prox,elegivel:checks.every(c=>c.ok),checks};
};
// cargos do mesmo nível em outra família (movimentação lateral)
const cargosLaterais=(cargos,cargoAtual)=>{ const c=cargos.find(x=>x.titulo===cargoAtual); if(!c)return [];
  return cargos.filter(x=>x.nivel===c.nivel&&x.titulo!==c.titulo); };

const importarColaboradoresExcel=(e,criarPessoa,editarPessoa,pessoas,notify,reset)=>{
  const file=e.target.files?.[0]; if(!file)return;
  const reader=new FileReader();
  const g=(r,...keys)=>{for(const k of keys){if(r[k]!==undefined&&r[k]!=="")return String(r[k]);}return "";};
  reader.onload=async ev=>{
    try{
      let rows=[];
      if(file.name.toLowerCase().endsWith(".csv")){
        const txt=new TextDecoder("utf-8").decode(ev.target.result);
        const lines=txt.split(/\r?\n/).filter(l=>l.trim());
        const heads=lines[0].split(";").map(h=>h.replace(/^"|"$/g,"").trim());
        rows=lines.slice(1).map(l=>{const vals=l.split(";").map(v=>v.replace(/^"|"$/g,"").trim());const o={};heads.forEach((h,i)=>o[h]=vals[i]||"");return o;});
      } else if(window.XLSX){
        const wb=XLSX.read(ev.target.result,{type:"array",codepage:65001});
        rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
      } else { notify("Biblioteca XLSX não carregou — tente com um arquivo .csv"); return; }
      if(!rows.length){ notify("Arquivo vazio ou sem dados."); return; }
      let ok=0,err=0;
      for(const r of rows){
        const nome=g(r,"Nome","nome").trim(); if(!nome){err++;continue;}
        const p={
          nome,
          email:g(r,"E-mail","Email","email"),
          telefone:g(r,"Telefone","telefone"),
          nascimento:ptToIso(g(r,"Data de Nascimento","Nascimento")),
          rg:g(r,"RG","rg"),
          cpf:g(r,"CPF","cpf"),
          sexo:g(r,"Sexo","sexo"),
          estadoCivil:g(r,"Estado Civil","Estado civil","estadoCivil"),
          escolaridade:g(r,"Escolaridade","escolaridade"),
          formacao:g(r,"Formação","Formacao","Formação","formacao"),
          endereco:g(r,"Endereço","Endereco","endereco"),
          complemento:g(r,"Complemento","complemento"),
          bairro:g(r,"Bairro","bairro"),
          cidade:g(r,"Cidade","cidade"),
          cep:g(r,"CEP","cep"),
          status:g(r,"Status","status")||"ATIVO",
          vinculo:{
            matricula:g(r,"Matrícula","Matricula"),
            ctps:g(r,"CTPS","ctps"),
            esocial:g(r,"Código e-Social","Codigo e-Social","esocial"),
            pis:g(r,"PIS","pis"),
            tipo:g(r,"Tipo","tipo"),
            cargo:g(r,"Cargo","cargo"),
            cbo:g(r,"CBO","cbo"),
            setor:g(r,"Setor","setor"),
            lider:g(r,"Superior Direto","Superior direto","lider"),
            admissao:ptToIso(g(r,"Data de Admissão","Data de Admissao")),
            salario:g(r,"Salário","Salario"),
            unidade:"Matriz",tipoContrato:"CLT"
          },
          banco:{
            banco:g(r,"Banco","banco"),
            agencia:g(r,"Agência","Agencia"),
            conta:g(r,"Conta Corrente","conta"),
            pix:g(r,"PIX","pix"),
            tipoPix:g(r,"Tipo PIX","Tipo Pix"),
          },
          outras:{camiseta:g(r,"Camiseta"),calcado:g(r,"Calçado","Calcado")},
          emergencia:{nome:g(r,"Emergência - Nome","Emergencia - Nome"),parentesco:g(r,"Emergência - Parentesco","Emergencia - Parentesco"),telefone:g(r,"Emergência - Telefone","Emergencia - Telefone")},
          testes:{},tags:[],redes:{},anotacoes:[],reunioes1a1:[],treinamentos:[],documentos:[],dependentes:[],logAlteracoes:[],
        };
        try{
          const cpf=(p.cpf||"").replace(/\D/g,"");
          const existe=(pessoas||[]).find(x=>(cpf&&(x.cpf||"").replace(/\D/g,"")===cpf)||(x.nome||"").toLowerCase().trim()===(p.nome||"").toLowerCase().trim());
          if(existe){ await editarPessoa(existe,p); ok++; }
          else { await criarPessoa(p); ok++; }
        }catch(e2){ console.error(e2); err++; }
      }
      notify(`Importação concluída: ${ok} colaborador(es) importado(s) (criados ou atualizados)${err?`, ${err} com erro`:""}.`);
    }catch(ex){ console.error(ex); notify("Erro ao ler o arquivo: "+String(ex.message||ex).slice(0,80)); }
    finally{ reset&&reset(); }
  };
  reader.readAsArrayBuffer(file);
};

function App(){

          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder={view==="pessoas"?"Buscar nome, cargo ou matrícula…":"Buscar colaborador ou cargo…"}
            className="w-full bg-white/10 focus:bg-white/15 placeholder-slate-400 text-sm rounded-md px-3 py-1.5 outline-none focus:ring-2 ring-white/30"/>
        </div>
        <div className="ml-auto flex items-center gap-3 text-sm">
          <label className="hidden md:flex items-center gap-1.5 text-slate-300">Perfil:
            <select value={role} onChange={e=>setRole(e.target.value)} className="bg-white/10 rounded px-2 py-1 outline-none">
              <option className="text-navy">RH</option><option className="text-navy">Gestor</option><option className="text-navy">Executivo</option>
            </select></label>
          <button onClick={()=>setCfgOpen(true)} className={"flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium "+(mode==="firebase"?"bg-emerald-500/20 text-emerald-300":"bg-amber-500/20 text-amber-300")}>
            <span className={"w-2 h-2 rounded-full "+(mode==="firebase"?"bg-emerald-400":"bg-amber-400")}></span>{mode==="firebase"?"Firebase":"Demo"}
          </button>
          {mode==="firebase"&&usuario&&<button onClick={async()=>{if(fb?.auth)await fb.auth.signOut();setUsuario(null);setMode("demo");setFb(null);notify("Logout realizado.");}} className="text-xs text-slate-300 hover:text-white px-2 py-1 rounded opacity-70 hover:opacity-100" title={"Logado como "+usuario.email}>Sair</button>}
        </div>
      </header>

      <div className="flex-1 flex overflow-hidden">
        {/* Sidebar navegável */}
        <nav className="w-52 bg-white border-r border-slate-200 shrink-0 hidden lg:flex flex-col py-3 text-sm no-print">
          {NAV.map(([grupo,itens])=>(
            <div key={grupo} className="px-2 mb-1">
              <div className="px-2 pt-2 pb-1 text-[11px] font-semibold uppercase tracking-wider text-slate-400">{grupo}</div>
              {itens.map(([id,label,on])=>(
                <button key={id} disabled={!on} onClick={()=>on&&setView(id)}
                  className={"w-full text-left px-3 py-1.5 rounded-md text-sm "+(view===id?"bg-brand/10 text-brand font-semibold":on?"text-slate-600 hover:bg-slate-50":"text-slate-400 cursor-default")}>
                  {label}{!on&&<span className="text-[10px] ml-1 text-slate-300">em breve</span>}
                </button>
              ))}
            </div>
          ))}
          <div className="mt-auto border-t border-slate-100 pt-2 px-2">
            <button onClick={()=>setView("configs")} className={"w-full text-left px-3 py-1.5 rounded-md text-sm flex items-center gap-2 "+(view==="configs"?"bg-brand/10 text-brand font-semibold":"text-slate-500 hover:bg-slate-50")}>
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              Configurações
            </button>
            <div className="px-2 py-2 text-[11px] text-slate-400 leading-tight">Módulos compartilham<br/>os mesmos dados.</div>
          </div>
        </nav>

        {/* Módulo ativo */}
        {view==="pessoas" && <PessoasView {...{pessoas,eventos,commit,role,busca,notify,cargos,departamentos,configs,onExcluirPessoa:(p)=>{if(!window.confirm(`Excluir "${p.nome}"? Esta ação não pode ser desfeita.`))return;setPessoas(prev=>prev.filter(x=>x.id!==p.id));notify(`${p.nome} excluído.`);}}}/>}
        {view==="organograma" && <OrganogramaView {...{departamentos,setDepartamentos,cargos,pessoas,commit,role,busca,notify,orgRevisoes,setOrgRevisoes}}/>}
        {view==="cargos" && <CargosView {...{cargos,setCargos,pessoas,eventos,commit,addEventos,promocoes,setPromocoes,role,busca,notify,iaKey,iaModel,departamentosMaster:departamentos}}/>}
        {view==="departamentos" && <DepartamentosView {...{departamentos,setDepartamentos,cargos,role,busca,addEventos,notify,iaKey,iaModel}}/>}
        {view==="configs" && <ConfigsView configs={configs} setConfigs={setConfigs} notify={notify}/>}
      </div>

      {cfgOpen && <ConfigFirebase mode={mode} onClose={()=>setCfgOpen(false)} onConnect={conectarFirebase} iaKey={iaKey} setIaKey={setIaKey} iaModel={iaModel} setIaModel={setIaModel}/>}
      {toast && <div className="fixed bottom-5 left-1/2 -translate-x-1/2 bg-navy text-white text-sm px-4 py-2.5 rounded-lg shadow-lg z-50 no-print">{toast}</div>}
    </div>
  );
}

// ================================================================
//  MÓDULO PESSOAS
// ================================================================
function PessoasView({pessoas,eventos,commit,role,busca,notify,cargos,departamentos,configs,onCriarPessoa,onExcluirPessoa}){
  const isRH=role==="RH";
  const [buscaLocal,setBuscaLocal]=useState("");
  const [mostrarInativos,setMostrarInativos]=useState(false);
  const [sel,setSel]=useState(null);
  const [novo,setNovo]=useState(false);
  const podeVerSalario=role==="RH";

  const criarPessoa=async dados=>{
    const p={id:uid(),status:dados.status||"ATIVO",organizacaoId:"braskim",competencias:[],tags:[],dependentes:[],documentos:[],observacoes:"",logAlteracoes:[],...dados,
      vinculo:{matricula:"B"+Math.floor(1000+Math.random()*8999),jornada:"44h semanais",faixaSalarial:faixa(Number(dados.vinculo?.salario||0)),desligamento:"",...dados.vinculo}};
    await commit(p,[evt("PessoaCriada",p.id,"Cadastro criado no sistema"),evt("PessoaAdmitida",p.id,`Admitido(a) como ${p.vinculo.cargo||"—"} · ${p.vinculo.setor||"—"}`)]);
    setNovo(false); setSel(p); notify("Colaborador cadastrado com sucesso.");
  };
  const criarPessoaFn=onCriarPessoa||criarPessoa;
  const editarPessoa=async(orig,patch)=>{
    const p={...orig,...patch,vinculo:{...orig.vinculo,...(patch.vinculo||{})}};
    p.vinculo.faixaSalarial=faixa(Number(p.vinculo.salario||0));
    const evs=[];
    // campos com label amigável para o log
    const LABELS={nome:"Nome",email:"E-mail",telefone:"Telefone",nascimento:"Data de Nascimento",rg:"RG",cpf:"CPF",sexo:"Sexo",estadoCivil:"Estado Civil",escolaridade:"Escolaridade",formacao:"Formação",endereco:"Endereço",complemento:"Complemento",bairro:"Bairro",cidade:"Cidade",cep:"CEP",status:"Status"};
    const LABELS_VINC={cargo:"Cargo",setor:"Setor",lider:"Superior Direto",admissao:"Data de Admissão",salario:"Salário",matricula:"Matrícula",ctps:"CTPS",esocial:"e-Social",pis:"PIS",tipo:"Tipo",cbo:"CBO"};
    const LABELS_BANCO={banco:"Banco",agencia:"Agência",conta:"Conta Corrente",pix:"PIX",tipoPix:"Tipo PIX"};
    const LABELS_OUT={camiseta:"Camiseta",calcado:"Calçado"};
    const LABELS_EMG={nome:"Contato Emergência - Nome",parentesco:"Contato Emergência - Parentesco",telefone:"Contato Emergência - Telefone"};
    const alteracoes=[];
    Object.entries(LABELS).forEach(([k,l])=>{const va=orig[k]||"",vb=patch[k]!=null?patch[k]:orig[k]||"";if(String(va)!==String(vb))alteracoes.push(`${l}: "${va}" → "${vb}"`);});
    Object.entries(LABELS_VINC).forEach(([k,l])=>{const va=orig.vinculo?.[k]||"",vb=patch.vinculo?.[k]!=null?patch.vinculo[k]:orig.vinculo?.[k]||"";if(String(va)!==String(vb)){alteracoes.push(`${l}: "${va}" → "${vb}"`);if(k==="cargo")evs.push(evt("CargoAlterado",p.id,`Cargo: ${va} → ${vb}`));else if(k==="salario")evs.push(evt("AlteracaoSalarial",p.id,`Salário: ${money(va)} → ${money(vb)}`));else if(k==="lider")evs.push(evt("MudancaDeLider",p.id,`Líder: ${va} → ${vb}`));}});
    Object.entries(LABELS_BANCO).forEach(([k,l])=>{const va=(orig.banco||{})[k]||"",vb=patch.banco?.[k]!=null?patch.banco[k]:(orig.banco||{})[k]||"";if(String(va)!==String(vb))alteracoes.push(`${l}: "${va}" → "${vb}"`);});
    Object.entries(LABELS_OUT).forEach(([k,l])=>{const va=(orig.outras||{})[k]||"",vb=patch.outras?.[k]!=null?patch.outras[k]:(orig.outras||{})[k]||"";if(String(va)!==String(vb))alteracoes.push(`${l}: "${va}" → "${vb}"`);});
    Object.entries(LABELS_EMG).forEach(([k,l])=>{const va=(orig.emergencia||{})[k]||"",vb=patch.emergencia?.[k]!=null?patch.emergencia[k]:(orig.emergencia||{})[k]||"";if(String(va)!==String(vb))alteracoes.push(`${l}: "${va}" → "${vb}"`);});
    const nDepOrig=(orig.dependentes||[]).length,nDepNov=(patch.dependentes||[]).length;
    if(nDepOrig!==nDepNov)alteracoes.push(`Dependentes: ${nDepOrig} → ${nDepNov}`);
    if(patch.foto!==undefined&&patch.foto!==orig.foto)alteracoes.push("Foto do colaborador atualizada");
    if(patch.status&&patch.status!==orig.status){if(patch.status==="AFASTADO")evs.push(evt("PessoaAfastada",p.id,"Afastamento iniciado"));else if(patch.status==="DESLIGADO"){evs.push(evt("PessoaDesligada",p.id,"Desligamento registrado"));p.vinculo.desligamento=hoje();}else if(orig.status==="AFASTADO"&&patch.status==="ATIVO")evs.push(evt("PessoaRetornou",p.id,"Retorno ao trabalho"));}
    if(alteracoes.length){
      const entrada={id:uid(),timestamp:new Date().toISOString(),autor:role||"Sistema",campos:alteracoes};
      p.logAlteracoes=[...(orig.logAlteracoes||[]),entrada];
      if(evs.length===0)evs.push(evt("DadosPessoaisAlterados",p.id,`${alteracoes.length} campo(s) alterado(s)`));
    }
    await commit(p,evs.length?evs:[]);
    setSel(p);
    notify(alteracoes.length?`Salvo · ${alteracoes.length} alteração(ões) registrada(s)`:"Salvo.");
  };
  const addDocumento=async(p,docu)=>{const np={...p,documentos:[...(p.documentos||[]),docu]};await commit(np,[evt("DocumentoAnexado",p.id,`Documento anexado: ${docu.tipo}`)]);setSel(np);notify("Documento anexado");};
  const patchPessoa=async(np,resumo)=>{ await commit(np, resumo?[evt("DadosPessoaisAlterados",np.id,resumo)]:[]); setSel(np); if(resumo)notify(resumo); };
  const excluirPessoa=(p)=>{ onExcluirPessoa&&onExcluirPessoa(p); setSel(null); };

  const filtradas=useMemo(()=>pessoas
    .filter(p=>mostrarInativos||p.status!=="DESLIGADO")
    .filter(p=>{const q=(buscaLocal||busca).toLowerCase();return !q||p.nome.toLowerCase().includes(q)||(p.vinculo?.cargo||"").toLowerCase().includes(q)||(p.email||"").toLowerCase().includes(q)||(p.telefone||"").includes(q)||(p.vinculo?.matricula||"").toLowerCase().includes(q);})
    .sort((a,b)=>a.nome.localeCompare(b.nome)),[pessoas,buscaLocal,busca,mostrarInativos]);
  const kpi=useMemo(()=>{
    const ativos=pessoas.filter(p=>p.status==="ATIVO").length,afast=pessoas.filter(p=>p.status==="AFASTADO").length,
      compMed=pessoas.length?Math.round(pessoas.reduce((s,p)=>s+completude(p),0)/pessoas.length):0;
    const tiposObrig=(configs?.tiposDocumento||[]).filter(t=>t.ativo&&t.obrigatorio);
    let docsVenc=0,docsFalt=0;
    const pendencias=[];
    pessoas.filter(p=>p.status!=="DESLIGADO").forEach(p=>{
      const docs=p.documentos||[];
      const vencidos=docs.filter(d=>d.status==="VENCIDO");
      const faltantes=tiposObrig.filter(t=>!docs.find(d=>d.tipoId===t.id));
      docsVenc+=vencidos.length; docsFalt+=faltantes.length;
      if(vencidos.length||faltantes.length) pendencias.push({pessoa:p,vencidos,faltantes});
    });
    return{total:pessoas.length,ativos,afast,compMed,docsVenc,docsFalt,pendencias};
  },[pessoas,configs]);
  const [modalPend,setModalPend]=useState(false);
  const nTestes=p=>Object.values(p.testes||{}).filter(t=>t&&t.status==="CONCLUIDO").length;
  const live=sel||null;

  return (
    <main className="flex-1 overflow-auto">
      {live ? (
        <ColaboradorDetalhe pessoa={live} eventos={eventos.filter(e=>e.pessoaId===live.id)} onVoltar={()=>setSel(null)} onSave={editarPessoa} onPatch={patchPessoa} onAddDoc={addDocumento} onExcluir={excluirPessoa} podeVerSalario={podeVerSalario} role={role} cargos={cargos} pessoas={pessoas} departamentos={departamentos} configs={configs}/>
      ) : (
      <div className="max-w-[1800px] mx-auto px-8 py-6">
        <div className="flex items-center justify-between flex-wrap gap-3 mb-4">
          <div className="flex items-center gap-2.5"><span className="w-10 h-10 grid place-items-center rounded-xl bg-brand/10 text-brand"><IcUsers size={22}/></span><h1 className="text-2xl font-bold text-navy">Colaboradores</h1></div>
          <div className="flex items-center gap-2">
            <button onClick={()=>exportarColaboradoresExcel(pessoas)} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5"><IcDownload/>Exportar Excel</button>
            <button onClick={()=>document.getElementById("importColabInput")?.click()} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5"><IcFile/>Importar Excel</button>
            <input id="importColabInput" type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={e=>importarColaboradoresExcel(e,criarPessoaFn,editarPessoa,pessoas,notify,()=>{e.target.value="";})}/>
            <button onClick={()=>setNovo(true)} className="bg-brand hover:bg-navy text-white text-sm font-medium px-4 py-2 rounded-md transition-colors shadow-sm">+ Adicionar Colaborador</button>
          </div>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-5">
          <Kpi label="Total" value={kpi.total}/>
          <Kpi label="Ativos" value={kpi.ativos} accent="ok"/>
          <Kpi label="Afastados" value={kpi.afast} accent="warn"/>
          <Kpi label="Cadastro médio" value={kpi.compMed+"%"}/>
          <div onClick={()=>kpi.pendencias.length&&setModalPend(true)} className={"rounded-xl border shadow-sm p-3 flex flex-col gap-1 "+(kpi.pendencias.length?"bg-red-50 border-red-200 cursor-pointer hover:bg-red-100":"bg-white border-slate-200")}>
            <div className="text-[11px] uppercase tracking-wide text-slate-400 font-semibold">Pendências</div>
            <div className={"text-2xl font-bold "+(kpi.pendencias.length?"text-red-600":"text-slate-300")}>{kpi.docsVenc+kpi.docsFalt}</div>
            <div className="text-xs text-slate-500">{kpi.docsVenc} vencido(s) · {kpi.docsFalt} faltante(s)</div>
          </div>
        </div>

        {/* Modal de pendências */}
        {modalPend&&<div className="fixed inset-0 z-50 flex items-center justify-center">
          <div className="absolute inset-0 bg-navy/40" onClick={()=>setModalPend(false)}/>
          <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col">
            <div className="flex items-center justify-between px-5 py-4 border-b border-slate-200">
              <div><div className="font-bold text-navy text-lg">Pendências de Documentos</div>
                <div className="text-sm text-slate-500">{kpi.docsVenc} vencido(s) · {kpi.docsFalt} faltante(s) · {kpi.pendencias.length} colaborador(es)</div></div>
              <button onClick={()=>setModalPend(false)} className="text-slate-400 hover:text-slate-600 text-xl">✕</button>
            </div>
            <div className="overflow-y-auto flex-1 p-4 space-y-3">
              {kpi.pendencias.map(({pessoa:p,vencidos,faltantes})=><div key={p.id} className="border border-slate-200 rounded-xl overflow-hidden">
                <div className="flex items-center gap-3 px-4 py-2.5 bg-slate-50 cursor-pointer hover:bg-slate-100" onClick={()=>{setSel(p);setModalPend(false);}}>
                  <Avatar nome={p.nome} status={p.status} foto={p.foto} pessoaId={p.id} fotoLocal={p.fotoLocal}/>
                  <div className="flex-1"><div className="font-medium text-navy text-sm">{p.nome}</div>
                    <div className="text-xs text-slate-500">{p.vinculo?.cargo||"—"}</div></div>
                  <div className="flex gap-2">
                    {vencidos.length>0&&<span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-medium">{vencidos.length} vencido(s)</span>}
                    {faltantes.length>0&&<span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">{faltantes.length} faltante(s)</span>}
                  </div>
                </div>
                <div className="divide-y divide-slate-100">
                  {vencidos.map(d=><div key={d.id} className="flex items-center gap-2 px-4 py-2 text-sm">
                    <span className="w-2 h-2 rounded-full bg-red-500 shrink-0"/>
                    <span className="text-slate-700">{d.tipo}</span>
                    <span className="text-xs text-red-500 ml-auto">Vencido em {brDate(d.validade)}</span>
                  </div>)}
                  {faltantes.map(t=><div key={t.id} className="flex items-center gap-2 px-4 py-2 text-sm">
                    <span className="w-2 h-2 rounded-full bg-amber-400 shrink-0"/>
                    <span className="text-slate-700">{t.nome}</span>
                    <span className="text-xs text-amber-600 ml-auto">Não cadastrado</span>
                  </div>)}
                </div>
              </div>)}
            </div>
          </div>
        </div>}
        <div className="flex items-center gap-3 mb-3">
          <div className="flex-1 flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 shadow-sm">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input value={buscaLocal} onChange={e=>setBuscaLocal(e.target.value)} placeholder="Buscar por nome, cargo, e-mail, telefone…" className="flex-1 text-sm outline-none bg-transparent text-slate-700 placeholder-slate-400"/>
          </div>
          <label className="flex items-center gap-2 text-sm text-slate-500 whitespace-nowrap px-1 cursor-pointer select-none">
            <input type="checkbox" checked={mostrarInativos} onChange={e=>setMostrarInativos(e.target.checked)} className="accent-brand"/>Mostrar inativos
          </label>
        </div>
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto">
          <table className="w-full text-sm min-w-[680px]">
            <thead><tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
              <th className="text-left font-semibold px-4 py-2.5">Pessoa</th>
              <th className="text-left font-semibold px-3 py-2.5">Cargo</th>
              <th className="text-left font-semibold px-3 py-2.5 hidden md:table-cell">Telefone</th>
              <th className="text-left font-semibold px-3 py-2.5 hidden md:table-cell">E-mail</th>
              <th className="text-left font-semibold px-3 py-2.5">Status</th>
              <th className="text-center font-semibold px-3 py-2.5">Cadastro</th>
              <th className="text-center font-semibold px-3 py-2.5">Docs</th>
              <th className="px-3 py-2.5"></th></tr></thead>
            <tbody>
              {filtradas.map(p=>{
                const pct=completude(p);const completo=pct===100;
                const tiposObrig=(configs?.tiposDocumento||[]).filter(t=>t.ativo&&t.obrigatorio);
                const docs=p.documentos||[];
                const nVenc=docs.filter(d=>d.status==="VENCIDO").length;
                const nFalt=tiposObrig.filter(t=>!docs.find(d=>d.tipoId===t.id)).length;
                const temAlerta=nVenc>0||nFalt>0;
                return <tr key={p.id} onClick={()=>setSel(p)} className="group border-t border-slate-100 hover:bg-slate-50 cursor-pointer">
                  <td className="px-4 py-2.5"><div className="flex items-center gap-2.5"><Avatar nome={p.nome} status={p.status} foto={p.foto} pessoaId={p.id} fotoLocal={p.fotoLocal}/>
                    <div><div className="font-medium text-navy leading-tight">{p.nome}</div><div className="text-xs text-slate-400 font-mono">{p.vinculo?.matricula}</div></div></div></td>
                  <td className="px-3 py-2.5 text-slate-600">{p.vinculo?.cargo||"—"}</td>
                  <td className="px-3 py-2.5 text-slate-600 font-mono text-xs hidden md:table-cell">{p.telefone||"—"}</td>
                  <td className="px-3 py-2.5 text-slate-600 hidden md:table-cell">{p.email||"—"}</td>
                  <td className="px-3 py-2.5"><Badge status={p.status}/></td>
                  <td className="px-3 py-2.5">
                    <div className="flex items-center justify-center gap-1.5" title={completo?"Cadastro completo":`${pct}% preenchido`}>
                      <div className={"w-3 h-3 rounded-full "+(completo?"bg-emerald-500":"bg-red-400")}></div>
                      <span className={"text-xs font-medium "+(completo?"text-emerald-600":"text-red-500")}>{pct}%</span>
                    </div>
                  </td>
                  <td className="px-3 py-2.5 text-center">
                    {temAlerta?<div className="flex items-center justify-center gap-1" title={`${nVenc} vencido(s) · ${nFalt} faltante(s)`}>
                      {nVenc>0&&<span className="text-xs bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-medium">⚠ {nVenc}</span>}
                      {nFalt>0&&<span className="text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-medium">✗ {nFalt}</span>}
                    </div>:<span className="text-slate-200 text-xs">—</span>}
                  </td>
                  <td className="px-3 py-2.5 text-right">
                    <div className="flex items-center justify-end gap-1">
                      {isRH&&<button onClick={e=>{e.stopPropagation();excluirPessoa(p);}} className="opacity-0 group-hover:opacity-100 p-1 text-red-400 hover:text-red-600" title="Excluir colaborador"><IcTrash/></button>}
                      <span className="text-slate-300">›</span>
                    </div>
                  </td>
                </tr>;})}
              {filtradas.length===0&&<tr><td colSpan="6" className="px-4 py-10 text-center text-slate-400">Nenhum colaborador encontrado.</td></tr>}
            </tbody>
          </table>
        </div>
        <p className="text-xs text-slate-400 mt-3">Clique no colaborador para abrir a ficha completa. Cada alteração relevante gera um <b>Evento</b> imutável que alimenta a <b>Jornada</b> e reflete no Organograma.</p>
      </div>
      )}
      {novo&&<NovaPessoa onClose={()=>setNovo(false)} onCriar={criarPessoaFn} cargos={cargos}/>}
    </main>
  );
}

// ================================================================
//  FICHA DO COLABORADOR — TELA INTEIRA (estilo Orbit)
// ================================================================
function ColaboradorDetalhe({pessoa,eventos,onVoltar,onSave,onPatch,onAddDoc,onExcluir,podeVerSalario,role,cargos,pessoas,departamentos,configs}){
  const [tab,setTab]=useState("dados");
  const [f,setF]=useState(()=>JSON.parse(JSON.stringify(pessoa)));
  useEffect(()=>{setF(JSON.parse(JSON.stringify(pessoa)));},[pessoa.id]);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const setV=(k,v)=>setF(p=>({...p,vinculo:{...p.vinculo,[k]:v}}));
  const setRede=(k,v)=>setF(p=>({...p,redes:{...(p.redes||{}),[k]:v}}));
  const setEmerg=(k,v)=>setF(p=>({...p,emergencia:{...(p.emergencia||{}),[k]:v}}));
  const escolherCargoV=titulo=>{const c=(cargos||[]).find(x=>x.titulo===titulo);setF(p=>({...p,vinculo:{...p.vinculo,cargo:titulo,setor:c?.setor||p.vinculo.setor}}));};
  const cargoSel=(cargos||[]).find(c=>c.titulo===f.vinculo?.cargo);
  const inp="w-full text-sm border border-slate-300 rounded-md px-2.5 py-2 outline-none focus:ring-2 ring-brand/30";
  const salvarDados=async()=>{await onSave(pessoa,{nome:f.nome,email:f.email,telefone:f.telefone,nascimento:f.nascimento,rg:f.rg,cpf:f.cpf,sexo:f.sexo,estadoCivil:f.estadoCivil,escolaridade:f.escolaridade,formacao:f.formacao,endereco:f.endereco,complemento:f.complemento,bairro:f.bairro,cidade:f.cidade,cep:f.cep,status:f.status,tags:f.tags,redes:f.redes,emergencia:f.emergencia,banco:f.banco,outras:f.outras,vinculo:f.vinculo,foto:f.foto,fotoLocal:f.fotoLocal,dependentes:f.dependentes});onVoltar();};
  const done=TESTES_CATALOGO.filter(t=>(pessoa.testes||{})[t.id]?.status==="CONCLUIDO").length;
  const fotoAtual=f.foto||(pessoa.fotoLocal?localStorage.getItem("bsk_foto_"+pessoa.id)||"":pessoa.foto)||"";
  const [verSalario,setVerSalario]=useState(false);
  const comprimirFoto=(dataUrl,maxKB=300)=>new Promise(res=>{
    const img=new Image();img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height,q=0.85;
      if(w>800){h=Math.round(h*800/w);w=800;}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      let out=canvas.toDataURL("image/jpeg",q);
      while(out.length>maxKB*1024&&q>0.3){q-=0.1;out=canvas.toDataURL("image/jpeg",q);}
      res(out);
    };img.src=dataUrl;
  });
  const onFotoChange=e=>{const file=e.target.files?.[0];if(!file)return;if(file.size>5*1024*1024){alert("Foto muito grande — máximo 5MB.");return;}
    const r=new FileReader();r.onload=async ev=>{
      const comprimida=await comprimirFoto(ev.target.result);
      set("foto",comprimida);
      // salva foto no localStorage separado (não vai pro Firestore — evita limite de 1MB)
      try{localStorage.setItem("bsk_foto_"+pessoa.id,comprimida);}catch{}
      // salva o colaborador sem a foto no Firestore, com flag indicando que tem foto
      const semFoto={...pessoa,fotoLocal:true,foto:""};
      onPatch({...pessoa,foto:comprimida,fotoLocal:true},"Foto do colaborador atualizada");
    };r.readAsDataURL(file);};
  const removerFoto=()=>{set("foto","");try{localStorage.removeItem("bsk_foto_"+pessoa.id);}catch{}onPatch({...pessoa,foto:"",fotoLocal:false},"Foto removida");};

  const setTeste=(id,dados)=>{ const np={...pessoa,testes:{...(pessoa.testes||{}),[id]:dados}}; onPatch(np, dados.status==="CONCLUIDO"?`Teste ${TESTES_CATALOGO.find(t=>t.id===id)?.nome} registrado`:null); };
  const addTreino=t=>{ onPatch({...pessoa,treinamentos:[...(pessoa.treinamentos||[]),t]},"Treinamento adicionado"); };
  const addNota=texto=>{ onPatch({...pessoa,anotacoes:[...(pessoa.anotacoes||[]),{id:uid(),data:hoje(),autor:role,texto}]},null); };
  const addReuniao=r=>{ onPatch({...pessoa,reunioes1a1:[...(pessoa.reunioes1a1||[]),{id:uid(),...r}]},"Reunião 1:1 registrada"); };
  const updateReuniao=r=>{ onPatch({...pessoa,reunioes1a1:(pessoa.reunioes1a1||[]).map(x=>x.id===r.id?r:x)},"Reunião 1:1 atualizada"); };
  const removeReuniao=id=>{ onPatch({...pessoa,reunioes1a1:(pessoa.reunioes1a1||[]).filter(x=>x.id!==id)},"Reunião 1:1 removida"); };

  const tabs=[["dados","Dados"],["docs","Documentos"],["desenv","Desenvolvimento"],["treinamentos","Treinamentos"],["testes","Testes Comportamentais"],["jornada","Jornada"],["reunioes","Reuniões 1:1"],["obs","Observações"],["log","Log de Alterações"]];

  return (
    <div className="max-w-[1800px] mx-auto px-8 py-6">
      <div className="text-xs text-slate-400 mb-3">Colaboradores <span className="text-slate-300">/</span> {pessoa.nome}</div>
      <div className="flex items-center justify-between gap-3 mb-5 flex-wrap">
        <div className="flex items-center gap-3">
          <Avatar nome={pessoa.nome} status={pessoa.status} lg foto={pessoa.foto} pessoaId={pessoa.id} fotoLocal={pessoa.fotoLocal}/>
          <div><div className="flex items-center gap-2"><h1 className="text-2xl font-bold text-navy">{pessoa.nome}</h1><Badge status={pessoa.status}/></div>
            <div className="text-sm text-slate-500">{pessoa.email} · {pessoa.vinculo?.cargo}</div></div>
        </div>
        <div className="flex gap-2">
          <button onClick={onVoltar} className="px-3 py-2 text-sm border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50">← Voltar</button>
          {tab==="dados"&&role!=="Colaborador"&&<button onClick={salvarDados} className="px-4 py-2 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md shadow-sm">Salvar Alterações</button>}
          <button onClick={()=>exportarFichaPDF(pessoa,fotoAtual)} className="px-3 py-2 text-sm border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50 flex items-center gap-1.5"><IcFile/>Exportar PDF</button>
          {role==="RH"&&onExcluir&&<button onClick={()=>onExcluir(pessoa)} className="px-3 py-2 text-sm border border-red-200 text-red-500 hover:bg-red-50 rounded-md">Excluir</button>}
        </div>
      </div>
      <div className="flex gap-1 border-b border-slate-200 mb-5 overflow-x-auto">
        {tabs.map(([k,l])=><button key={k} onClick={()=>setTab(k)} className={"px-3 py-2 text-sm font-medium border-b-2 whitespace-nowrap "+(tab===k?"border-brand text-brand":"border-transparent text-slate-400 hover:text-slate-600")}>{l}{k==="testes"&&done>0&&<span className="ml-1.5 bg-emerald-100 text-emerald-700 text-[10px] px-1.5 rounded-full">{done}/5</span>}</button>)}
      </div>

      {/* DADOS */}
      {tab==="dados"&&(<div className="space-y-5 max-w-5xl">

        {/* 1 — INFORMAÇÕES BÁSICAS */}
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
          <div className="text-sm font-semibold text-navy mb-4">Informações Básicas</div>
          <div className="flex gap-5 items-start">
            <div className="flex-1 grid grid-cols-2 gap-3">
              <L t="Nome *"><input value={f.nome} onChange={e=>set("nome",e.target.value)} className={inp}/></L>
              <L t="Data de Nascimento"><input type="date" value={f.nascimento} onChange={e=>set("nascimento",e.target.value)} className={inp}/></L>
              <L t="RG"><input value={f.rg||""} onChange={e=>set("rg",e.target.value)} className={inp}/></L>
              <L t="CPF"><input value={f.cpf||""} onChange={e=>set("cpf",fmtCPF(e.target.value))} placeholder="000.000.000-00" className={inp}/></L>
              <L t="Sexo"><select value={f.sexo||""} onChange={e=>set("sexo",e.target.value)} className={inp}><option value="">Selecione</option><option>Masculino</option><option>Feminino</option></select></L>
              <L t="E-mail"><input value={f.email} onChange={e=>set("email",e.target.value)} className={inp}/></L>
              <L t="Endereço"><input value={f.endereco||""} onChange={e=>set("endereco",e.target.value)} className={inp}/></L>
              <L t="Complemento"><input value={f.complemento||""} onChange={e=>set("complemento",e.target.value)} className={inp}/></L>
              <L t="Bairro"><input value={f.bairro||""} onChange={e=>set("bairro",e.target.value)} className={inp}/></L>
              <L t="Cidade"><input value={f.cidade||""} onChange={e=>set("cidade",e.target.value)} className={inp}/></L>
              <L t="CEP"><input value={f.cep||""} onChange={e=>set("cep",e.target.value)} placeholder="00000-000" className={inp}/></L>
              <L t="Telefone / WhatsApp"><input value={f.telefone} onChange={e=>set("telefone",fmtTel(e.target.value))} placeholder="(00) 00000-0000" className={inp}/></L>
              <L t="Estado Civil"><select value={f.estadoCivil||""} onChange={e=>set("estadoCivil",e.target.value)} className={inp}><option value="">Selecione</option><option>Solteiro</option><option>Casado</option><option>Divorciado</option><option>Viúvo</option></select></L>
              <L t="Escolaridade"><select value={f.escolaridade||""} onChange={e=>set("escolaridade",e.target.value)} className={inp}><option value="">Selecione</option>{ESCOLARIDADES_PESSOA.map(x=><option key={x}>{x}</option>)}</select></L>
              <div className="col-span-2"><L t="Formação"><input value={f.formacao||""} onChange={e=>set("formacao",e.target.value)} className={inp}/></L></div>
            </div>
            <div className="flex flex-col items-center gap-1.5 shrink-0" style={{width:"130px"}}>
              <div className="text-[11px] uppercase tracking-wide text-slate-400 mb-0.5 self-start">Foto</div>
              <div className="relative group w-full" style={{minHeight:"189px"}}>
                {fotoAtual?<img src={fotoAtual} alt={pessoa.nome} className="w-full rounded-xl border border-slate-200 shadow-sm object-cover" style={{minHeight:"189px",maxHeight:"260px"}}/>
                  :<div className="w-full rounded-xl border-2 border-dashed border-slate-300 bg-slate-50 flex flex-col items-center justify-center gap-2 text-slate-400 cursor-pointer hover:border-brand hover:bg-brand/5 transition-colors" style={{minHeight:"189px"}} onClick={()=>document.getElementById("fotoInput"+pessoa.id)?.click()}>
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                    <span className="text-[11px] text-center px-2 leading-snug">Clique para<br/>adicionar foto</span>
                  </div>}
                {fotoAtual&&<div className="absolute inset-0 rounded-xl bg-navy/0 group-hover:bg-navy/40 transition-colors flex flex-col items-center justify-center gap-1.5 opacity-0 group-hover:opacity-100">
                  <button onClick={()=>document.getElementById("fotoInput"+pessoa.id)?.click()} className="bg-white rounded-md px-2.5 py-1 text-xs text-navy font-medium shadow w-20">Trocar</button>
                  <button onClick={removerFoto} className="bg-red-500 rounded-md px-2.5 py-1 text-xs text-white font-medium shadow w-20">Remover</button>
                </div>}
              </div>
              <input id={"fotoInput"+pessoa.id} type="file" accept="image/*" className="hidden" onChange={onFotoChange}/>
              <div className="text-[10px] text-slate-400 text-center">JPG, PNG · máx 5MB</div>
            </div>
          </div>
        </div>

        {/* 2 — INFORMAÇÕES PROFISSIONAIS */}
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
          <div className="text-sm font-semibold text-navy mb-4">Informações Profissionais</div>
          <div className="grid grid-cols-2 gap-3">
            <L t="Matrícula"><input value={f.vinculo?.matricula||""} onChange={e=>setV("matricula",e.target.value)} className={inp}/></L>
            <L t="CTPS"><input value={f.vinculo?.ctps||""} onChange={e=>setV("ctps",e.target.value)} className={inp}/></L>
            <L t="Código e-Social"><input value={f.vinculo?.esocial||""} onChange={e=>setV("esocial",e.target.value)} className={inp}/></L>
            <L t="PIS"><input value={f.vinculo?.pis||""} onChange={e=>setV("pis",e.target.value)} className={inp}/></L>
            <L t="Tipo"><select value={f.vinculo?.tipo||""} onChange={e=>setV("tipo",e.target.value)} className={inp}><option value="">Selecione</option><option>MOD</option><option>MOI</option></select></L>
            <L t="Cargo"><select value={f.vinculo?.cargo||""} onChange={e=>escolherCargoV(e.target.value)} className={inp}><option value="">Selecione um cargo</option>{[...new Set([...(cargos||[]).filter(c=>c.status!=="INATIVO").map(c=>c.titulo),f.vinculo?.cargo].filter(Boolean))].sort((a,b)=>a.localeCompare(b)).map(t=><option key={t} value={t}>{t}</option>)}</select></L>
            {cargoSel&&<div className="col-span-2 text-[11px] text-slate-500 bg-slate-50 rounded-md p-2.5 ring-1 ring-slate-200"><b className="text-navy">Cargo selecionado:</b> {cargoSel.titulo} · <b className="text-navy">Departamento:</b> {cargoSel.departamento} · <b className="text-navy">Faixa:</b> {money(cargoSel.faixaMin)}–{money(cargoSel.faixaMax)}</div>}
            <L t="CBO"><input value={f.vinculo?.cbo||cargoSel?.cbo||""} onChange={e=>setV("cbo",e.target.value)} className={inp}/></L>
            <L t="Departamento"><select value={f.vinculo?.setor||""} onChange={e=>setV("setor",e.target.value)} className={inp}><option value="">Selecione</option>{[...(departamentos||[])].sort((a,b)=>a.nome.localeCompare(b.nome)).map(d=><option key={d.id} value={d.nome}>{d.nome}</option>)}</select></L>
            <L t="Superior Direto"><select value={f.vinculo?.lider||""} onChange={e=>setV("lider",e.target.value)} className={inp}><option value="">—</option>{[...(pessoas||[])].filter(x=>x.id!==pessoa.id&&x.status!=="DESLIGADO").sort((a,b)=>a.nome.localeCompare(b.nome)).map(x=><option key={x.id} value={x.nome}>{x.nome}</option>)}</select></L>
            <L t="Data de Admissão"><input type="date" value={f.vinculo?.admissao||""} onChange={e=>setV("admissao",e.target.value)} className={inp}/></L>
            <L t="Salário (R$)">{podeVerSalario?<div className="relative">
              <input
                type={verSalario?"text":"password"}
                value={verSalario?(f.vinculo?.salarioDigitando!==undefined?f.vinculo.salarioDigitando:fmtSalInput(f.vinculo?.salario||"")):"••••••"}
                onChange={e=>{if(verSalario)setV("salarioDigitando",e.target.value);}}
                onFocus={e=>{if(verSalario){const raw=parseSal(f.vinculo?.salario||"");setV("salarioDigitando",raw||"");}}}
                onBlur={e=>{if(verSalario){const n=parseSal(e.target.value);setF(p=>({...p,vinculo:{...p.vinculo,salario:n||"",salarioDigitando:undefined}}));}}}
                placeholder="0,00" className={inp+" pr-9"}/>
              <button type="button" onClick={()=>setVerSalario(v=>!v)} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><IcEye open={verSalario}/></button>
            </div>:<input type="password" value="••••••" disabled className={inp+" opacity-50 cursor-not-allowed"}/>}</L>
            <L t="Status"><select value={f.status} onChange={e=>set("status",e.target.value)} className={inp}><option value="ATIVO">Ativo</option><option value="AFASTADO">Afastado</option><option value="DESLIGADO">Desligado</option></select></L>
          </div>
        </div>

        {/* 3 — INFORMAÇÕES BANCÁRIAS */}
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
          <div className="text-sm font-semibold text-navy mb-4">Informações Bancárias</div>
          <div className="grid grid-cols-2 gap-3">
            <L t="Banco"><input value={f.banco?.banco||""} onChange={e=>setF(p=>({...p,banco:{...p.banco,banco:e.target.value}}))} className={inp}/></L>
            <L t="Agência"><input value={f.banco?.agencia||""} onChange={e=>setF(p=>({...p,banco:{...p.banco,agencia:e.target.value}}))} className={inp}/></L>
            <L t="Conta Corrente"><input value={f.banco?.conta||""} onChange={e=>setF(p=>({...p,banco:{...p.banco,conta:e.target.value}}))} className={inp}/></L>
            <L t="PIX"><input value={f.banco?.pix||""} onChange={e=>setF(p=>({...p,banco:{...p.banco,pix:e.target.value}}))} className={inp}/></L>
            <L t="Tipo PIX"><select value={f.banco?.tipoPix||""} onChange={e=>setF(p=>({...p,banco:{...p.banco,tipoPix:e.target.value}}))} className={inp}><option value="">Selecione</option><option>CPF</option><option>Telefone</option><option>E-mail</option><option>Chave aleatória</option></select></L>
          </div>
        </div>

        {/* 4 — OUTRAS INFORMAÇÕES */}
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
          <div className="text-sm font-semibold text-navy mb-4">Outras Informações</div>
          <div className="grid grid-cols-2 gap-3">
            <L t="Número da Camiseta"><input value={f.outras?.camiseta||""} onChange={e=>setF(p=>({...p,outras:{...p.outras,camiseta:e.target.value}}))} className={inp}/></L>
            <L t="Número do Calçado"><input value={f.outras?.calcado||""} onChange={e=>setF(p=>({...p,outras:{...p.outras,calcado:e.target.value}}))} className={inp}/></L>
          </div>
        </div>

        {/* 5 — CONTATO DE EMERGÊNCIA */}
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
          <div className="text-sm font-semibold text-navy mb-4">Contato de Emergência</div>
          <div className="grid grid-cols-3 gap-3">
            <L t="Nome do Contato"><input value={f.emergencia?.nome||""} onChange={e=>setEmerg("nome",e.target.value)} className={inp}/></L>
            <L t="Parentesco"><input value={f.emergencia?.parentesco||""} onChange={e=>setEmerg("parentesco",e.target.value)} placeholder="Ex.: Cônjuge, Pai…" className={inp}/></L>
            <L t="Telefone"><input value={f.emergencia?.telefone||""} onChange={e=>setEmerg("telefone",fmtTel(e.target.value))} placeholder="(00) 00000-0000" className={inp}/></L>
          </div>
        </div>

        {/* 6 — DEPENDENTES */}
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
          <div className="flex items-center justify-between mb-4">
            <div className="text-sm font-semibold text-navy">Dependentes</div>
            <button onClick={()=>setF(p=>({...p,dependentes:[...(p.dependentes||[]),{id:uid(),nome:"",cpf:"",nascimento:""}]}))} className="text-xs px-2.5 py-1.5 bg-brand hover:bg-navy text-white rounded-md">+ Adicionar</button>
          </div>
          {(f.dependentes||[]).length===0?<div className="text-sm text-slate-400 text-center py-4">Nenhum dependente cadastrado.</div>
          :<div className="space-y-2">{(f.dependentes||[]).map((d,i)=>(
            <div key={d.id||i} className="grid grid-cols-3 gap-2 items-end">
              <L t="Nome"><input value={d.nome||""} onChange={e=>setF(p=>({...p,dependentes:p.dependentes.map((x,j)=>j===i?{...x,nome:e.target.value}:x)}))} className={inp}/></L>
              <L t="CPF"><input value={d.cpf||""} onChange={e=>setF(p=>({...p,dependentes:p.dependentes.map((x,j)=>j===i?{...x,cpf:fmtCPF(e.target.value)}:x)}))} placeholder="000.000.000-00" className={inp}/></L>
              <div className="flex gap-2 items-end">
                <div className="flex-1"><L t="Data de Nascimento"><input type="date" value={d.nascimento||""} onChange={e=>setF(p=>({...p,dependentes:p.dependentes.map((x,j)=>j===i?{...x,nascimento:e.target.value}:x)}))} className={inp}/></L></div>
                <button onClick={()=>setF(p=>({...p,dependentes:p.dependentes.filter((_,j)=>j!==i)}))} className="mb-0.5 p-1.5 text-red-400 hover:text-red-600" title="Remover"><IcTrash/></button>
              </div>
            </div>))}</div>}
        </div>

      </div>)}
      {tab==="docs"&&<DocsTab pessoa={pessoa} onPatch={onPatch} configs={configs}/> }

const NW=210,NH=62,HGAP=30,VGAP=54,MAXROW=3,PAD=44;
function layoutOrg(root){
  function measure(n){
    const kids=(n.children&&!n.collapsed)?n.children:[];
    if(!kids.length){n._bw=NW;n._bh=NH;return;}
    kids.forEach(measure);
    const rows=[];for(let i=0;i<kids.length;i+=MAXROW)rows.push(kids.slice(i,i+MAXROW));
    n._rows=rows;let cw=0,ch=0;
    rows.forEach(row=>{const rw=row.reduce((s,c)=>s+c._bw,0)+(row.length-1)*HGAP;const rh=Math.max(...row.map(c=>c._bh));cw=Math.max(cw,rw);ch+=rh;});
    ch+=(rows.length-1)*VGAP;n._bw=Math.max(NW,cw);n._bh=NH+VGAP+ch;
  }
  measure(root);
  function place(n,x,y){
    n._x=x+(n._bw-NW)/2;n._y=y;
    const kids=(n.children&&!n.collapsed)?n.children:[];if(!kids.length)return;
    let rowY=y+NH+VGAP;
    (n._rows||[]).forEach(row=>{const rw=row.reduce((s,c)=>s+c._bw,0)+(row.length-1)*HGAP;let cx=x+(n._bw-rw)/2;const rh=Math.max(...row.map(c=>c._bh));
      row.forEach(c=>{place(c,cx,rowY);cx+=c._bw+HGAP;});rowY+=rh+VGAP;});
  }
  place(root,0,0);
  const flat=[];let maxX=0,maxY=0;
  (function col(n){flat.push(n);maxX=Math.max(maxX,n._x+NW);maxY=Math.max(maxY,n._y+NH);const kids=(n.children&&!n.collapsed)?n.children:[];kids.forEach(col);})(root);
  return {flat,width:maxX,height:maxY};
}
const truncTxt=(s,n)=>{s=s||"";return s.length>n?s.slice(0,n-1)+"…":s;};

  const [revOpen,setRevOpen]=useState(false),[verRev,setVerRev]=useState(null);
  const startRef=useRef(null); const svgRef=useRef(null);

  const depDe=p=>depByCargo[p.vinculo?.cargo]||"";

  const tree=useMemo(()=>{
    const root={id:"__root",type:"org",name:"Braskim",sub:modo==="funcional"?"Organização":"Direção",children:[]};
    if(modo==="funcional"){
      const byName={};(departamentos||[]).forEach(d=>{byName[d.nome]={id:d.id,type:"depto",nome:d.nome,dep:d,nCargos:(cargos||[]).filter(c=>c.departamento===d.nome).length,nColab:(pessoas||[]).filter(p=>p.status!=="DESLIGADO"&&depDe(p)===d.nome).length,children:[]};});

    } else {
      const ativos=(pessoas||[]).filter(p=>p.status!=="DESLIGADO");const byNm={};ativos.forEach(p=>byNm[p.nome]=p);
      const nodes={};ativos.forEach(p=>{nodes[p.id]={id:p.id,type:"pessoa",nome:p.nome,pessoa:p,children:[]};});
      ativos.forEach(p=>{const par=byNm[p.vinculo?.lider];if(par&&par.id!==p.id&&nodes[par.id])nodes[par.id].children.push(nodes[p.id]);else root.children.push(nodes[p.id]);});
    }

        else if(tipo==="publish"){setOrgRevisoes(prev=>[{id:uid(),data:new Date().toISOString(),modo,autor:role,img:c.toDataURL("image/jpeg",0.9)},...prev]);notify("Organograma publicado ✓ — revisão salva.");setRevOpen(true);}
      }catch(err){notify("Falha ao gerar imagem: "+String(err.message||err).slice(0,60));}
    };
    img.onerror=()=>notify("Falha ao renderizar o SVG para imagem.");
    img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);
  };

  const revs=(orgRevisoes||[]);
  return (
    <main className="flex-1 flex flex-col overflow-hidden">
      <div className="px-5 py-3 border-b border-slate-200 bg-white no-print">
        <div className="flex items-end justify-between flex-wrap gap-3">
          <div className="flex items-center gap-2.5"><span className="w-10 h-10 grid place-items-center rounded-xl bg-brand/10 text-brand"><IcBuilding size={22}/></span>
            <div><h1 className="text-xl font-bold text-navy">Organograma</h1><p className="text-sm text-slate-500">{modo==="funcional"?"Funcional — hierarquia de departamentos":"Pessoas — hierarquia por liderança"}{isRH&&" · arraste as caixas para reorganizar"}</p></div></div>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex rounded-lg border border-slate-300 overflow-hidden text-sm">
              <button onClick={()=>{setModo("funcional");setSel(null);}} className={"px-3 py-1.5 "+(modo==="funcional"?"bg-brand text-white":"bg-white text-slate-600 hover:bg-slate-50")}>Funcional</button>
              <button onClick={()=>{setModo("pessoas");setSel(null);}} className={"px-3 py-1.5 "+(modo==="pessoas"?"bg-brand text-white":"bg-white text-slate-600 hover:bg-slate-50")}>Pessoas</button>
            </div>
            <button onClick={()=>setRevOpen(true)} className="text-sm px-3 py-1.5 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50">Revisões{revs.length?` (${revs.length})`:""}</button>
            <button onClick={()=>render("jpg")} className="text-sm px-3 py-1.5 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50">JPG</button>
            <button onClick={()=>render("pdf")} className="text-sm px-3 py-1.5 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50">PDF</button>
            <button onClick={()=>render("publish")} className="text-sm px-3 py-1.5 rounded-md bg-brand hover:bg-navy text-white font-medium">Publicar revisão</button>
          </div>
        </div>
        <div className="grid grid-cols-3 md:grid-cols-4 gap-2 mt-3">
          <Kpi label={modo==="funcional"?"Departamentos":"Pessoas na estrutura"} value={flat.filter(n=>n.type!=="org").length}/>
          <Kpi label="Níveis" value={(function(){let mx=1;(function w(n,d){mx=Math.max(mx,d);(n.children&&!n.collapsed?n.children:[]).forEach(c=>w(c,d+1));})(tree,1);return mx;})()}/>
          <Kpi label="No topo" value={(tree.children||[]).length}/>
          <Kpi label="Revisões publicadas" value={revs.length}/>
        </div>
      </div>
      <div className="flex-1 overflow-auto canvas-wrap bg-slate-50" onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}>
        <svg ref={svgRef} width={W} height={H} className="mx-auto my-6 block" style={{minWidth:"100%",fontFamily:"'DM Sans',sans-serif"}}>
          <g transform={`translate(${PAD},${PAD})`}>
            {flat.filter(n=>n.children&&!n.collapsed&&n.children.length).map(n=>n.children.map(c=>{
              const x1=n._x+NW/2,y1=n._y+NH,x2=c._x+NW/2,y2=c._y,my=y2-VGAP/2;
              return <path key={n.id+c.id} d={`M${x1},${y1} V${my} H${x2} V${y2}`} fill="none" stroke="#cbd5e1" strokeWidth="1.5"/>;
            }))}
            {flat.map(n=>{
              const dim=q&&!match(n)&&n.type!=="org", hitN=q&&match(n);
              const isTarget=targetId===n.id, isDrag=dragId===n.id;
              const cx=n._x, cy=n._y, nk=(n.children||[]).length;
              const box=(fill,stroke)=><rect x={cx} y={cy} width={NW} height={NH} rx="11" fill={fill} stroke={isTarget?"#4f46e5":stroke} strokeWidth={isTarget?"2.5":"1.5"}/>;
              return <g key={n.id} opacity={isDrag?0.4:dim?0.28:1} style={{cursor:isRH?"grab":"pointer"}} onMouseDown={e=>onDown(n,e)}>
                {n.type==="org"?<>
                  {box("#0f172a","#0f172a")}
                  <text x={cx+16} y={cy+27} fill="#fff" fontSize="14" fontWeight="700">{n.name}</text>
                  <text x={cx+16} y={cy+45} fill="#cbd5e1" fontSize="11">{n.sub}{nk?` · ${nk} área(s)`:""}</text>
                </>:n.type==="depto"?<>
                  {box("#ffffff",hitN?"#34d399":"#e2e8f0")}
                  <rect x={cx} y={cy} width="4" height={NH} rx="2" fill="#4f46e5"/>
                  <text x={cx+16} y={cy+26} fill="#0f172a" fontSize="13.5" fontWeight="700">{truncTxt(n.nome,22)}</text>
                  <text x={cx+16} y={cy+45} fill="#94a3b8" fontSize="11">{n.nCargos} cargo(s) · {n.nColab} colab.</text>
                </>:(()=>{
                  const p=n.pessoa;
                  const ring=p?.status==="ATIVO"?"#34d399":p?.status==="AFASTADO"?"#fbbf24":"#94a3b8";

                  const AVR=22,AVCX=cx+AVR+6,AVCY=cy+NH/2;
                  return <>
                    {box("#ffffff",hitN?"#34d399":"#e2e8f0")}
                    <circle cx={AVCX} cy={AVCY} r={AVR+2} fill={ring}/>
                    {fotoSrc?<>
                      <defs><clipPath id={"av"+n.id}><circle cx={AVCX} cy={AVCY} r={AVR}/></clipPath></defs>
                      <image href={fotoSrc} x={AVCX-AVR} y={AVCY-AVR} width={AVR*2} height={AVR*2} clipPath={"url(#av"+n.id+")"} preserveAspectRatio="xMidYMid slice"/>
                    </>:<>
                      <circle cx={AVCX} cy={AVCY} r={AVR} fill="#eef2ff"/>
                      <text x={AVCX} y={AVCY+5} fill="#4f46e5" fontSize="12" fontWeight="700" textAnchor="middle">{initials(n.nome)}</text>
                    </>}
                    <text x={AVCX+AVR+8} y={cy+26} fill="#0f172a" fontSize="13" fontWeight="700">{truncTxt(n.nome,16)}</text>
                    <text x={AVCX+AVR+8} y={cy+44} fill="#94a3b8" fontSize="11">{truncTxt(p?.vinculo?.cargo,18)}</text>
                  </>;
                })()}
                {nk>0&&<g onMouseDown={e=>{e.stopPropagation();}} onClick={e=>{e.stopPropagation();toggleCollapse(n.id);}} style={{cursor:"pointer"}}>
                  <circle cx={cx+NW/2} cy={cy+NH} r="9" fill={n.type==="org"?"#fff":"#4f46e5"} stroke="#e2e8f0"/>
                  <text x={cx+NW/2} y={cy+NH+4} textAnchor="middle" fontSize="13" fontWeight="700" fill={n.type==="org"?"#0f172a":"#fff"}>{n.collapsed?"+":"–"}</text>
                </g>}
              </g>;
            })}
          </g>
        </svg>
      </div>
      {sel&&<DetalheOrg node={sel} modo={modo} onClose={()=>setSel(null)}/>}
      {revOpen&&<div className="fixed inset-0 z-50 grid place-items-center bg-navy/40 p-4 no-print" onClick={()=>setRevOpen(false)}>
        <div className="bg-white rounded-lg shadow-2xl w-full max-w-2xl max-h-[88vh] flex flex-col" onClick={e=>e.stopPropagation()}>
          <div className="p-4 border-b border-slate-200 flex items-center justify-between"><div><h2 className="text-lg font-bold text-navy">Revisões publicadas</h2><p className="text-sm text-slate-500">Cada revisão é uma foto do organograma no momento em que foi publicada.</p></div>
            <button onClick={()=>setRevOpen(false)} className="text-slate-400 hover:text-slate-600 text-xl">✕</button></div>
          <div className="flex-1 overflow-auto p-4">
            {revs.length?<div className="grid sm:grid-cols-2 gap-3">{revs.map(r=><div key={r.id} className="border border-slate-200 rounded-lg overflow-hidden">
              <img src={r.img} alt="revisão" className="w-full h-40 object-contain bg-slate-50 cursor-zoom-in" onClick={()=>setVerRev(r)}/>
              <div className="p-2.5 flex items-center justify-between"><div className="text-xs"><div className="font-medium text-navy">{r.modo==="funcional"?"Funcional":"Pessoas"}</div><div className="text-slate-400">{new Date(r.data).toLocaleString("pt-BR")} · {r.autor}</div></div>
                <div className="flex gap-1"><button onClick={()=>download(r.img,`revisao-${r.modo}.jpg`)} className="text-xs px-2 py-1 border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50">Baixar</button>
                  <button onClick={()=>setOrgRevisoes(prev=>prev.filter(x=>x.id!==r.id))} className="text-xs px-2 py-1 border border-slate-300 rounded-md text-red-500 hover:bg-red-50">Excluir</button></div></div>
            </div>)}</div>:<div className="text-center text-slate-400 text-sm py-10">Nenhuma revisão publicada ainda. Ajuste o organograma e clique em <b>Publicar revisão</b>.</div>}
          </div>
        </div>
      </div>}
      {verRev&&<div className="fixed inset-0 z-[60] grid place-items-center bg-navy/70 p-4 no-print" onClick={()=>setVerRev(null)}>
        <img src={verRev.img} alt="revisão" className="max-w-full max-h-full rounded shadow-2xl" onClick={e=>e.stopPropagation()}/>
      </div>}
    </main>
  );
}
function DetalheOrg({node,modo,onClose}){
  if(node.type==="org")return <Slide onClose={onClose} titulo={node.name} sub={node.sub}><Info l="Áreas no topo">{(node.children||[]).length}</Info><p className="text-sm text-slate-500 mt-3">Nó raiz da organização.</p></Slide>;
  if(node.type==="depto"){const d=node.dep,subs=(node.children||[]);
    return <Slide onClose={onClose} titulo={d.nome} sub={d.superior?`Reporta a ${d.superior}`:"Topo da estrutura"}>
      <div className="grid grid-cols-2 gap-3"><Info l="Superior">{d.superior||"— (topo)"}</Info><Info l="Sub-departamentos">{subs.length}</Info>
        <Info l="Cargos vinculados">{node.nCargos}</Info><Info l="Colaboradores">{node.nColab}</Info></div>
      <div className="mt-4"><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1.5">Sub-departamentos</div>
        {subs.length?subs.map(c=><div key={c.id} className="flex items-center gap-2 py-1.5 border-b border-slate-100 last:border-0">
          <span className="w-7 h-7 rounded-lg bg-brand/10 text-brand grid place-items-center shrink-0"><IcBuilding size={14}/></span>
          <div className="flex-1"><div className="text-sm font-medium text-navy">{c.dep.nome}</div><div className="text-xs text-slate-400">{c.nCargos} cargo(s) · {c.nColab} colab.</div></div></div>):<div className="text-sm text-slate-400">Nenhum sub-departamento.</div>}</div>
    </Slide>;}
  const p=node.pessoa,dir=(node.children||[]);
  return <Slide onClose={onClose} titulo={p.nome} sub={p.vinculo?.cargo} status={p.status}>
    <div className="grid grid-cols-2 gap-3"><Info l="Setor">{p.vinculo?.setor}</Info><Info l="Líder direto">{p.vinculo?.lider||"—"}</Info>
      <Info l="Admissão">{brDate(p.vinculo?.admissao)}</Info><Info l="Reportes diretos">{dir.length}</Info></div>
    <div className="mt-4"><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1.5">Reportes diretos</div>
      {dir.length?dir.map(c=><div key={c.id} className="flex items-center gap-2 py-1.5 border-b border-slate-100 last:border-0">
        <div className="w-7 h-7 rounded-full bg-brand/10 text-brand text-[10px] font-bold grid place-items-center">{initials(c.nome)}</div>
        <div className="flex-1"><div className="text-sm font-medium text-navy">{c.nome}</div><div className="text-xs text-slate-400">{c.pessoa?.vinculo?.cargo}</div></div></div>):<div className="text-sm text-slate-400">Sem reportes diretos.</div>}</div>
  </Slide>;
}

function CargosView({cargos,setCargos,pessoas,eventos,commit,addEventos,promocoes,setPromocoes,role,busca,notify,iaKey,iaModel,departamentosMaster}){
  const [tab,setTab]=useState("cadastro");
  const [selCargo,setSelCargo]=useState(null);
  const [cmpRev,setCmpRev]=useState(null);   // {cargo, rev} para comparar
  const [editCargo,setEditCargo]=useState(null);   // {novo:true} ou cargo existente
  const [mover,setMover]=useState(null);           // {pessoa, tipo}
  const [hist,setHist]=useState(null);             // pessoa p/ histórico
  const [mostrarInativos,setMostrarInativos]=useState(false);
  const [fDep,setFDep]=useState(""),[fNivel,setFNivel]=useState("");
  const [buscaCargo,setBuscaCargo]=useState("");
  const ativos=pessoas.filter(p=>p.status!=="DESLIGADO");
  const isRH=role==="RH", podeGestor=role==="RH"||role==="Gestor";
  const cargoDe=titulo=>cargos.find(c=>c.titulo===titulo);
  const ocupantesDe=titulo=>ativos.filter(p=>p.vinculo.cargo===titulo);
  const q=busca.toLowerCase();
  const familias=[...new Set(cargos.map(c=>c.familia))];
  const departamentos=[...new Set([...((departamentosMaster||[]).map(d=>d.nome)),...cargos.map(c=>c.departamento).filter(Boolean)])].sort((a,b)=>a.localeCompare(b));

  // ---------- cadastro de cargos ----------
  const salvarCargo=(c,novo)=>{
    if(novo){
      const nc={...cg(c)};
      if(!/^BKM-\d+/.test(nc.codigo||"")) nc.codigo=proximoCodigoBKM(cargos);
      nc.revisao=1; nc.dataRevisao=hoje(); nc.proximaRevisao=addMeses(hoje(),12);
      nc.revisoes=[{rev:1,data:hoje(),autor:role,motivo:"Criação do descritivo",snapshot:snapshotCargo(nc)}];
      setCargos(prev=>[...prev,nc]);
      addEventos([evt("CargoCriado",null,`Descritivo criado: ${nc.titulo} (${fmtRev(1)})`,null,"cargos")]);
      notify("Cargo criado · Rev. 01");
    } else {
      const anterior=cargos.find(x=>x.id===c.id)||c;
      const motivo=(c._motivo||"").trim();
      const novaRev=(anterior.revisao||1)+1;
      const {_motivo,...limpo}=c;
      const campos={...limpo, revisao:novaRev, dataRevisao:hoje(), proximaRevisao:addMeses(hoje(),12)};
      const snap=snapshotCargo(campos);
      const atualizado={...campos, revisoes:[...(anterior.revisoes||[]), {rev:novaRev,data:hoje(),autor:role,motivo:motivo||"—",snapshot:snap}]};
      setCargos(prev=>prev.map(x=>x.id===c.id?atualizado:x));
      addEventos([evt("CargoAlterado",null,`Descritivo revisado: ${c.titulo} → ${fmtRev(novaRev)}${motivo?" · "+motivo:""}`,null,"cargos")]);
      notify(`Descritivo salvo · ${fmtRev(novaRev)}`);
    }
    setEditCargo(null); setSelCargo(null);
  };
  const toggleStatus=c=>{ setCargos(prev=>prev.map(x=>x.id===c.id?{...x,status:x.status==="ATIVO"?"INATIVO":"ATIVO"}:x)); addEventos([evt("CargoAlterado",null,`Cargo ${c.status==="ATIVO"?"desativado":"reativado"}: ${c.titulo}`,null,"cargos")]); notify(c.status==="ATIVO"?"Cargo desativado":"Cargo reativado"); };
  const excluirCargo=c=>{ if(ocupantesDe(c.titulo).length){ notify("Não é possível excluir: há colaboradores neste cargo."); return; } if(!confirm(`Excluir o cargo "${c.titulo}"?`))return; setCargos(prev=>prev.filter(x=>x.id!==c.id)); addEventos([evt("CargoAlterado",null,`Cargo excluído: ${c.titulo}`,null,"cargos")]); notify("Cargo excluído"); };
  const importExcel=()=>notify("Importação por planilha — disponível ao conectar o Firebase/back-end.");

  // ---------- movimentações (promoção vertical / lateral) com workflow 2 etapas ----------
  const solicitarMov=(pessoa,cargoDestino,tipo,salarioNovo,justificativa,criteriosOk)=>{
    const pr={id:uid(),tipo,pessoaId:pessoa.id,pessoaNome:pessoa.nome,cargoOrigem:pessoa.vinculo.cargo,cargoDestino:cargoDestino.titulo,
      salarioOrigem:pessoa.vinculo.salario,salarioNovo:Number(salarioNovo),justificativa,criteriosOk,status:"PENDENTE_GESTOR",data:hoje()};
    setPromocoes(prev=>[...prev,pr]);
    const tp=tipo==="LATERAL"?"MovimentacaoSolicitada":"PromocaoSolicitada";
    commit({...pessoa},[evt(tp,pessoa.id,`${tipo==="LATERAL"?"Movimentação lateral":"Promoção"} solicitada: ${pr.cargoOrigem} → ${pr.cargoDestino}`,null,"cargos")]);
    setMover(null); setTab("movimentacoes"); notify("Solicitação registrada · aguardando aprovação do gestor");
  };
  const aprovarGestor=pr=>setPromocoes(prev=>prev.map(x=>x.id===pr.id?{...x,status:"PENDENTE_RH"}:x));
  const homologarRH=async pr=>{
    const p=pessoas.find(x=>x.id===pr.pessoaId); if(!p)return;
    const np={...p,vinculo:{...p.vinculo,cargo:pr.cargoDestino,salario:pr.salarioNovo,faixaSalarial:faixa(pr.salarioNovo),desdeCargo:hoje()}};
    const evs=[];
    if(pr.tipo==="LATERAL"){ evs.push(evt("MovimentacaoRealizada",p.id,`Movimentação lateral: ${pr.cargoOrigem} → ${pr.cargoDestino}`,null,"cargos")); }
    else { evs.push(evt("PromocaoAprovada",p.id,`Promoção homologada: ${pr.cargoOrigem} → ${pr.cargoDestino}`,null,"cargos")); }
    if(pr.cargoDestino!==pr.cargoOrigem) evs.push(evt("CargoAlterado",p.id,`Cargo: ${pr.cargoOrigem} → ${pr.cargoDestino}`,null,"cargos"));
    if(Number(pr.salarioNovo)!==Number(pr.salarioOrigem)) evs.push(evt("AlteracaoSalarial",p.id,`Salário: ${money(pr.salarioOrigem)} → ${money(pr.salarioNovo)}`,null,"cargos"));
    await commit(np,evs);
    setPromocoes(prev=>prev.map(x=>x.id===pr.id?{...x,status:"APROVADA"}:x));
    notify("Movimentação homologada · Jornada, Organograma e faixas atualizados");
  };
  const recusar=pr=>setPromocoes(prev=>prev.map(x=>x.id===pr.id?{...x,status:"RECUSADA"}:x));

  // ---------- indicadores ----------
  const ind=useMemo(()=>{
    const comCargo=ativos.map(p=>({p,c:cargoDe(p.vinculo.cargo)})).filter(x=>x.c);
    const pos={ABAIXO:0,DENTRO:0,ACIMA:0};
    comCargo.forEach(({p,c})=>{const k=posicaoNaFaixa(c,p.vinculo.salario);if(k)pos[k]++;});
    const custoFamilia={}; comCargo.forEach(({p,c})=>{custoFamilia[c.familia]=(custoFamilia[c.familia]||0)+Number(p.vinculo.salario||0);});
    const porNivel={}; comCargo.forEach(({c})=>{porNivel[c.nivel]=(porNivel[c.nivel]||0)+1;});
    const elegiveis=ativos.filter(p=>avaliarElegibilidade(p,cargos).elegivel);
    const semOcupante=cargos.filter(c=>ocupantesDe(c.titulo).length===0);
    const amplit=cargos.length?Math.round(cargos.reduce((s,c)=>s+(c.faixaMax-c.faixaMin)/c.faixaMin*100,0)/cargos.length):0;
    const folhaTotal=Object.values(custoFamilia).reduce((a,b)=>a+b,0);
    return {pos,custoFamilia,porNivel,elegiveis,semOcupante,amplit,folhaTotal,comCargo:comCargo.length};
  },[cargos,pessoas]);

  const kpi=useMemo(()=>({cargos:cargos.length,familias:familias.length,
    pctDentro:ind.comCargo?Math.round(ind.pos.DENTRO/ind.comCargo*100):0,
    pend:promocoes.filter(pr=>pr.status==="PENDENTE_GESTOR"||pr.status==="PENDENTE_RH").length}),[cargos,ind,promocoes]);

  const tabs=[["cadastro","Cadastro"],["trilhas","Trilhas"],["equidade","Equidade"],["elegibilidade","Elegibilidade"],["movimentacoes","Movimentações"],["indicadores","Indicadores"]];

  // lista filtrada do cadastro
  const listaCargos=cargos.filter(c=>mostrarInativos||c.status!=="INATIVO")
    .filter(c=>!fDep||c.departamento===fDep).filter(c=>!fNivel||c.nivel===fNivel)
    .filter(c=>{const s=(buscaCargo||busca||"").toLowerCase();return !s||c.titulo.toLowerCase().includes(s)||(c.codigo||"").toLowerCase().includes(s)||(c.missao||"").toLowerCase().includes(s)||(c.cbo||"").toLowerCase().includes(s)||(c.conhecimentos||[]).join(" ").toLowerCase().includes(s);})
    .sort((a,b)=>a.titulo.localeCompare(b.titulo));

  return (
    <main className="flex-1 overflow-auto">
      <div className="max-w-[1800px] mx-auto px-8 py-6">
        <div className="flex items-center justify-between flex-wrap gap-3 mb-4">
          <div className="flex items-center gap-2.5"><span className="w-10 h-10 grid place-items-center rounded-xl bg-brand/10 text-brand"><IcBriefcase size={22}/></span><h1 className="text-2xl font-bold text-navy">Cargos</h1></div>
          <div className="flex items-center gap-2 flex-wrap">
            <button onClick={()=>exportarListaPDF(cargos)} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5"><IcFile/>Exportar PDF</button>
            <button onClick={()=>exportarListaExcel(cargos)} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5"><IcDownload/>Exportar Excel</button>
            {isRH&&<>
              <button onClick={importExcel} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50">Importar Excel</button>

                <td className="px-3 py-2.5 text-slate-500 font-mono text-xs">{c?`${money(c.faixaMin)} – ${money(c.faixaMax)}`:"fora do catálogo"}</td>

                <td className="px-3 py-2.5">{pos?<span className={"text-xs px-2 py-0.5 rounded-full ring-1 "+posCls}>{pos==="DENTRO"?"Na faixa":pos==="ABAIXO"?"Abaixo":"Acima"}{isRH&&compaRatio(c,p.vinculo.salario)?` · ${compaRatio(c,p.vinculo.salario).toFixed(2)}`:""}</span>:<span className="text-xs text-slate-400">—</span>}</td>
                <td className="px-3 py-2.5 text-right text-slate-300">histórico ›</td>
              </tr>;})}</tbody></table>
          <div className="px-4 py-2 text-[11px] text-slate-400 border-t border-slate-100">Compa-ratio = salário ÷ ponto médio. Clique numa linha para ver o histórico salarial (derivado dos eventos). {!isRH&&"Salários visíveis só para RH."}</div>
        </div>)}

        {/* ELEGIBILIDADE */}
        {tab==="elegibilidade"&&(<div className="space-y-3">

                  <div className="text-sm text-slate-500">{p.vinculo.cargo}{el.prox?<> <span className="text-slate-300">→</span> {el.prox.titulo}</>:<span className="text-slate-400"> · topo da trilha</span>}</div></div>
                {el.prox&&(el.elegivel?<span className="text-xs px-2 py-1 rounded-full ring-1 bg-emerald-50 text-emerald-700 ring-emerald-200 font-medium">Elegível</span>

                {el.prox&&podeGestor&&<button onClick={()=>setMover({pessoa:p,tipo:"PROMOCAO"})} className={"text-sm px-3 py-1.5 rounded-md font-medium "+(el.elegivel?"bg-brand hover:bg-navy text-white":"border border-slate-300 text-slate-500")}>{el.elegivel?"Promover":"Promover c/ exceção"}</button>}

              </div>}
              {p.status==="AFASTADO"&&<div className="text-[11px] text-amber-600 mt-2">⚠ Colaborador afastado — promoção sujeita a política de retorno.</div>}
            </div>;})}
        </div>)}

        {/* MOVIMENTAÇÕES */}
        {tab==="movimentacoes"&&(<div className="space-y-3">

          {[...promocoes].reverse().map(pr=>{const delta=pr.salarioNovo-pr.salarioOrigem,pct=pr.salarioOrigem?Math.round(delta/pr.salarioOrigem*100):0;

                <span className={"text-xs px-2 py-0.5 rounded-full ring-1 h-fit "+stCls}>{stLabel}</span>
              </div>
              {isRH&&<div className="grid grid-cols-3 gap-3 mt-3">
                <Info l="Salário">{money(pr.salarioOrigem)} → {money(pr.salarioNovo)}</Info>

              {pr.justificativa&&<div className="text-sm text-slate-500 mt-2"><span className="text-[11px] uppercase text-slate-400">Justificativa: </span>{pr.justificativa}</div>}
              <div className="flex items-center gap-2 mt-3">
                {/* trilha do workflow */}
                <div className="flex items-center gap-1 text-[11px] text-slate-400">
                  <span className={pr.status!=="RECUSADA"?"text-brand font-medium":""}>Solicitado</span><span>›</span>
                  <span className={["PENDENTE_RH","APROVADA"].includes(pr.status)?"text-brand font-medium":""}>Gestor</span><span>›</span>
                  <span className={pr.status==="APROVADA"?"text-brand font-medium":""}>RH</span>
                </div>
                <div className="ml-auto flex gap-2">
                  {pr.status==="PENDENTE_GESTOR"&&podeGestor&&<><button onClick={()=>recusar(pr)} className="px-3 py-1.5 text-sm text-slate-500">Recusar</button><button onClick={()=>aprovarGestor(pr)} className="px-4 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Aprovar (gestor)</button></>}
                  {pr.status==="PENDENTE_RH"&&(isRH?<><button onClick={()=>recusar(pr)} className="px-3 py-1.5 text-sm text-slate-500">Recusar</button><button onClick={()=>homologarRH(pr)} className="px-4 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Homologar (RH)</button></>:<span className="text-xs text-slate-400">Aguardando homologação do RH</span>)}
                  {pr.status==="PENDENTE_GESTOR"&&!podeGestor&&<span className="text-xs text-slate-400">Aguardando aprovação do gestor</span>}

              </div>
            </div>;})}
        </div>)}

        {/* INDICADORES */}

                const v=ind.pos[k],pct=ind.comCargo?Math.round(v/ind.comCargo*100):0;
                return <div key={k} className="mb-2"><div className="flex justify-between text-xs text-slate-500 mb-0.5"><span>{l}</span><span>{v} ({pct}%)</span></div>
                  <div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className={"h-full "+c} style={{width:pct+"%"}}></div></div></div>;})}
            </div>
            <div className="bg-white rounded-lg border border-slate-200 p-4">
              <div className="text-sm font-semibold text-navy mb-3">Headcount por nível</div>

                <div key={n} className="flex items-center gap-2 mb-1.5"><span className="text-xs text-slate-400 w-8">Nv {n}</span>
