      {gruposDoTipo.map(g=>{const n=doTipo.filter(c=>c.grupo===g).length;return (
        <button key={g} onClick={()=>setGrupoF(grupoF===g?"":g)} className={"text-xs px-2.5 py-1 rounded-full border transition-colors "+(grupoF===g?"bg-brand text-white border-brand":"border-slate-300 text-slate-600 hover:bg-slate-50")}>{g} ({n})</button>);})}
      {doTipo.some(c=>!c.grupo)&&<button onClick={()=>setGrupoF(grupoF==="__sem"?"":"__sem")} className={"text-xs px-2.5 py-1 rounded-full border transition-colors "+(grupoF==="__sem"?"bg-brand text-white border-brand":"border-slate-300 text-slate-400 hover:bg-slate-50")}>Sem grupo ({doTipo.filter(c=>!c.grupo).length})</button>}
      {isRH&&<button onClick={abrirGerGrupos} className={"text-xs px-2.5 py-1 rounded-full border ml-1 transition-colors "+(gerGrupos?"bg-slate-700 text-white border-slate-700":"border-slate-300 text-slate-500 hover:bg-slate-50")} title="Renomear, mesclar ou remover grupos">
        {gerGrupos?"Fechar edição":"Editar grupos"}</button>}
    </div>}

    {gerGrupos&&isRH&&<div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4 space-y-2">
      <div><div className="text-sm font-semibold text-navy">Editar grupos · {rotuloDic}</div>
        <p className="text-[11px] text-slate-400">Renomear altera o grupo em todas as competências deste dicionário. Se o novo nome já existir, os dois grupos são <b>mesclados</b>.</p></div>
      {gruposDoTipo.length===0
        ? <p className="text-[11px] text-slate-400">Nenhum grupo cadastrado neste dicionário ainda.</p>
        : <div className="space-y-1.5">{gruposDoTipo.map(g=>{
            const qtd=doTipo.filter(c=>(c.grupo||"")===g).length;
            const alterado=String(nomesEdit[g]??g).trim()!==g&&String(nomesEdit[g]??"").trim()!=="";
            return <div key={g} className="flex items-center gap-2">
              <input value={nomesEdit[g]??g} onChange={e=>setNomesEdit(m=>({...m,[g]:e.target.value}))}
                onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();renomearGrupo(g);}}}
                className="flex-1 text-sm border border-slate-300 rounded-md px-2.5 py-1.5 outline-none focus:ring-2 ring-brand/30"/>
              <span className="text-[11px] text-slate-400 w-20 shrink-0">{qtd} compet.</span>
              <button onClick={()=>renomearGrupo(g)} disabled={!alterado}
                className={"text-xs px-3 py-1.5 rounded-md shrink-0 "+(alterado?"bg-brand text-white hover:bg-navy":"bg-slate-100 text-slate-400 cursor-not-allowed")}>Salvar</button>
              <IconBtn title="Remover grupo (as competências ficam sem grupo)" onClick={()=>removerGrupo(g)}><IcTrash/></IconBtn>
            </div>;})}</div>}
    </div>}

    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto">
      <table className="w-full text-sm min-w-[1040px]">
        <thead><tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
          <SortTh label="ID" col="codigo" sort={sortComp} onSort={toggleSortComp} className="px-4"/>
          <SortTh label="Competência" col="nome" sort={sortComp} onSort={toggleSortComp}/>
          <SortTh label="Grupo" col="grupo" sort={sortComp} onSort={toggleSortComp}/>
          <SortTh label="Detalhamento" col="detalhe" sort={sortComp} onSort={toggleSortComp} align="center"/>
          <SortTh label="Níveis" col="niveis" sort={sortComp} onSort={toggleSortComp} align="center"/>
          <SortTh label="Perguntas" col="perguntas" sort={sortComp} onSort={toggleSortComp} align="center"/>
          <SortTh label="Status" col="status" sort={sortComp} onSort={toggleSortComp} align="center"/>
          <th className="text-center font-semibold px-4 py-2.5">Ações</th></tr></thead>
        <tbody>
          {filtrada.map(c=>{const np=nPerguntas(c);const nd=LISTAS_COMP.reduce((s,[k])=>s+((c[k]||[]).length),0);
            const nn=NIVEIS_EXIG.filter(([k])=>String(c.niveis?.[k]||"").trim()).length;return (
            <tr key={c.id} className="border-t border-slate-100 hover:bg-slate-50">
              <td className="px-4 py-2.5 font-mono text-xs text-slate-500">{c.codigo||"—"}</td>
              <td className="px-3 py-2.5"><button onClick={()=>setVer(c)} className="font-medium text-navy hover:text-brand text-left">{c.nome}</button>
                {c.conceito&&<div className="text-[11px] text-slate-400 line-clamp-1 max-w-sm">{c.conceito}</div>}</td>
              <td className="px-3 py-2.5 text-slate-600">{c.grupo||"—"}</td>
              <td className="px-3 py-2.5 text-center"><span className={"text-xs font-semibold "+(nd?"text-navy":"text-amber-500")}>{nd}</span></td>
              <td className="px-3 py-2.5 text-center"><span className={"text-xs font-semibold "+(nn===NIVEIS_EXIG.length?"text-emerald-600":nn?"text-amber-500":"text-slate-300")}>{nn}/{NIVEIS_EXIG.length}</span></td>
              <td className="px-3 py-2.5 text-center"><span className={"text-xs font-semibold "+(np?"text-navy":"text-amber-500")}>{np}</span></td>
              <td className="px-3 py-2.5 text-center">{c.status==="INATIVA"
                ? <span className="text-[11px] px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">Inativa</span>
                : <span className="text-[11px] px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600">Ativa</span>}</td>
              <td className="px-4 py-2.5"><div className="flex items-center justify-center gap-1.5">
                <IconBtn title="Ver" onClick={()=>setVer(c)}><IcEye/></IconBtn>
                <IconBtn title="Editar" tint="text-brand" onClick={()=>isRH&&setEdit(c)} disabled={!isRH}><IcEdit/></IconBtn>
                <IconBtn title={c.status!=="INATIVA"?"Inativar":"Ativar"} onClick={()=>isRH&&alternar(c)} disabled={!isRH}><IcPower/></IconBtn>
                <IconBtn title="Exportar PDF" onClick={()=>exportarCompPDF(c,cargos||[],notify)}><IcFile/></IconBtn>
                <IconBtn title="Exportar Word" filled onClick={()=>exportarCompWord(c,cargos||[])}><IcDownload/></IconBtn>
                <IconBtn title="Excluir" onClick={()=>isRH&&excluir(c)} disabled={!isRH}><IcTrash/></IconBtn>
              </div></td>
            </tr>);})}
          {filtrada.length===0&&<tr><td colSpan="8" className="px-4 py-12 text-center text-slate-400">
            {doTipo.length===0?<>Nenhuma competência {tipo==="tecnica"?"técnica":"comportamental"} cadastrada ainda.{isRH&&<> Clique em <b>+ Nova competência</b> para começar.</>}</>:"Nenhuma competência encontrada com esse filtro."}
          </td></tr>}
        </tbody>
      </table>
    </div>
    </>}

    {ver&&<div className="fixed inset-0 z-50 grid place-items-center bg-navy/40 p-4" onClick={()=>setVer(null)}>
      <div className="bg-white rounded-lg shadow-2xl w-full max-w-2xl max-h-[88vh] overflow-auto" onClick={e=>e.stopPropagation()}>
        <div className="p-4 border-b border-slate-200 flex items-start justify-between">
          <div><h2 className="text-lg font-bold text-navy">{ver.nome}</h2>
            <p className="text-sm text-slate-500">{ver.codigo?`${ver.codigo} · `:""}{ver.grupo||"Sem grupo"} · {ver.tipo==="tecnica"?"Técnica (hard skill)":"Comportamental (soft skill)"}</p></div>
          <div className="flex items-center gap-1.5 shrink-0">
            <button onClick={()=>exportarCompPDF(ver,cargos||[],notify)} className="text-xs px-2.5 py-1.5 border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50">PDF</button>
            <button onClick={()=>exportarCompWord(ver,cargos||[])} className="text-xs px-2.5 py-1.5 border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50">Word</button>
            <button onClick={()=>setVer(null)} className="text-slate-400 hover:text-slate-600 text-xl ml-1">✕</button>
          </div></div>
        <div className="p-4 space-y-4">
          {ver.conceito&&<div><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">Conceito</div>
            <p className="text-sm text-slate-700 text-justify">{ver.conceito}</p></div>}
          {LISTAS_COMP.map(([k,titulo])=>{const arr=(ver[k]||[]).filter(Boolean);if(!arr.length)return null;return (
            <div key={k}><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">{titulo}</div>
              <ol className="list-decimal pl-5 space-y-1">{arr.map((p,i)=><li key={i} className="text-sm text-slate-700 text-justify">{p}</li>)}</ol></div>);})}
          {NIVEIS_EXIG.some(([k])=>String(ver.niveis?.[k]||"").trim())&&<div>
            <div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">Descrição por nível</div>
            <div className="space-y-2">{NIVEIS_EXIG.map(([k,l])=>(
              <div key={k} className="flex gap-3 border border-slate-200 rounded-lg p-2.5">
                <span className="shrink-0 w-7 h-7 grid place-items-center rounded-full bg-brand/10 text-brand text-xs font-bold">{k}</span>
                <div className="flex-1"><div className="text-xs font-semibold text-navy">{l}</div>
                  <div className="text-sm text-slate-600 text-justify">{ver.niveis?.[k]||<span className="text-slate-300">Não preenchido</span>}</div></div>
              </div>))}</div></div>}
          {(ver.cargosIndicados||[]).length>0&&<div>
            <div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">Cargos indicados</div>
            <div className="flex flex-wrap gap-1.5">{(ver.cargosIndicados||[]).map(id=>{const cg=(cargos||[]).find(x=>x.id===id);if(!cg)return null;
              return <span key={id} className="text-[11px] bg-brand/10 text-brand px-2 py-1 rounded-md">{cg.titulo}</span>;})}</div></div>}
          <div className="border-t border-slate-200 pt-3">
            <div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">Exigida nos cargos <span className="text-slate-300 normal-case">· com nível definido no descritivo</span></div>
            {(()=>{const usos=(cargos||[]).map(cg=>{const r=(cg.competenciasReq||[]).find(x=>x.compId===ver.id);return r?{cargo:cg,nivel:r.nivel}:null;}).filter(Boolean);
              return usos.length
                ? <div className="flex flex-wrap gap-1.5">{usos.map(u=><span key={u.cargo.id} className="text-[11px] bg-slate-100 text-slate-700 px-2 py-1 rounded-md">{u.cargo.titulo} · nível {u.nivel}</span>)}</div>
                : <p className="text-sm text-slate-300">Ainda não vinculada a nenhum cargo.</p>;})()}
          </div>
        </div>
      </div>
    </div>}
  </div></main>;
}

function MatrizCompetencias({competencias,cargos,notify}){
  const [dep,setDep]=useState("");
  const [soComDef,setSoComDef]=useState(false);
  const [tipoF,setTipoF]=useState("");
  const comps=(competencias||[]).filter(c=>c.status!=="INATIVA"&&(!tipoF||c.tipo===tipoF))
    .sort((a,b)=>(a.tipo||"").localeCompare(b.tipo||"")||(a.grupo||"").localeCompare(b.grupo||"","pt-BR")||(a.nome||"").localeCompare(b.nome||"","pt-BR"));
  const nivelDe=(cg,compId)=>{const r=(cg.competenciasReq||[]).find(x=>x.compId===compId);return r?Number(r.nivel)||0:0;};
  const listaCargos=(cargos||[]).filter(cg=>cg.status!=="INATIVO")
    .filter(cg=>!dep||cg.departamento===dep)
    .filter(cg=>!soComDef||(cg.competenciasReq||[]).length>0)
    .sort((a,b)=>{
      const ca=String(a.codigo||"").trim(), cb=String(b.codigo||"").trim();
      if(ca&&!cb)return -1; if(!ca&&cb)return 1;          // sem código vai para o fim
      return ca.localeCompare(cb,"pt-BR",{numeric:true,sensitivity:"base"})
          || (a.titulo||"").localeCompare(b.titulo||"","pt-BR");
    });
  const deps=[...new Set((cargos||[]).map(c=>c.departamento).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"pt-BR"));
  const pontCargo=cg=>comps.reduce((s,c)=>s+nivelDe(cg,c.id),0);
  const pontComp=c=>listaCargos.reduce((s,cg)=>s+nivelDe(cg,c.id),0);
  const usosComp=c=>listaCargos.filter(cg=>nivelDe(cg,c.id)>0).length;
  const corNivel=n=>n===0?"text-slate-200":n===1?"bg-slate-100 text-slate-600":n===2?"bg-sky-100 text-sky-700":n===3?"bg-brand/15 text-brand":n===4?"bg-indigo-200 text-indigo-800":"bg-emerald-100 text-emerald-700";
  const exportar=()=>{
    try{
      if(!comps.length||!listaCargos.length){notify("Nada para exportar.");return;}
      const rot=cg=>cg.codigo?`${cg.codigo} — ${cg.titulo}`:cg.titulo;
      const linhas=comps.map(c=>{
        const o={"Tipo":c.tipo==="tecnica"?"Técnica":"Comportamental","Grupo":c.grupo||"","Competência":c.nome||""};
        listaCargos.forEach(cg=>{const n=nivelDe(cg,c.id);o[rot(cg)]=n||"";});
        o["Cargos que exigem"]=usosComp(c); o["Pontuação total"]=pontComp(c);
        return o;
      });
      const tot={"Tipo":"","Grupo":"","Competência":"PONTUAÇÃO DO CARGO"};
      listaCargos.forEach(cg=>{tot[rot(cg)]=pontCargo(cg);});
      linhas.push(tot);
      const ws=XLSX.utils.json_to_sheet(linhas);const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,"Matriz");XLSX.writeFile(wb,"matriz-competencias-cargos.xlsx");
    }catch(e){notify("Falha ao exportar: "+String(e.message||e).slice(0,60));}
  };
  const th="text-[11px] font-semibold text-slate-500 uppercase tracking-wide";
  const maiorNome=listaCargos.reduce((m,cg)=>Math.max(m,(cg.titulo||"").length),8);
  const headH=Math.min(300,Math.max(130,Math.round(maiorNome*6.6)+28));
  return <div className="space-y-3">
    <div className="flex items-center gap-3 flex-wrap">
      <select value={tipoF} onChange={e=>setTipoF(e.target.value)} className="text-sm border border-slate-300 rounded-md px-2.5 py-2 bg-white">
        <option value="">Todas as competências</option><option value="comportamental">Só comportamentais</option><option value="tecnica">Só técnicas</option></select>
      <select value={dep} onChange={e=>setDep(e.target.value)} className="text-sm border border-slate-300 rounded-md px-2.5 py-2 bg-white">
        <option value="">Todos os departamentos</option>{deps.map(d=><option key={d}>{d}</option>)}</select>
      <label className="flex items-center gap-2 text-sm text-slate-500 cursor-pointer select-none"><input type="checkbox" checked={soComDef} onChange={e=>setSoComDef(e.target.checked)} className="accent-brand"/>Só cargos já mapeados</label>
      <div className="ml-auto flex items-center gap-3">
        <div className="flex items-center gap-1.5 text-[11px] text-slate-400 flex-wrap">
          {NIVEIS_EXIG.map(([k])=><span key={k} className={"px-1.5 py-0.5 rounded font-semibold "+corNivel(Number(k))}>{k} · {NIVEIS_CURTO[k]}</span>)}
        </div>
        <div className="flex items-center rounded-md border border-slate-300 overflow-hidden text-sm shrink-0">
          <span className="px-2.5 py-2 text-slate-400 text-xs bg-slate-50 border-r border-slate-200">Exportar</span>
          <button onClick={exportar} className="px-2.5 py-2 text-slate-600 hover:bg-slate-50">Excel</button>
          <button onClick={()=>{ if(!comps.length||!listaCargos.length){notify("Nada para exportar.");return;}
            const w=window.open("","_blank"); if(!w){notify("Permita pop-ups para exportar em PDF.");return;}
            w.document.write(matrizHTML(comps,listaCargos,nivelDe,NIVEIS_EXIG.map(([k])=>[k,NIVEIS_CURTO[k]]))); w.document.close(); setTimeout(()=>w.print(),400);
          }} className="px-2.5 py-2 text-slate-600 hover:bg-slate-50 border-l border-slate-200">PDF</button>
        </div>
      </div>
    </div>

    {(!comps.length||!listaCargos.length)
      ? <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-12 text-center text-slate-400 text-sm">
          {!comps.length?"Cadastre competências para montar a matriz.":"Nenhum cargo encontrado com esse filtro."}
        </div>
      : <div className="matriz-scroll bg-white rounded-xl border border-slate-200 shadow-sm overflow-auto max-h-[70vh]">
        <table className="text-sm border-collapse">
          <thead className="sticky top-0 z-20">
            <tr className="bg-slate-50">
              <th className={"sticky left-0 z-30 bg-slate-50 text-left px-3 py-2 border-b border-r border-slate-200 min-w-[240px] "+th}>Competência</th>
              {listaCargos.map(cg=><th key={cg.id} style={{height:headH}} className={"px-0 py-2 border-b border-slate-200 align-bottom "+th} title={`${cg.codigo?cg.codigo+" · ":""}${cg.titulo}${cg.departamento?" · "+cg.departamento:""}`}>
                <div style={{height:headH-12,width:26}} className="mx-auto flex items-end justify-center">
                  <span style={{writingMode:"vertical-rl",transform:"rotate(180deg)"}} className="whitespace-nowrap text-[11px] font-medium text-slate-600 normal-case tracking-normal">{cg.titulo}</span>
                </div></th>)}
              <th className={"px-2 py-2 border-b border-l border-slate-200 bg-slate-100 "+th}>Cargos</th>
              <th className={"px-2 py-2 border-b border-slate-200 bg-slate-100 "+th}>Pontos</th>
            </tr>
          </thead>
          <tbody>
            {comps.map((c,i)=>{
              const grupoAnterior=i>0?comps[i-1].tipo:null;
              const cabecalhoTipo=c.tipo!==grupoAnterior;
              return <React.Fragment key={c.id}>
                {cabecalhoTipo&&<tr><td colSpan={listaCargos.length+3} className="sticky left-0 bg-slate-100/70 px-3 py-1.5 text-[11px] font-bold uppercase tracking-wide text-slate-500 border-y border-slate-200">
                  {c.tipo==="tecnica"?"Técnicas (hard skills)":"Comportamentais (soft skills)"}</td></tr>}
                <tr className="hover:bg-slate-50 group">
                  <td className="sticky left-0 z-10 bg-white group-hover:bg-slate-50 px-3 py-1.5 border-b border-r border-slate-200">
                    <div className="font-medium text-navy text-[13px]">{c.nome}</div>
                    {c.grupo&&<div className="text-[10px] text-slate-400">{c.grupo}</div>}</td>
                  {listaCargos.map(cg=>{const n=nivelDe(cg,c.id);return (
                    <td key={cg.id} className="border-b border-slate-100 text-center px-1 py-1.5">
                      {n>0
                        ? <span className={"inline-grid place-items-center w-6 h-6 rounded font-bold text-[11px] "+corNivel(n)} title={`${cg.titulo}: ${rotuloNivel(n)}`}>{n}</span>
                        : <span className="text-slate-200">·</span>}
                    </td>);})}
                  <td className="border-b border-l border-slate-200 bg-slate-50 text-center text-xs font-semibold text-slate-600 px-2">{usosComp(c)}</td>
                  <td className="border-b border-slate-200 bg-slate-50 text-center text-xs font-semibold text-navy px-2">{pontComp(c)}</td>
                </tr>
              </React.Fragment>;})}
            <tr className="bg-slate-100 font-semibold">
              <td className="sticky left-0 z-10 bg-slate-100 px-3 py-2 border-r border-slate-200 text-xs uppercase tracking-wide text-slate-500">Pontuação do cargo</td>
              {listaCargos.map(cg=><td key={cg.id} className="text-center text-xs text-navy px-1 py-2">{pontCargo(cg)||"—"}</td>)}
              <td className="border-l border-slate-200 px-2"></td><td className="px-2"></td>
            </tr>
          </tbody>
        </table>
      </div>}
    <p className="text-[11px] text-slate-400">A pontuação soma os níveis exigidos: quanto maior, mais exigente é o cargo em competências. O nível de cada competência é definido no descritivo do cargo, na aba Competências.</p>
  </div>;
}
function CompetenciaForm({comp,tipo,existentes,cargos,onClose,onSave}){
  const novo=!!comp.novo;
  const proxCodigo=()=>{
    // sequência única para todo o dicionário, no formato COMP-0000
    const nums=(existentes||[]).map(c=>{const m=/(\d+)\s*$/.exec(c.codigo||"");return m?parseInt(m[1],10):0;});
    return `COMP-${String((nums.length?Math.max(...nums):0)+1).padStart(4,"0")}`;
  };
  const vazio={id:uid(),codigo:proxCodigo(),tipo,nome:"",grupo:"",conceito:"",
    comportamentos:[],evidencias:[],criterios:[],kpis:[],perguntas:[],treinamentos:[],
    niveis:{},cargosIndicados:[],status:"ATIVA"};

function MoverModal({ctx,cargos,pessoas,onClose,onSolicitar,isRH}){
  const lateral=ctx.tipo==="LATERAL";
  const [pessoaId,setPessoaId]=useState(ctx.pessoa?.id||"");
  const pessoa=pessoas.find(p=>p.id===pessoaId)||ctx.pessoa;
  // caminhos de promoção (um por trilha compartilhada); pode haver vários
  const caminhos=useMemo(()=>pessoa&&!lateral?proximosCargos(cargos,pessoa.vinculo.cargo):[],[pessoa,lateral,cargos]);
  const [trilhaSel,setTrilhaSel]=useState(caminhos[0]?.familia||"");
  useEffect(()=>{ setTrilhaSel(caminhos[0]?.familia||""); },[pessoaId,cargos]);
  const opcoes=useMemo(()=>{
    if(!pessoa)return [];
    if(lateral) return cargosLaterais(cargos,pessoa.vinculo.cargo);
    // promoção: destino é o próximo cargo da trilha escolhida
    const cam=caminhos.find(c=>c.familia===trilhaSel)||caminhos[0];
    return cam?[cam.cargo]:[];
  },[pessoa,lateral,cargos,caminhos,trilhaSel]);
  const [destinoT,setDestinoT]=useState(opcoes[0]?.titulo||"");
  useEffect(()=>{ setDestinoT(opcoes[0]?.titulo||""); },[pessoaId,trilhaSel,cargos]);
  const destino=cargos.find(c=>c.titulo===destinoT);
  const [sal,setSal]=useState("");
  useEffect(()=>{ setSal(destino?String(lateral?pessoa?.vinculo.salario||destino.faixaMin:destino.faixaMin):""); },[destinoT]);
  const [just,setJust]=useState("");
  const el=pessoa&&!lateral?avaliarElegibilidade(pessoa,cargos,trilhaSel):null;
  const pos=destino?posicaoNaFaixa(destino,Number(sal)):null;
  const delta=pessoa?Number(sal)-pessoa.vinculo.salario:0;
  if(!pessoa) return null;
  return <div className="fixed inset-0 z-50 grid place-items-center bg-navy/40 p-4" onClick={onClose}>
    <div className="bg-white rounded-lg shadow-2xl w-full max-w-md p-5 max-h-[90vh] overflow-auto" onClick={e=>e.stopPropagation()}>
      <h2 className="text-lg font-bold text-navy">{lateral?"Movimentação lateral":"Promoção"}</h2>
      {lateral&&<L t="Colaborador"><select value={pessoaId} onChange={e=>setPessoaId(e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 mt-0.5">{pessoas.map(p=><option key={p.id} value={p.id}>{p.nome} — {p.vinculo.cargo}</option>)}</select></L>}
      {!lateral&&caminhos.length>1&&<L t="Trilha de promoção"><select value={trilhaSel} onChange={e=>setTrilhaSel(e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 mt-0.5">{caminhos.map(c=><option key={c.familia} value={c.familia}>{c.familia} → {c.cargo.titulo}</option>)}</select></L>}
      {!lateral&&caminhos.length>1&&<div className="text-[11px] text-amber-600 mt-1">Este cargo pertence a {caminhos.length} trilhas — escolha por qual promover.</div>}
      <div className="text-sm text-slate-500 mt-2">{pessoa.vinculo.cargo} <span className="text-slate-300">→</span> {destino?<b className="text-navy">{destino.titulo}</b>:<span className="text-amber-600">sem destino disponível</span>}</div>
      {!lateral&&opcoes.length===0&&<div className="text-sm text-slate-500 mt-3">{pessoa.nome} já está no topo da trilha.</div>}
      {opcoes.length>0&&<>
        {lateral&&<L t="Cargo destino (mesmo nível)"><select value={destinoT} onChange={e=>setDestinoT(e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 mt-0.5">{opcoes.map(c=><option key={c.id} value={c.titulo}>{c.titulo} ({familiasDe(c).join(", ")})</option>)}</select></L>}
        {el&&<div className="bg-slate-50 rounded-md p-3 mt-3 text-sm"><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1">Critérios objetivos {el.elegivel?<span className="text-emerald-600">· atendidos</span>:<span className="text-amber-600">· não atendidos</span>}</div>
          <ul className="space-y-0.5">{el.checks.map((c,i)=><li key={i} className={"flex gap-2 "+(c.ok?"text-slate-600":"text-amber-600")}>{c.ok?"✓":"○"} {c.label} <span className="text-slate-400">({c.atual})</span></li>)}</ul></div>}
        {isRH&&destino&&<div className="mt-3"><L t={`Novo salário (faixa ${money(destino.faixaMin)}–${money(destino.faixaMax)})`}><Inp type="number" value={sal} onChange={e=>setSal(e.target.value)}/></L>
          {pos&&pos!=="DENTRO"&&<div className="text-xs text-amber-600 mt-1">⚠ Fora da faixa — exige aprovação especial (Motor de Regras).</div>}
          {delta!==0&&<div className="text-xs text-slate-500 mt-1">Impacto: <b className={delta>=0?"text-emerald-600":"text-red-600"}>{delta>=0?"+":""}{money(delta)}</b>/mês · {money(delta*13)}/ano</div>}</div>}
        <L t="Justificativa"><textarea value={just} onChange={e=>setJust(e.target.value)} rows="2" className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 mt-0.5"/></L>
      </>}
      <div className="flex justify-end gap-2 mt-4"><button onClick={onClose} className="px-3 py-1.5 text-sm text-slate-500">Cancelar</button>
        {opcoes.length>0&&<button disabled={!destino||(isRH&&!sal)} onClick={()=>onSolicitar(pessoa,destino,ctx.tipo,isRH?sal:pessoa.vinculo.salario,just,el?el.elegivel:true)} className={"px-4 py-1.5 text-sm font-medium rounded-md text-white "+(destino&&(!isRH||sal)?"bg-brand hover:bg-navy":"bg-slate-300 cursor-not-allowed")}>Solicitar</button>}</div>
    </div></div>;
}
function HistoricoDrawer({pessoa,eventos,cargoAtual,isRH,onClose}){
  const relevantes=["PessoaAdmitida","CargoAlterado","AlteracaoSalarial","PromocaoAprovada","MovimentacaoRealizada"];
  const hist=eventos.filter(e=>relevantes.includes(e.tipo)).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const pos=cargoAtual?posicaoNaFaixa(cargoAtual,pessoa.vinculo.salario):null;
  return <Slide onClose={onClose} titulo={pessoa.nome} sub={pessoa.vinculo.cargo} status={pessoa.status}>
    <div className="grid grid-cols-2 gap-3 mb-4">
      <Info l="Cargo atual">{pessoa.vinculo.cargo}</Info><Info l="Tempo no cargo">{mesesDesde(pessoa.vinculo.desdeCargo||pessoa.vinculo.admissao)} meses</Info>
      {isRH&&<Info l="Salário atual">{money(pessoa.vinculo.salario)}</Info>}
      {isRH&&cargoAtual&&<Info l="Faixa / posição">{money(cargoAtual.faixaMin)}–{money(cargoAtual.faixaMax)} · {pos==="DENTRO"?"na faixa":pos==="ABAIXO"?"abaixo":"acima"}</Info>}
      <Info l="Última avaliação">{pessoa.ultimaAvaliacao?pessoa.ultimaAvaliacao.toFixed(1):"—"}</Info>
    </div>
    <div className="text-[11px] uppercase tracking-wide text-slate-400 mb-2">Histórico de cargo e salário</div>
    <div className="text-xs text-slate-400 mb-3 bg-slate-50 rounded-md p-2.5 ring-1 ring-slate-200">Derivado dos eventos imutáveis — o histórico nunca é perdido nem editado.</div>
    <div className="relative pl-5"><div className="absolute left-1.5 top-1 bottom-1 w-px bg-slate-200"></div>
      {hist.map(e=>{const m=EVENTO_META[e.tipo]||{c:"#64748b",t:e.tipo};
        return <div key={e.id} className="relative mb-4"><div className="absolute -left-[13px] top-1 w-2.5 h-2.5 rounded-full ring-2 ring-white" style={{background:m.c}}></div>

          <div className="text-[11px] text-slate-400 font-mono mt-0.5">{new Date(e.timestamp).toLocaleDateString("pt-BR")}</div></div>;})}
      {hist.length===0&&<div className="text-sm text-slate-400">Sem histórico registrado.</div>}
    </div>
  </Slide>;
}

// --- Ordenação de tabelas (reutilizável) ---
function useSort(defKey,defDir){
  const [sort,setSort]=useState({key:defKey||null,dir:defDir||"asc"});
  const toggle=key=>setSort(s=>s.key===key?{key,dir:s.dir==="asc"?"desc":"asc"}:{key,dir:"asc"});
  const sortBy=(arr,accessors)=>{
    if(!sort.key||!accessors[sort.key])return arr;
    const get=accessors[sort.key];
    const mul=sort.dir==="asc"?1:-1;
    return [...arr].sort((a,b)=>{
      let va=get(a),vb=get(b);
      if(va==null)va="";if(vb==null)vb="";
      if(typeof va==="number"&&typeof vb==="number")return (va-vb)*mul;
      return String(va).localeCompare(String(vb),"pt-BR",{numeric:true,sensitivity:"base"})*mul;
    });
  };
  return {sort,toggle,sortBy};
}
const SortTh=({label,col,sort,onSort,align="left",className=""})=>{
  const active=sort.key===col;
  const arrow=active?(sort.dir==="asc"?"▲":"▼"):"";
  const just=align==="center"?"justify-center":align==="right"?"justify-end":"justify-start";
  return (
    <th className={"font-semibold px-3 py-2.5 select-none cursor-pointer group "+(align==="center"?"text-center":align==="right"?"text-right":"text-left")+" "+className}
        onClick={()=>onSort(col)} title="Ordenar">
      <span className={"inline-flex items-center gap-1 "+just}>
        {label}
        <span className={"text-[9px] transition-opacity "+(active?"opacity-100 text-brand":"opacity-0 group-hover:opacity-40")}>{arrow||"▲"}</span>
      </span>
    </th>
  );
};

const L=({t,children})=><div><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-0.5">{t}</div>{children}</div>;
const MiniCard=({t,v,sub})=><div className="border border-slate-200 rounded-md p-2.5"><div className="text-[11px] uppercase tracking-wide text-slate-400">{t}</div><div className="text-lg font-bold text-navy">{v}</div><div className="text-[11px] text-slate-400">{sub}</div></div>;
const Info=({l,children,mono})=><div><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-0.5">{l}</div><div className={"text-sm text-slate-700 "+(mono?"font-mono":"")}>{children||"—"}</div></div>;
const Slide=({titulo,sub,status,children,onClose})=>(
  <div className="fixed inset-0 z-40 flex justify-end no-print"><div className="absolute inset-0 bg-navy/30" onClick={onClose}></div>
    <div className="relative w-full max-w-md bg-white h-full shadow-2xl flex flex-col drawer-in">
      <div className="p-4 border-b border-slate-200 flex items-start gap-3"><div className="flex-1"><div className="flex items-center gap-2"><h2 className="text-lg font-bold text-navy">{titulo}</h2>
        {status&&<span className={"inline-flex px-2 py-0.5 rounded-full text-xs font-medium ring-1 "+(STATUS[status]||STATUS.ATIVO).cls}>{(STATUS[status]||STATUS.ATIVO).label}</span>}</div>{sub&&<div className="text-sm text-slate-500">{sub}</div>}</div>
        <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl">✕</button></div>
      <div className="flex-1 overflow-auto p-4">{children}</div></div></div>
);

// ---- Ficha Pessoas (drawer com abas) ----
function Ficha({pessoa,eventos,onClose,onSave,onAddDoc,podeVerSalario,role,cargos}){
  const [tab,setTab]=useState("dados"),[edit,setEdit]=useState(false),[f,setF]=useState(()=>JSON.parse(JSON.stringify(pessoa)));
  useEffect(()=>{setF(JSON.parse(JSON.stringify(pessoa)));setEdit(false);},[pessoa.id]);
  const tabs=[["dados","Dados"],["vinculo","Vínculo"],["desenv","Desenvolvimento"],["docs","Documentos"],["jornada","Jornada"]];
  const set=(k,v)=>setF(p=>({...p,[k]:v})),setV=(k,v)=>setF(p=>({...p,vinculo:{...p.vinculo,[k]:v}}));
  const escolherCargoV=titulo=>{ const c=(cargos||[]).find(x=>x.titulo===titulo); setF(p=>({...p,vinculo:{...p.vinculo,cargo:titulo,setor:c?.departamento||c?.setor||p.vinculo.setor,cbo:c?.cbo||p.vinculo.cbo}})); };
  const salvar=()=>{onSave(pessoa,{nome:f.nome,email:f.email,telefone:f.telefone,nascimento:f.nascimento,escolaridade:f.escolaridade,formacao:f.formacao,status:f.status,observacoes:f.observacoes,vinculo:f.vinculo});setEdit(false);};
  return (
    <div className="fixed inset-0 z-40 flex justify-end"><div className="absolute inset-0 bg-navy/30" onClick={onClose}></div>
      <div className="relative w-full max-w-xl bg-white h-full shadow-2xl flex flex-col drawer-in">
        <div className="p-4 border-b border-slate-200">
          <div className="flex items-start gap-3"><Avatar nome={pessoa.nome} status={pessoa.status} lg/>
            <div className="flex-1 min-w-0"><div className="flex items-center gap-2"><h2 className="text-lg font-bold text-navy truncate">{pessoa.nome}</h2><Badge status={pessoa.status}/></div>
              <div className="text-sm text-slate-500">{pessoa.vinculo?.cargo} · {pessoa.vinculo?.setor}</div>
              <div className="text-xs text-slate-400 font-mono mt-0.5">{pessoa.vinculo?.matricula} · {pessoa.vinculo?.unidade}</div></div>
            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl leading-none">✕</button></div>
          <div className="flex gap-1 mt-3 -mb-4 overflow-x-auto">{tabs.map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} className={"px-3 py-2 text-sm font-medium border-b-2 whitespace-nowrap "+(tab===k?"border-brand text-brand":"border-transparent text-slate-400 hover:text-slate-600")}>{l}</button>))}</div>
        </div>
        <div className="flex-1 overflow-auto p-4">
          {tab==="dados"&&(<div className="space-y-4">{!edit?<>
            <div className="grid grid-cols-2 gap-4"><Field label="Nome">{pessoa.nome}</Field><Field label="CPF" mono>{pessoa.cpf}</Field>
              <Field label="Nascimento">{brDate(pessoa.nascimento)} · {idade(pessoa.nascimento)}</Field><Field label="E-mail">{pessoa.email}</Field>
              <Field label="Telefone" mono>{pessoa.telefone}</Field><Field label="Escolaridade">{pessoa.escolaridade}</Field>
              <Field label="Formação">{pessoa.formacao}</Field><Field label="Dependentes">{pessoa.dependentes}</Field></div>
            <Field label="Observações internas">{pessoa.observacoes}</Field></>:<>
            <div className="grid grid-cols-2 gap-3"><L t="Nome"><Inp value={f.nome} onChange={e=>set("nome",e.target.value)}/></L><L t="Nascimento"><Inp type="date" value={f.nascimento} onChange={e=>set("nascimento",e.target.value)}/></L>
              <L t="E-mail"><Inp value={f.email} onChange={e=>set("email",e.target.value)}/></L><L t="Telefone"><Inp value={f.telefone} onChange={e=>set("telefone",fmtTel(e.target.value))}/></L>
              <L t="Escolaridade"><Inp value={f.escolaridade} onChange={e=>set("escolaridade",e.target.value)}/></L><L t="Formação"><Inp value={f.formacao} onChange={e=>set("formacao",e.target.value)}/></L>
              <L t="Status"><select value={f.status} onChange={e=>set("status",e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5">{Object.keys(STATUS).map(s=><option key={s} value={s}>{STATUS[s].label}</option>)}</select></L></div>
            <L t="Observações internas"><textarea value={f.observacoes} onChange={e=>set("observacoes",e.target.value)} rows="2" className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5"/></L></>}</div>)}
          {tab==="vinculo"&&(<div className="space-y-4">{!edit?<div className="grid grid-cols-2 gap-4">
            <Field label="Matrícula" mono>{pessoa.vinculo?.matricula}</Field><Field label="Tipo de contrato">{pessoa.vinculo?.tipoContrato}</Field>
            <Field label="Cargo">{pessoa.vinculo?.cargo}</Field><Field label="Setor">{pessoa.vinculo?.setor}</Field>
            <Field label="Unidade">{pessoa.vinculo?.unidade}</Field><Field label="Líder direto">{pessoa.vinculo?.lider}</Field>
            <Field label="Jornada">{pessoa.vinculo?.jornada}</Field><Field label="Admissão">{brDate(pessoa.vinculo?.admissao)}</Field>
            {podeVerSalario?<><Field label="Salário atual">{money(pessoa.vinculo?.salario)}</Field><Field label="Faixa salarial">{pessoa.vinculo?.faixaSalarial}</Field></>
              :<div className="col-span-2 text-xs text-slate-400 bg-slate-50 rounded-md p-2.5 ring-1 ring-slate-200">▪ Salário e faixa visíveis apenas para o perfil <b>RH</b>. Perfil atual: {role}.</div>}
            {pessoa.vinculo?.desligamento&&<Field label="Desligamento">{brDate(pessoa.vinculo.desligamento)}</Field>}</div>
            :<div className="grid grid-cols-2 gap-3"><L t="Cargo"><select value={f.vinculo.cargo} onChange={e=>escolherCargoV(e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5">{[...new Set([...(cargos||[]).filter(c=>c.status!=="INATIVO").map(c=>c.titulo),f.vinculo.cargo].filter(Boolean))].sort((a,b)=>a.localeCompare(b)).map(t=><option key={t} value={t}>{t}</option>)}</select></L>
            <L t="Setor ▪"><input value={(cargos||[]).find(c=>c.titulo===f.vinculo.cargo)?.departamento||f.vinculo.setor||""} readOnly disabled title="Definido pelo cargo — edite no catálogo de Cargos" className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 bg-slate-100 text-slate-500 cursor-not-allowed"/></L>
            <L t="Unidade"><Inp value={f.vinculo.unidade} onChange={e=>setV("unidade",e.target.value)}/></L><L t="Líder direto"><Inp value={f.vinculo.lider} onChange={e=>setV("lider",e.target.value)}/></L>
            <L t="Tipo de contrato"><select value={f.vinculo.tipoContrato} onChange={e=>setV("tipoContrato",e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5">{CONTRATOS.map(c=><option key={c}>{c}</option>)}</select></L>
            <L t="Admissão"><Inp type="date" value={f.vinculo.admissao} onChange={e=>setV("admissao",e.target.value)}/></L>
            {podeVerSalario&&<L t="Salário (R$)"><div className="relative"><Inp type={verSalario?"number":"password"} value={f.vinculo.salario} onChange={e=>setV("salario",e.target.value)}/><button type="button" onClick={()=>setVerSalario(v=>!v)} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><IcEye open={verSalario}/></button></div></L>}</div>}
            <p className="text-xs text-slate-400">O <b>Vínculo</b> guarda matrícula, contrato e histórico salarial — separado da identidade da Pessoa. Mudar o líder aqui reorganiza o Organograma.</p></div>)}
          {tab==="desenv"&&(<div className="space-y-4">
            <div><div className="text-[11px] uppercase tracking-wide text-slate-400 mb-1.5">Competências atuais</div>
              <div className="flex flex-wrap gap-1.5">{(pessoa.competencias||[]).length?pessoa.competencias.map((c,i)=><span key={i} className="text-xs bg-brand/10 text-brand px-2 py-1 rounded-md font-medium">{c}</span>):<span className="text-sm text-slate-400">Nenhuma competência registrada.</span>}</div></div>
            <div className="grid grid-cols-2 gap-3"><MiniCard t="Objetivos ativos" v="—" sub="Integra módulo OKRs"/><MiniCard t="PDI ativo" v="—" sub="Integra módulo PDI"/><MiniCard t="Treinamentos" v={(pessoa.competencias||[]).length} sub="Concluídos"/><MiniCard t="Última avaliação" v="—" sub="Integra Avaliações"/></div></div>)}
          {tab==="docs"&&<DocsTab pessoa={pessoa} onAddDoc={onAddDoc}/>}
          {tab==="jornada"&&(<div><div className="text-xs text-slate-400 mb-3 bg-slate-50 rounded-md p-2.5 ring-1 ring-slate-200">Linha do tempo montada dos <b>eventos</b>. Não editável — projeção da arquitetura orientada a eventos.</div>
            <div className="relative pl-5"><div className="absolute left-1.5 top-1 bottom-1 w-px bg-slate-200"></div>
              {[...eventos].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(e=>{const m=EVENTO_META[e.tipo]||{c:"#64748b",t:e.tipo};
                return <div key={e.id} className="relative mb-4"><div className="absolute -left-[13px] top-1 w-2.5 h-2.5 rounded-full ring-2 ring-white" style={{background:m.c}}></div>
                  <div className="text-sm font-medium text-navy">{m.t}</div><div className="text-sm text-slate-600">{e.resumo}</div>
                  <div className="text-[11px] text-slate-400 font-mono mt-0.5">{new Date(e.timestamp).toLocaleString("pt-BR")} · <span className="text-slate-300">{e.tipo}</span></div></div>;})}
              {eventos.length===0&&<div className="text-sm text-slate-400">Sem eventos ainda.</div>}</div></div>)}
        </div>
        {tab!=="jornada"&&tab!=="desenv"&&(<div className="p-3 border-t border-slate-200 flex justify-end gap-2 bg-slate-50">
          {edit?<><button onClick={()=>{setF(JSON.parse(JSON.stringify(pessoa)));setEdit(false);}} className="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-700">Cancelar</button>
            <button onClick={salvar} className="px-4 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Salvar alterações</button></>
            :(role!=="Colaborador"&&<button onClick={()=>setEdit(true)} className="px-4 py-1.5 text-sm font-medium border border-brand text-brand rounded-md hover:bg-brand/5">Editar</button>)}</div>)}
      </div>
    </div>
  );
}
function DocsTab({pessoa,onPatch,configs}){
  const pessoaRef=React.useRef(pessoa);
  useEffect(()=>{pessoaRef.current=pessoa;},[pessoa]);
  const tipos=(configs?.tiposDocumento||[]).filter(t=>t.ativo);
  const docs=pessoa.documentos||[];
  const [formAberto,setFormAberto]=useState(null);

  const salvarDoc=f=>{
    const tipo=tipos.find(t=>t.id===f.tipoId);
    if(!tipo){notify&&notify("Selecione um tipo de documento.");return;}
    const status=tipo.temValidade&&f.validade?(f.validade<hoje()?"VENCIDO":"VÁLIDO"):"N/A";
    const doc={id:f.id||uid(),tipoId:f.tipoId,tipo:tipo.nome,validade:f.validade||"",link:f.link||"",status,obrigatorio:tipo.obrigatorio};
    const docsAtuais=pessoaRef.current.documentos||[];
    const novos=f.id?docsAtuais.map(d=>d.id===f.id?doc:d):[...docsAtuais,doc];
    onPatch({...pessoaRef.current,documentos:novos},"Documentos atualizados");
    setFormAberto(null);
  };

  const excluirDoc=id=>{
    if(!window.confirm("Excluir este documento?"))return;
    const docsAtuais=pessoaRef.current.documentos||[];
    onPatch({...pessoaRef.current,documentos:docsAtuais.filter(d=>d.id!==id)},"Documento removido");
  };

  // separa obrigatórios e opcionais
  const tiposObrig=tipos.filter(t=>t.obrigatorio);
  const tiposOpcional=tipos.filter(t=>!t.obrigatorio);

  // doc já cadastrado para um tipo
  const docDe=tipoId=>docs.find(d=>d.tipoId===tipoId);

  const inpC="w-full text-sm border border-slate-200 rounded-md px-2.5 py-2 outline-none focus:ring-2 ring-brand/30";

  const FormDoc=({f,setF,onSalvar,onCancelar})=><div className="bg-brand/5 border border-brand/20 rounded-xl p-4 space-y-3 mt-2">
    <div className="text-sm font-semibold text-navy">{f.id?"Editar documento":"Cadastrar documento"}</div>
    <div className="grid grid-cols-2 gap-3">
      <div className="col-span-2">
        <label className="text-xs text-slate-500 uppercase tracking-wide">Tipo de Documento *</label>
        <select value={f.tipoId||""} onChange={e=>setF(x=>({...x,tipoId:e.target.value}))} className={inpC+" mt-1"}>
          <option value="">Selecione…</option>
          {tipos.map(t=><option key={t.id} value={t.id}>{t.nome}{t.obrigatorio?" ★":""}</option>)}
        </select>
      </div>
      {tipos.find(t=>t.id===f.tipoId)?.temValidade&&
        <div><label className="text-xs text-slate-500 uppercase tracking-wide">Data de Validade</label>
          <input type="text" value={f.validadeDisplay||brDate(f.validade)||""} onChange={e=>{const v=e.target.value.replace(/\D/g,"").slice(0,8);const mask=v.length<=2?v:v.length<=4?v.slice(0,2)+"/"+v.slice(2):v.slice(0,2)+"/"+v.slice(2,4)+"/"+v.slice(4);setF(x=>({...x,validadeDisplay:mask,validade:v.length===8?v.slice(4)+"-"+v.slice(2,4)+"-"+v.slice(0,2):""}));}} placeholder="DD/MM/AAAA" maxLength={10} className={inpC+" mt-1"}/></div>}
      <div className={tipos.find(t=>t.id===f.tipoId)?.temValidade?"":"col-span-2"}>
        <label className="text-xs text-slate-500 uppercase tracking-wide">Link Google Drive</label>
        <input value={f.link||""} onChange={e=>setF(x=>({...x,link:e.target.value}))} placeholder="https://drive.google.com/…" className={inpC+" mt-1"}/>
      </div>
    </div>
    <div className="flex gap-2 justify-end">
      <button onClick={onCancelar} className="px-3 py-1.5 text-sm border border-slate-300 rounded-md text-slate-600 hover:bg-slate-50">Cancelar</button>
      <button onClick={()=>onSalvar(f)} className="px-4 py-1.5 text-sm bg-brand hover:bg-navy text-white rounded-md font-medium">Salvar</button>
    </div>
  </div>;

  const DocRow=({d,onEdit,onExcluir})=>{
    const vencido=d.validade&&d.validade<hoje();
    return <div className="flex items-center gap-3 px-4 py-3 border-t border-slate-100 hover:bg-slate-50">
      <div className="shrink-0">
        {d.link?<a href={d.link} target="_blank" rel="noreferrer" className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 grid place-items-center hover:bg-blue-100" title="Abrir no Google Drive">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6.28 3l5.72 9.9L6.28 3zm5.72 9.9L6.28 21h11.44L12 12.9zm5.72-9.9L12 12.9 17.72 3H6.28z" opacity=".3"/><path d="M17.72 3H6.28L12 12.9l5.72-9.9zM12 12.9L6.28 21h11.44L12 12.9z"/></svg>
        </a>:<div className="w-8 h-8 rounded-lg bg-slate-100 text-slate-400 grid place-items-center"><IcFile/></div>}
      </div>
      <div className="flex-1 min-w-0">
        <div className="text-sm font-medium text-navy truncate">{d.tipo}</div>
        {d.validade&&<div className={"text-xs mt-0.5 "+(vencido?"text-red-500 font-medium":"text-slate-400")}>
          {vencido?"⚠ Vencido em ":"Válido até "}{brDate(d.validade)}</div>}
        {!d.validade&&<div className="text-xs text-slate-400">Sem validade</div>}
      </div>
      {d.status&&d.status!=="N/A"&&<span className={"text-xs px-2 py-0.5 rounded-full ring-1 "+(d.status==="VÁLIDO"?"bg-emerald-50 text-emerald-700 ring-emerald-200":"bg-red-50 text-red-600 ring-red-200")}>{d.status}</span>}
      <div className="flex gap-1 shrink-0">
        <button onClick={onEdit} className="p-1.5 text-slate-400 hover:text-brand" title="Editar"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button onClick={onExcluir} className="p-1.5 text-slate-400 hover:text-red-500" title="Excluir"><IcTrash/></button>
      </div>
    </div>;
  };

  const [fDoc,setFDoc]=useState({});
  const abrirForm=(tipoId="",docExist=null)=>{
    setFDoc(docExist?{...docExist,validadeDisplay:brDate(docExist.validade).replace(/—/,"")}:{tipoId,validade:"",validadeDisplay:"",link:""});
    setFormAberto(tipoId||"novo");
  };

  return <div className="max-w-3xl space-y-6">
    {/* Documentos Obrigatórios */}
    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div className="px-4 py-3 border-b border-slate-100 flex items-center gap-2">
        <span className="text-sm font-semibold text-navy">Documentos Obrigatórios</span>
        <span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">{tiposObrig.filter(t=>!docDe(t.id)).length} pendente(s)</span>
      </div>
      {tiposObrig.map(t=>{
        const d=docDe(t.id);
        return <div key={t.id}>
          {d?<DocRow d={d} onEdit={()=>abrirForm(t.id,d)} onExcluir={()=>excluirDoc(d.id)}/>
          :<div className="flex items-center gap-3 px-4 py-3 border-t border-slate-100 bg-red-50/40">
            <div className="w-8 h-8 rounded-lg bg-red-100 text-red-400 grid place-items-center"><IcFile/></div>
            <div className="flex-1"><div className="text-sm font-medium text-slate-700">{t.nome}</div>
              <div className="text-xs text-red-400">Não cadastrado</div></div>
            <button onClick={()=>abrirForm(t.id)} className="text-xs px-3 py-1.5 bg-brand hover:bg-navy text-white rounded-md font-medium">+ Cadastrar</button>
          </div>}
          {formAberto===t.id&&<div className="px-4 pb-4"><FormDoc f={fDoc} setF={setFDoc} onSalvar={salvarDoc} onCancelar={()=>setFormAberto(null)}/></div>}
        </div>;
      })}
      {tiposObrig.length===0&&<div className="text-sm text-slate-400 text-center py-6">Nenhum tipo obrigatório configurado em Configurações.</div>}
    </div>

    {/* Documentos Opcionais */}
    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
        <span className="text-sm font-semibold text-navy">Outros Documentos</span>
        <button onClick={()=>abrirForm()} className="text-xs px-3 py-1.5 bg-brand hover:bg-navy text-white rounded-md font-medium">+ Adicionar</button>
      </div>
      {formAberto==="novo"&&<div className="px-4 pb-4 pt-2"><FormDoc f={fDoc} setF={setFDoc} onSalvar={salvarDoc} onCancelar={()=>setFormAberto(null)}/></div>}
      {docs.filter(d=>!tiposObrig.find(t=>t.id===d.tipoId)).map(d=>
        <div key={d.id}>
          <DocRow d={d} onEdit={()=>abrirForm(d.tipoId,d)} onExcluir={()=>excluirDoc(d.id)}/>
          {formAberto===d.tipoId+"_edit"&&<div className="px-4 pb-4"><FormDoc f={fDoc} setF={setFDoc} onSalvar={salvarDoc} onCancelar={()=>setFormAberto(null)}/></div>}
        </div>)}
      {docs.filter(d=>!tiposObrig.find(t=>t.id===d.tipoId)).length===0&&!formAberto&&
        <div className="text-sm text-slate-400 text-center py-6">Nenhum documento adicional cadastrado.</div>}
    </div>
  </div>;
}
function NovaPessoa({onClose,onCriar,cargos,departamentos}){
  const [f,setF]=useState({nome:"",cpf:"",nascimento:"",email:"",telefone:"",vinculo:{cargo:"",setor:SETORES[0],unidade:"Matriz",lider:"",tipoContrato:"CLT",admissao:hoje(),salario:""}});
  const [verSal,setVerSal]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v})),setV=(k,v)=>setF(p=>({...p,vinculo:{...p.vinculo,[k]:v}}));
  const escolherCargo=titulo=>{ const c=(cargos||[]).find(x=>x.titulo===titulo);
    setF(p=>({...p,vinculo:{...p.vinculo,cargo:titulo,setor:c?.departamento||c?.setor||p.vinculo.setor,cbo:c?.cbo||p.vinculo.cbo,salario:p.vinculo.salario||(c?String(c.faixaMin):"")}})); };
  const cargoSel=(cargos||[]).find(c=>c.titulo===f.vinculo.cargo);
  const ok=f.nome&&f.cpf&&f.nascimento&&f.email&&f.vinculo.cargo&&f.vinculo.admissao;
  return (<div className="fixed inset-0 z-40 flex justify-end"><div className="absolute inset-0 bg-navy/30" onClick={onClose}></div>
    <div className="relative w-full max-w-lg bg-white h-full shadow-2xl flex flex-col drawer-in">
      <div className="p-4 border-b border-slate-200 flex items-center justify-between"><div><h2 className="text-lg font-bold text-navy">Nova pessoa</h2><p className="text-sm text-slate-500">Cadastro único · gera admissão na Jornada</p></div>
        <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl">✕</button></div>
      <div className="flex-1 overflow-auto p-4 space-y-4">
        <div className="text-[11px] uppercase tracking-wide text-brand font-semibold">Identificação</div>
        <div className="grid grid-cols-2 gap-3"><L t="Nome *"><Inp value={f.nome} onChange={e=>set("nome",e.target.value)}/></L><L t="CPF *"><Inp value={f.cpf} onChange={e=>set("cpf",fmtCPF(e.target.value))} placeholder="000.000.000-00"/></L>
          <L t="Nascimento *"><Inp type="date" value={f.nascimento} onChange={e=>set("nascimento",e.target.value)}/></L><L t="E-mail *"><Inp value={f.email} onChange={e=>set("email",e.target.value)}/></L>
          <L t="Telefone"><Inp value={f.telefone} onChange={e=>set("telefone",fmtTel(e.target.value))}/></L></div>
        <div className="text-[11px] uppercase tracking-wide text-brand font-semibold pt-1">Vínculo</div>
        <div className="grid grid-cols-2 gap-3">
          <L t="Cargo *"><select value={f.vinculo.cargo} onChange={e=>escolherCargo(e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5"><option value="">Selecione o cargo</option>{[...(cargos||[])].filter(c=>c.status!=="INATIVO").sort((a,b)=>a.titulo.localeCompare(b.titulo)).map(c=><option key={c.id} value={c.titulo}>{c.titulo}</option>)}</select></L>
          <L t="Departamento * ▪"><input value={cargoSel?.departamento||f.vinculo.setor||""} readOnly disabled title="Definido pelo cargo — edite no catálogo de Cargos" className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 bg-slate-100 text-slate-500 cursor-not-allowed"/></L>
          <L t="CBO ▪"><input value={cargoSel?.cbo||f.vinculo.cbo||""} readOnly disabled title="Definido pelo cargo — edite no catálogo de Cargos" className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 bg-slate-100 text-slate-500 cursor-not-allowed"/></L>
          <L t="Unidade"><Inp value={f.vinculo.unidade} onChange={e=>setV("unidade",e.target.value)}/></L><L t="Líder direto"><Inp value={f.vinculo.lider} onChange={e=>setV("lider",e.target.value)}/></L>
          <L t="Contrato"><select value={f.vinculo.tipoContrato} onChange={e=>setV("tipoContrato",e.target.value)} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5">{CONTRATOS.map(c=><option key={c}>{c}</option>)}</select></L>
          <L t="Admissão *"><Inp type="date" value={f.vinculo.admissao} onChange={e=>setV("admissao",e.target.value)}/></L>
          <L t="Salário (R$)"><div className="relative"><Inp type={verSal?"number":"password"} value={f.vinculo.salario} onChange={e=>setV("salario",e.target.value)}/><button type="button" onClick={()=>setVerSal(v=>!v)} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><IcEye open={verSal}/></button></div></L></div>
        {cargoSel&&<div className="text-[11px] text-slate-500 bg-slate-50 rounded-md p-2.5 ring-1 ring-slate-200">Cargo do catálogo <b className="font-mono">{cargoSel.codigo}</b> · faixa {money(cargoSel.faixaMin)}–{money(cargoSel.faixaMax)}. Departamento, CBO e salário sugeridos automaticamente — ajuste se necessário.</div>}
      </div>
      <div className="p-3 border-t border-slate-200 flex justify-end gap-2 bg-slate-50"><button onClick={onClose} className="px-3 py-1.5 text-sm text-slate-500">Cancelar</button>
        <button disabled={!ok} onClick={()=>onCriar(f)} className={"px-4 py-1.5 text-sm font-medium rounded-md text-white "+(ok?"bg-brand hover:bg-navy":"bg-slate-300 cursor-not-allowed")}>Cadastrar pessoa</button></div>
    </div></div>);
}
function ConfigFirebase({mode,onClose,onConnect,iaKey,setIaKey,iaModel,setIaModel}){
  const [txt,setTxt]=useState("");
  const [k,setK]=useState(iaKey||""); const [mdl,setMdl]=useState(iaModel||"claude-sonnet-4-5");
  const go=()=>{try{const m=txt.match(/\{[\s\S]*\}/);if(!m)throw 0;const cfg=Function('"use strict";return ('+m[0]+')')();if(!cfg.projectId)throw 0;onConnect(cfg);}catch(e){alert("Config inválida. Cole o objeto firebaseConfig.");}};
  const salvarIA=()=>{ setIaKey(k.trim()); setIaModel(mdl.trim()||"claude-sonnet-4-5"); onClose(); };
  return <div className="fixed inset-0 z-50 grid place-items-center bg-navy/40 p-4 no-print" onClick={onClose}>
    <div className="bg-white rounded-lg shadow-2xl w-full max-w-md p-5 max-h-[92vh] overflow-auto" onClick={e=>e.stopPropagation()}>
      <h2 className="text-lg font-bold text-navy">Conexões</h2>
      <div className="text-[11px] uppercase tracking-wide text-brand font-semibold mt-4 mb-1">Firebase</div>
      <p className="text-sm text-slate-500">Cole o objeto <code className="font-mono text-xs bg-slate-100 px-1 rounded">firebaseConfig</code>. Todos os módulos compartilham as coleções <b>pessoas</b> e <b>eventos</b> em tempo real.</p>
      <textarea value={txt} onChange={e=>setTxt(e.target.value)} rows="5" placeholder={'{ apiKey:"...", projectId:"braskim---proj...", ... }'} className="w-full mt-2 text-xs font-mono border border-slate-300 rounded-md p-2.5 outline-none focus:ring-2 ring-brand/30"></textarea>
      <div className="flex items-center justify-between mt-2">
        <span className="text-xs text-slate-400">Modo: <b className={mode==="firebase"?"text-emerald-600":"text-amber-600"}>{mode==="firebase"?"Firebase":"Demo (memória)"}</b></span>
        <button onClick={go} className="px-3 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Conectar</button>
      </div>
      <div className="border-t border-slate-200 mt-4 pt-4">
        <div className="text-[11px] uppercase tracking-wide text-brand font-semibold mb-1">Agente IA (Claude)</div>
        <p className="text-sm text-slate-500">Cole sua chave da API Anthropic para o agente gerar descrições de cargo completas. A chave fica só na memória desta sessão (não é salva no código).</p>
        <label className="block text-[11px] uppercase tracking-wide text-slate-400 mt-2 mb-0.5">Chave de API</label>
        <input type="password" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-..." className="w-full text-sm font-mono border border-slate-300 rounded-md px-2.5 py-1.5 outline-none focus:ring-2 ring-brand/30"/>
        <label className="block text-[11px] uppercase tracking-wide text-slate-400 mt-2 mb-0.5">Modelo</label>
        <input value={mdl} onChange={e=>setMdl(e.target.value)} placeholder="claude-sonnet-4-5" className="w-full text-sm font-mono border border-slate-300 rounded-md px-2.5 py-1.5 outline-none focus:ring-2 ring-brand/30"/>
        <div className="flex items-center justify-between mt-2">
          <span className="text-xs text-slate-400">{iaKey?<span className="text-emerald-600">✓ chave configurada</span>:"sem chave — usa rascunho local"}</span>
          <button onClick={salvarIA} className="px-3 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Salvar IA</button>
        </div>
      </div>
      <div className="flex justify-end mt-4"><button onClick={onClose} className="px-3 py-1.5 text-sm text-slate-500">Fechar</button></div>
    </div></div>;
}

createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
