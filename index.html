function CargosView({cargos,setCargos,pessoas,eventos,commit,addEventos,promocoes,setPromocoes,role,busca,notify,iaKey,iaModel,departamentosMaster,competencias}){
  const [tab,setTab]=useState("cadastro");
  const [selCargo,setSelCargo]=useState(null);
  const [cmpRev,setCmpRev]=useState(null);   // {cargo, rev} para comparar
  const [editCargo,setEditCargo]=useState(null);   // {novo:true} ou cargo existente
  const [mover,setMover]=useState(null);           // {pessoa, tipo}
  const [hist,setHist]=useState(null);             // pessoa p/ histórico
  const [mostrarInativos,setMostrarInativos]=useState(true);
  const [fDep,setFDep]=useState(""),[fNivel,setFNivel]=useState("");
  const [buscaCargo,setBuscaCargo]=useState("");
  const ativos=pessoas.filter(p=>p.status!=="DESLIGADO");
  const isRH=role==="RH", podeGestor=role==="RH"||role==="Gestor";
  const cargoDe=titulo=>cargos.find(c=>c.titulo===titulo);
  const ocupantesDe=titulo=>ativos.filter(p=>p.vinculo.cargo===titulo);
  const q=busca.toLowerCase();
  const familias=[...new Set(cargos.flatMap(c=>familiasDe(c)))].filter(Boolean).sort((a,b)=>a.localeCompare(b));
  const departamentos=[...new Set([...((departamentosMaster||[]).map(d=>d.nome)),...cargos.map(c=>c.departamento).filter(Boolean)])].sort((a,b)=>a.localeCompare(b));
  // departamentos "fantasma": nome usado por cargos mas ausente do cadastro (ex.: renomeação antiga sem cascata)
  const nomesMaster=new Set((departamentosMaster||[]).map(d=>d.nome));
  const fantasmas=[...new Set(cargos.map(c=>c.departamento).filter(Boolean))].filter(nome=>!nomesMaster.has(nome));
  const [reatribuir,setReatribuir]=useState(null); // {de:nomeFantasma}
  const aplicarReatribuicao=(de,para)=>{
    if(!para){ notify("Escolha um departamento de destino."); return; }
    let n=0;
    setCargos(prev=>prev.map(c=>{ if(c.departamento===de){n++;return {...c,departamento:para};} return c; }));
    addEventos([evt("CargoAlterado",null,`Reatribuição de departamento: "${de}" → "${para}" (${n} cargo(s))`,null,"cargos")]);
    notify(`${n} cargo(s) movidos de "${de}" para "${para}"`);
    setReatribuir(null);
  };

  // ---------- cadastro de cargos ----------
  const salvarCargo=(c,novo)=>{
    if(novo){
      const nc={...cg(c)};
      if(!(nc.codigo||"").trim()) nc.codigo=proximoCodigoBKM(cargos);
      nc.revisao=1; nc.dataRevisao=hoje(); nc.proximaRevisao=addMeses(hoje(),12);
      nc.revisoes=[{rev:1,data:hoje(),autor:role,motivo:"Criação do descritivo",snapshot:snapshotCargo(nc)}];
      setCargos(prev=>[...prev,nc]);
      addEventos([evt("CargoCriado",null,`Descritivo criado: ${nc.titulo} (${fmtRev(1)})`,null,"cargos")]);
      notify("Cargo criado · Rev. 01");
    } else {
      const anterior=cargos.find(x=>x.id===c.id)||c;
      const motivo=(c._motivo||"").trim();
      const semRevisao=c._semRevisao===true;
      const {_motivo,_semRevisao,...limpo}=c;
      if(semRevisao){
        // ajuste sem versionar: mantém a revisão atual, atualiza o snapshot corrente
        const revAtual=anterior.revisao||1;
        const campos={...limpo, revisao:revAtual, dataRevisao:anterior.dataRevisao, proximaRevisao:anterior.proximaRevisao};
        const snap=snapshotCargo(campos);
        const revisoes=(anterior.revisoes||[]).map(r=>r.rev===revAtual?{...r,snapshot:snap}:r);
        const atualizado={...campos, revisoes};
        setCargos(prev=>prev.map(x=>x.id===c.id?atualizado:x));
        addEventos([evt("CargoAlterado",null,`Descritivo ajustado sem nova revisão: ${c.titulo} (mantém ${fmtRev(revAtual)})${motivo?" · "+motivo:""}`,null,"cargos")]);
        notify(`Ajuste salvo · mantém ${fmtRev(revAtual)}`);
      } else {
        const novaRev=(anterior.revisao||1)+1;
        const campos={...limpo, revisao:novaRev, dataRevisao:hoje(), proximaRevisao:addMeses(hoje(),12)};
        const snap=snapshotCargo(campos);
        const atualizado={...campos, revisoes:[...(anterior.revisoes||[]), {rev:novaRev,data:hoje(),autor:role,motivo:motivo||"—",snapshot:snap}]};
        setCargos(prev=>prev.map(x=>x.id===c.id?atualizado:x));
        addEventos([evt("CargoAlterado",null,`Descritivo revisado: ${c.titulo} → ${fmtRev(novaRev)}${motivo?" · "+motivo:""}`,null,"cargos")]);
        notify(`Descritivo salvo · ${fmtRev(novaRev)}`);
      }
    }
    setEditCargo(null); setSelCargo(null);
  };
  const toggleStatus=c=>{ setCargos(prev=>prev.map(x=>x.id===c.id?{...x,status:x.status==="ATIVO"?"INATIVO":"ATIVO"}:x)); addEventos([evt("CargoAlterado",null,`Cargo ${c.status==="ATIVO"?"desativado":"reativado"}: ${c.titulo}`,null,"cargos")]); notify(c.status==="ATIVO"?"Cargo desativado":"Cargo reativado"); };
  const excluirCargo=c=>{ if(ocupantesDe(c.titulo).length){ notify("Não é possível excluir: há colaboradores neste cargo."); return; } if(!confirm(`Excluir o cargo "${c.titulo}"?`))return; setCargos(prev=>prev.filter(x=>x.id!==c.id)); addEventos([evt("CargoAlterado",null,`Cargo excluído: ${c.titulo}`,null,"cargos")]); notify("Cargo excluído"); };
  const importarCargos=(linhas)=>{
    let criados=0,atualizados=0,erros=0;
    setCargos(prev=>{
      const lista=[...prev];
      for(const L of linhas){
        try{
          const idx=lista.findIndex(c=> (L.codigo&&(c.codigo||"").trim().toLowerCase()===L.codigo.trim().toLowerCase())
            || (!L.codigo&&(c.titulo||"").trim().toLowerCase()===L.titulo.trim().toLowerCase()) );
          const dados={ titulo:L.titulo, departamento:L.departamento, cbo:L.cbo, cargoSuperior:L.cargoSuperior,
            nivel:L.nivel, classificacao:L.classificacao, familias:L.familias, familia:L.familia,
            faixaMin:L.faixaMin, faixaMax:L.faixaMax, missao:L.missao };
          if(idx>=0){
            const ant=lista[idx];
            // só sobrescreve campos que vieram preenchidos na planilha
            const merge={...ant};
            Object.keys(dados).forEach(k=>{ const v=dados[k];
              if(k==="familias"){ if(v&&v.length){merge.familias=v;merge.familia=v[0]||ant.familia;} }
              else if(v!==""&&v!==undefined&&!(typeof v==="number"&&v===0&&(ant[k]||0)>0)){ merge[k]=v; } });
            lista[idx]=merge; atualizados++;
          } else {
            const nc=cg({...dados, codigo:L.codigo||"", status:(L.statusRaw||"").toLowerCase().startsWith("inat")?"INATIVO":"ATIVO"});
            if(!(nc.codigo||"").trim()) nc.codigo=proximoCodigoBKM(lista);
            nc.revisao=1; nc.dataRevisao=hoje(); nc.proximaRevisao=addMeses(hoje(),12);
            nc.revisoes=[{rev:1,data:hoje(),autor:role,motivo:"Importado por planilha",snapshot:snapshotCargo(nc)}];
            lista.push(nc); criados++;
          }
        }catch(e){ console.error(e); erros++; }
      }
      return lista;
    });
    addEventos([evt("CargoAlterado",null,`Importação por planilha: ${criados} criado(s), ${atualizados} atualizado(s)`,null,"cargos")]);
    return {criados,atualizados,erros};
  };

  // ---------- movimentações (promoção vertical / lateral) com workflow 2 etapas ----------
  const solicitarMov=(pessoa,cargoDestino,tipo,salarioNovo,justificativa,criteriosOk)=>{
    const pr={id:uid(),tipo,pessoaId:pessoa.id,pessoaNome:pessoa.nome,cargoOrigem:pessoa.vinculo.cargo,cargoDestino:cargoDestino.titulo,
      salarioOrigem:pessoa.vinculo.salario,salarioNovo:Number(salarioNovo),justificativa,criteriosOk,status:"PENDENTE_GESTOR",data:hoje()};
    setPromocoes(prev=>[...prev,pr]);
    const tp=tipo==="LATERAL"?"MovimentacaoSolicitada":"PromocaoSolicitada";
    commit({...pessoa},[evt(tp,pessoa.id,`${tipo==="LATERAL"?"Movimentação lateral":"Promoção"} solicitada: ${pr.cargoOrigem} → ${pr.cargoDestino}`,null,"cargos")]);
    setMover(null); setTab("movimentacoes"); notify("Solicitação registrada · aguardando aprovação do gestor");
  };
  const aprovarGestor=pr=>setPromocoes(prev=>prev.map(x=>x.id===pr.id?{...x,status:"PENDENTE_RH"}:x));
  const homologarRH=async pr=>{
    const p=pessoas.find(x=>x.id===pr.pessoaId); if(!p)return;
    const np={...p,vinculo:{...p.vinculo,cargo:pr.cargoDestino,salario:pr.salarioNovo,faixaSalarial:faixa(pr.salarioNovo),desdeCargo:hoje()}};
    const evs=[];
    if(pr.tipo==="LATERAL"){ evs.push(evt("MovimentacaoRealizada",p.id,`Movimentação lateral: ${pr.cargoOrigem} → ${pr.cargoDestino}`,null,"cargos")); }
    else { evs.push(evt("PromocaoAprovada",p.id,`Promoção homologada: ${pr.cargoOrigem} → ${pr.cargoDestino}`,null,"cargos")); }
    if(pr.cargoDestino!==pr.cargoOrigem) evs.push(evt("CargoAlterado",p.id,`Cargo: ${pr.cargoOrigem} → ${pr.cargoDestino}`,null,"cargos"));
    if(Number(pr.salarioNovo)!==Number(pr.salarioOrigem)) evs.push(evt("AlteracaoSalarial",p.id,`Salário: ${money(pr.salarioOrigem)} → ${money(pr.salarioNovo)}`,null,"cargos"));
    await commit(np,evs);
    setPromocoes(prev=>prev.map(x=>x.id===pr.id?{...x,status:"APROVADA"}:x));
    notify("Movimentação homologada · Jornada, Organograma e faixas atualizados");
  };
  const recusar=pr=>setPromocoes(prev=>prev.map(x=>x.id===pr.id?{...x,status:"RECUSADA"}:x));

  // ---------- indicadores ----------
  const ind=useMemo(()=>{
    const comCargo=ativos.map(p=>({p,c:cargoDe(p.vinculo.cargo)})).filter(x=>x.c);
    const pos={ABAIXO:0,DENTRO:0,ACIMA:0};
    comCargo.forEach(({p,c})=>{const k=posicaoNaFaixa(c,p.vinculo.salario);if(k)pos[k]++;});
    const custoFamilia={}; comCargo.forEach(({p,c})=>{custoFamilia[c.familia]=(custoFamilia[c.familia]||0)+Number(p.vinculo.salario||0);});
    const porNivel={}; comCargo.forEach(({c})=>{porNivel[c.nivel]=(porNivel[c.nivel]||0)+1;});
    const elegiveis=ativos.filter(p=>avaliarElegibilidade(p,cargos).elegivel);
    const semOcupante=cargos.filter(c=>ocupantesDe(c.titulo).length===0);
    const amplit=cargos.length?Math.round(cargos.reduce((s,c)=>s+(c.faixaMax-c.faixaMin)/c.faixaMin*100,0)/cargos.length):0;
    const folhaTotal=Object.values(custoFamilia).reduce((a,b)=>a+b,0);
    return {pos,custoFamilia,porNivel,elegiveis,semOcupante,amplit,folhaTotal,comCargo:comCargo.length};
  },[cargos,pessoas]);

  const kpi=useMemo(()=>({cargos:cargos.length,familias:familias.length,
    pctDentro:ind.comCargo?Math.round(ind.pos.DENTRO/ind.comCargo*100):0,
    pend:promocoes.filter(pr=>pr.status==="PENDENTE_GESTOR"||pr.status==="PENDENTE_RH").length}),[cargos,ind,promocoes]);

  const tabs=[["cadastro","Cadastro"],["trilhas","Trilhas"],["equidade","Equidade"],["elegibilidade","Elegibilidade"],["movimentacoes","Movimentações"],["indicadores","Indicadores"]];

  // lista filtrada do cadastro
  const {sort:sortCargo,toggle:toggleSortCargo,sortBy:sortByCargo}=useSort("codigo","asc");
  const listaCargos=(()=>{
    const filtrada=cargos.filter(c=>mostrarInativos||c.status!=="INATIVO")
      .filter(c=>!fDep||c.departamento===fDep).filter(c=>!fNivel||c.nivel===fNivel)
      .filter(c=>{const s=(buscaCargo||busca||"").toLowerCase();return !s||c.titulo.toLowerCase().includes(s)||(c.codigo||"").toLowerCase().includes(s)||(c.missao||"").toLowerCase().includes(s)||(c.cbo||"").toLowerCase().includes(s)||(c.conhecimentos||[]).join(" ").toLowerCase().includes(s);});
    return sortByCargo(filtrada,{
      codigo:c=>c.codigo||"",
      departamento:c=>c.departamento||"",
      titulo:c=>c.titulo||"",
      trilhas:c=>familiasDe(c).length,
      cbo:c=>c.cbo||"",
      cargoSuperior:c=>c.cargoSuperior||"",
      revisao:c=>c.revisao||0,
      dataRevisao:c=>c.dataRevisao||"",
      status:c=>c.status!=="INATIVO"?"Ativo":"Inativo",
    });
  })();

  return (
    <main className="flex-1 overflow-auto">
      <div className="max-w-[1800px] mx-auto px-8 py-6">
        <div className="flex items-center justify-between flex-wrap gap-3 mb-4">
          <div className="flex items-center gap-2.5"><span className="w-10 h-10 grid place-items-center rounded-xl bg-brand/10 text-brand"><IcBriefcase size={22}/></span><h1 className="text-2xl font-bold text-navy">Cargos</h1></div>
          <div className="flex items-center gap-2 flex-wrap">
            <button onClick={()=>exportarListaPDF(cargos)} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5"><IcFile/>Exportar PDF</button>
            <button onClick={()=>exportarListaExcel(cargos)} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50 flex items-center gap-1.5"><IcDownload/>Exportar Excel</button>
            {isRH&&<>
              <button onClick={()=>document.getElementById("importCargoInput")?.click()} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50">Importar Excel</button>
              <input id="importCargoInput" type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={e=>importarCargosExcel(e,importarCargos,notify,()=>{e.target.value="";})}/>
              <button onClick={()=>setEditCargo({novo:true})} className="bg-brand hover:bg-navy text-white text-sm font-medium px-4 py-2 rounded-md shadow-sm">+ Novo cargo</button>
            </>}
          </div>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <Kpi label="Cargos ativos" value={cargos.filter(c=>c.status!=="INATIVO").length}/><Kpi label="Departamentos" value={departamentos.length}/>
          <Kpi label="Dentro da faixa" value={kpi.pctDentro+"%"} accent={kpi.pctDentro>=80?"ok":kpi.pctDentro>=50?"warn":undefined}/>
          <Kpi label="Movimentações pendentes" value={kpi.pend} accent={kpi.pend?"warn":undefined}/>
        </div>
        <div className="flex gap-1 border-b border-slate-200 mb-4 overflow-x-auto">
          {tabs.map(([k,l])=><button key={k} onClick={()=>setTab(k)} className={"px-3 py-2 text-sm font-medium border-b-2 whitespace-nowrap "+(tab===k?"border-brand text-brand":"border-transparent text-slate-400 hover:text-slate-600")}>{l}{k==="movimentacoes"&&kpi.pend>0&&<span className="ml-1.5 bg-amber-100 text-amber-700 text-[10px] px-1.5 rounded-full">{kpi.pend}</span>}</button>)}
        </div>

        {/* CADASTRO (lista padrão PDF) */}
        {tab==="cadastro"&&(<div>
          {isRH&&fantasmas.length>0&&(
            <div className="mb-4 rounded-xl border border-amber-300 bg-amber-50 p-3.5">
              <div className="flex items-start gap-2.5">
                <span className="text-amber-500 text-lg leading-none mt-0.5">⚠</span>
                <div className="flex-1">
                  <div className="text-sm font-semibold text-amber-800">Departamento(s) fora do cadastro</div>
                  <div className="text-xs text-amber-700 mt-0.5">Há cargos apontando para departamentos que não existem mais na lista (provavelmente renomeados). Reatribua-os a um departamento válido para limpar a lista.</div>
                  <div className="flex flex-wrap gap-2 mt-2">
                    {fantasmas.map(nome=>(
                      <button key={nome} onClick={()=>setReatribuir({de:nome})} className="text-xs bg-white border border-amber-300 text-amber-800 rounded-full px-3 py-1 hover:bg-amber-100 font-medium">
                        {nome} <span className="text-amber-500">({cargos.filter(c=>c.departamento===nome).length})</span> · reatribuir
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}
          <div className="flex items-center gap-2.5 mb-4 flex-wrap">
            <div className="flex-1 min-w-[260px] flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 shadow-sm">

            </div>

          </div>
          <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto">
            <table className="w-full text-sm min-w-[980px]">

                <SortTh label="Cargo" col="titulo" sort={sortCargo} onSort={toggleSortCargo} className="px-4"/>

                <SortTh label="CBO" col="cbo" sort={sortCargo} onSort={toggleSortCargo}/>
                <SortTh label="Cargo Superior" col="cargoSuperior" sort={sortCargo} onSort={toggleSortCargo}/>
                <SortTh label="Revisão" col="revisao" sort={sortCargo} onSort={toggleSortCargo} align="center"/>
                <SortTh label="Data da última revisão" col="dataRevisao" sort={sortCargo} onSort={toggleSortCargo} className="whitespace-nowrap"/>
                <SortTh label="Status" col="status" sort={sortCargo} onSort={toggleSortCargo}/>
                <th className="text-center font-semibold px-4 py-2.5">Ações</th></tr></thead>
              <tbody>{listaCargos.map(c=>(
                <tr key={c.id} className="border-t border-slate-100 hover:bg-slate-50">
                  <td className="px-4 py-2 font-mono text-sm text-slate-600 whitespace-nowrap">{c.codigo||"—"}</td>
                  <td className="px-3 py-2 text-slate-600">{c.departamento||"—"}</td>
                  <td className="px-4 py-2"><button onClick={()=>setSelCargo(c)} className="font-medium text-navy hover:text-brand text-left">{c.titulo}</button></td>
                  <td className="px-3 py-2 text-center">{(()=>{const fs=familiasDe(c);return fs.length?<span title={fs.join(" · ")} className="inline-flex items-center justify-center min-w-[1.5rem] px-1.5 py-0.5 rounded-full bg-brand/10 text-brand text-xs font-semibold">{fs.length}</span>:<span className="text-slate-300 text-xs">—</span>;})()}</td>
                  <td className="px-3 py-2 text-slate-600 font-mono text-xs">{c.cbo||"—"}</td>
                  <td className="px-3 py-2 text-slate-600">{c.cargoSuperior||"—"}</td>
                  <td className="px-3 py-2 text-center"><span className="text-xs font-semibold text-slate-500">{fmtRev(c.revisao)}</span></td>
                  <td className="px-3 py-2 text-slate-500 whitespace-nowrap">{brDate(c.dataRevisao)}</td>
                  <td className="px-3 py-2"><span className={"inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ring-1 "+(c.status!=="INATIVO"?"bg-emerald-50 text-emerald-700 ring-emerald-200":"bg-slate-100 text-slate-500 ring-slate-200")}>{c.status!=="INATIVO"?"Ativo":"Inativo"}</span></td>
                  <td className="px-4 py-2"><div className="flex items-center justify-center gap-1.5">
                    <IconBtn title="Editar" tint="text-brand" onClick={()=>isRH&&setEditCargo(c)} disabled={!isRH}><IcEdit/></IconBtn>
                    <IconBtn title={c.status!=="INATIVO"?"Desativar":"Ativar"} onClick={()=>isRH&&toggleStatus(c)} disabled={!isRH}><IcPower/></IconBtn>
                    <IconBtn title="Exportar PDF" onClick={()=>exportarCargoPDF(c)}><IcFile/></IconBtn>
                    <IconBtn title="Exportar Word" filled onClick={()=>exportarCargoWord(c)}><IcDownload/></IconBtn>
                    <IconBtn title="Excluir" onClick={()=>isRH&&excluirCargo(c)} disabled={!isRH}><IcTrash/></IconBtn>
                  </div></td>
                </tr>))}
                {listaCargos.length===0&&<tr><td colSpan="10" className="px-4 py-10 text-center text-slate-400">Nenhum cargo encontrado.</td></tr>}
              </tbody>
            </table>
          </div>
          <div className="text-xs text-slate-400 mt-2">{listaCargos.length} cargo(s). Clique no título para ver a descrição completa; use os ícones para editar, ativar/desativar, exportar ou excluir.</div>
        </div>)}

        {/* TRILHAS */}
        {tab==="trilhas"&&(<div className="space-y-6">
          {familias.map(fam=>{const trilha=cargos.filter(c=>familiasDe(c).includes(fam)).sort((a,b)=>{
              const ia=nivelIdx(a.nivel),ib=nivelIdx(b.nivel);
              const na=ia<0?999:ia, nb=ib<0?999:ib;              // sem nível vai pro fim
              if(na!==nb) return na-nb;                            // 1º: senioridade
              if((a.faixaMin||0)!==(b.faixaMin||0)) return (a.faixaMin||0)-(b.faixaMin||0); // 2º: faixa salarial
              return (a.codigo||"").localeCompare(b.codigo||"",undefined,{numeric:true});    // 3º: código
            });
            return <div key={fam}><div className="text-[11px] uppercase tracking-wide text-brand font-semibold mb-2">{fam}</div>
              <div className="flex items-stretch gap-2 overflow-x-auto pb-2">
                {trilha.map((c,i)=>(<React.Fragment key={c.id}>
                  <button onClick={()=>setSelCargo(c)} className="text-left bg-white rounded-lg border border-slate-200 p-3 min-w-[200px] hover:border-brand transition">
                    <div className="text-[10px] text-slate-400">Trilha {c.nivel||"—"}{c.classificacao?" · "+c.classificacao:""} · {c.codigo}</div>
                    <div className="font-semibold text-navy text-sm leading-tight">{c.titulo}</div>
                    <div className="text-xs text-slate-500 mt-1 font-mono">{money(c.faixaMin)} – {money(c.faixaMax)}</div>
                    <div className="text-[11px] text-slate-400 mt-1.5 border-t border-slate-100 pt-1.5">Requisito p/ ingressar:<br/>{c.criterios.tempoMinMeses>0?`${c.criterios.tempoMinMeses}m no nível ant. · `:""}nota ≥ {c.criterios.notaMinAvaliacao.toFixed(1)}</div>
                    <div className="text-[11px] text-slate-400 mt-1">{ocupantesDe(c.titulo).length} pessoa(s)</div>
                  </button>
                  {i<trilha.length-1&&<div className="flex items-center text-slate-300 text-xl shrink-0">→</div>}
                </React.Fragment>))}
              </div></div>;})}
          <p className="text-xs text-slate-400">A trilha define a progressão por família e os critérios objetivos para ingressar em cada nível.</p>
        </div>)}

        {/* EQUIDADE */}
        {tab==="equidade"&&(<div className="bg-white rounded-lg border border-slate-200 overflow-hidden">
          <table className="w-full text-sm"><thead><tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
            <th className="text-left font-semibold px-4 py-2.5">Colaborador</th><th className="text-left font-semibold px-3 py-2.5 hidden sm:table-cell">Cargo</th>
            <th className="text-left font-semibold px-3 py-2.5">Faixa</th>{isRH&&<th className="text-left font-semibold px-3 py-2.5">Salário</th>}
            <th className="text-left font-semibold px-3 py-2.5">Posição</th><th className="px-3 py-2.5"></th></tr></thead>
            <tbody>{ativos.filter(p=>!q||p.nome.toLowerCase().includes(q)||p.vinculo.cargo.toLowerCase().includes(q)).map(p=>{
              const c=cargoDe(p.vinculo.cargo),pos=posicaoNaFaixa(c,p.vinculo.salario);
              const posCls=pos==="DENTRO"?"text-emerald-700 bg-emerald-50 ring-emerald-200":pos==="ABAIXO"?"text-amber-700 bg-amber-50 ring-amber-200":pos==="ACIMA"?"text-violet-700 bg-violet-50 ring-violet-200":"text-slate-400 bg-slate-50 ring-slate-200";
              return <tr key={p.id} onClick={()=>setHist(p)} className="border-t border-slate-100 hover:bg-slate-50 cursor-pointer">
                <td className="px-4 py-2.5"><div className="flex items-center gap-2.5"><Avatar nome={p.nome} status={p.status}/><div className="font-medium text-navy">{p.nome}</div></div></td>
                <td className="px-3 py-2.5 text-slate-600 hidden sm:table-cell">{p.vinculo.cargo}</td>
                <td className="px-3 py-2.5 text-slate-500 font-mono text-xs">{c?`${money(c.faixaMin)} – ${money(c.faixaMax)}`:"fora do catálogo"}</td>
                {isRH&&<td className="px-3 py-2.5 text-slate-700 font-mono text-xs">{money(p.vinculo.salario)}</td>}
                <td className="px-3 py-2.5">{pos?<span className={"text-xs px-2 py-0.5 rounded-full ring-1 "+posCls}>{pos==="DENTRO"?"Na faixa":pos==="ABAIXO"?"Abaixo":"Acima"}{isRH&&compaRatio(c,p.vinculo.salario)?` · ${compaRatio(c,p.vinculo.salario).toFixed(2)}`:""}</span>:<span className="text-xs text-slate-400">—</span>}</td>
                <td className="px-3 py-2.5 text-right text-slate-300">histórico ›</td>
              </tr>;})}</tbody></table>
          <div className="px-4 py-2 text-[11px] text-slate-400 border-t border-slate-100">Compa-ratio = salário ÷ ponto médio. Clique numa linha para ver o histórico salarial (derivado dos eventos). {!isRH&&"Salários visíveis só para RH."}</div>
        </div>)}

        {/* ELEGIBILIDADE */}
        {tab==="elegibilidade"&&(<div className="space-y-3">
          <p className="text-sm text-slate-500">Critérios objetivos avaliados automaticamente para o próximo nível da trilha de cada pessoa.</p>
          {ativos.filter(p=>!q||p.nome.toLowerCase().includes(q)).map(p=>{const el=avaliarElegibilidade(p,cargos);
            return <div key={p.id} className="bg-white rounded-lg border border-slate-200 p-4">
              <div className="flex items-center gap-3 flex-wrap">
                <Avatar nome={p.nome} status={p.status}/>
                <div className="flex-1 min-w-0"><div className="font-semibold text-navy">{p.nome}</div>
                  <div className="text-sm text-slate-500">{p.vinculo.cargo}{el.prox?<> <span className="text-slate-300">→</span> {el.prox.titulo}</>:<span className="text-slate-400"> · topo da trilha</span>}</div></div>
                {el.prox&&(el.elegivel?<span className="text-xs px-2 py-1 rounded-full ring-1 bg-emerald-50 text-emerald-700 ring-emerald-200 font-medium">Elegível</span>
                  :<span className="text-xs px-2 py-1 rounded-full ring-1 bg-slate-100 text-slate-500 ring-slate-200">Não elegível</span>)}
                {el.prox&&podeGestor&&<button onClick={()=>setMover({pessoa:p,tipo:"PROMOCAO"})} className={"text-sm px-3 py-1.5 rounded-md font-medium "+(el.elegivel?"bg-brand hover:bg-navy text-white":"border border-slate-300 text-slate-500")}>{el.elegivel?"Promover":"Promover c/ exceção"}</button>}
              </div>
              {el.prox&&<div className="grid sm:grid-cols-3 gap-2 mt-3">
                {el.checks.map((ch,i)=><div key={i} className={"text-xs rounded-md p-2 ring-1 "+(ch.ok?"bg-emerald-50 ring-emerald-100":"bg-amber-50 ring-amber-100")}>
                  <div className="flex items-center gap-1 font-medium text-slate-600">{ch.ok?"✓":"○"} {ch.label}</div>
                  <div className={ch.ok?"text-emerald-600":"text-amber-600"}>{ch.atual}</div></div>)}
              </div>}
              {p.status==="AFASTADO"&&<div className="text-[11px] text-amber-600 mt-2">⚠ Colaborador afastado — promoção sujeita a política de retorno.</div>}
            </div>;})}
        </div>)}

        {/* MOVIMENTAÇÕES */}
        {tab==="movimentacoes"&&(<div className="space-y-3">
          <div className="flex items-center justify-between"><p className="text-sm text-slate-500">Workflow em 2 etapas: aprovação do gestor → homologação do RH.</p>
            {podeGestor&&<button onClick={()=>setMover({pessoa:ativos[0],tipo:"LATERAL"})} className="text-sm text-brand hover:underline">+ Movimentação lateral</button>}</div>
          {promocoes.length===0&&<div className="bg-white rounded-lg border border-slate-200 p-8 text-center text-slate-400 text-sm">Nenhuma movimentação. Use a aba <b>Elegibilidade</b> para promover, ou registre uma movimentação lateral.</div>}
          {[...promocoes].reverse().map(pr=>{const delta=pr.salarioNovo-pr.salarioOrigem,pct=pr.salarioOrigem?Math.round(delta/pr.salarioOrigem*100):0;
            const stMap={PENDENTE_GESTOR:["Aguarda gestor","bg-amber-50 text-amber-700 ring-amber-200"],PENDENTE_RH:["Aguarda RH","bg-sky-50 text-sky-700 ring-sky-200"],APROVADA:["Homologada","bg-emerald-50 text-emerald-700 ring-emerald-200"],RECUSADA:["Recusada","bg-slate-100 text-slate-500 ring-slate-200"]};
            const [stLabel,stCls]=stMap[pr.status];
            return <div key={pr.id} className="bg-white rounded-lg border border-slate-200 p-4">
              <div className="flex items-start justify-between gap-3 flex-wrap">
                <div><div className="flex items-center gap-2"><span className="font-semibold text-navy">{pr.pessoaNome}</span><span className="text-[10px] uppercase tracking-wide px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">{pr.tipo==="LATERAL"?"Lateral":"Promoção"}</span></div>
                  <div className="text-sm text-slate-500">{pr.cargoOrigem} <span className="text-slate-300">→</span> <b className="text-navy">{pr.cargoDestino}</b></div></div>
                <span className={"text-xs px-2 py-0.5 rounded-full ring-1 h-fit "+stCls}>{stLabel}</span>
              </div>
              {isRH&&<div className="grid grid-cols-3 gap-3 mt-3">
                <Info l="Salário">{money(pr.salarioOrigem)} → {money(pr.salarioNovo)}</Info>
                <Info l="Impacto mensal"><span className={delta>=0?"text-emerald-600":"text-red-600"}>{delta>=0?"+":""}{money(delta)}</span></Info>
                <Info l="Impacto anual (13º)"><span className={delta>=0?"text-emerald-600":"text-red-600"}>{delta>=0?"+":""}{money(delta*13)}</span> · {pct}%</Info></div>}
              {pr.criteriosOk===false&&<div className="text-xs text-amber-600 mt-2">⚠ Promoção por exceção — critérios objetivos não integralmente atendidos.</div>}
              {pr.justificativa&&<div className="text-sm text-slate-500 mt-2"><span className="text-[11px] uppercase text-slate-400">Justificativa: </span>{pr.justificativa}</div>}
              <div className="flex items-center gap-2 mt-3">
                {/* trilha do workflow */}
                <div className="flex items-center gap-1 text-[11px] text-slate-400">
                  <span className={pr.status!=="RECUSADA"?"text-brand font-medium":""}>Solicitado</span><span>›</span>
                  <span className={["PENDENTE_RH","APROVADA"].includes(pr.status)?"text-brand font-medium":""}>Gestor</span><span>›</span>
                  <span className={pr.status==="APROVADA"?"text-brand font-medium":""}>RH</span>
                </div>
                <div className="ml-auto flex gap-2">
                  {pr.status==="PENDENTE_GESTOR"&&podeGestor&&<><button onClick={()=>recusar(pr)} className="px-3 py-1.5 text-sm text-slate-500">Recusar</button><button onClick={()=>aprovarGestor(pr)} className="px-4 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Aprovar (gestor)</button></>}
                  {pr.status==="PENDENTE_RH"&&(isRH?<><button onClick={()=>recusar(pr)} className="px-3 py-1.5 text-sm text-slate-500">Recusar</button><button onClick={()=>homologarRH(pr)} className="px-4 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Homologar (RH)</button></>:<span className="text-xs text-slate-400">Aguardando homologação do RH</span>)}
                  {pr.status==="PENDENTE_GESTOR"&&!podeGestor&&<span className="text-xs text-slate-400">Aguardando aprovação do gestor</span>}
                </div>
              </div>
            </div>;})}
        </div>)}

        {/* INDICADORES */}
        {tab==="indicadores"&&(<div className="space-y-5">
          <div className="grid md:grid-cols-2 gap-4">
            <div className="bg-white rounded-lg border border-slate-200 p-4">
              <div className="text-sm font-semibold text-navy mb-3">Posição salarial vs faixa</div>
              {[["DENTRO","Na faixa","bg-emerald-500"],["ABAIXO","Abaixo da faixa","bg-amber-500"],["ACIMA","Acima da faixa","bg-violet-500"]].map(([k,l,c])=>{
                const v=ind.pos[k],pct=ind.comCargo?Math.round(v/ind.comCargo*100):0;
                return <div key={k} className="mb-2"><div className="flex justify-between text-xs text-slate-500 mb-0.5"><span>{l}</span><span>{v} ({pct}%)</span></div>
                  <div className="h-2 bg-slate-100 rounded-full overflow-hidden"><div className={"h-full "+c} style={{width:pct+"%"}}></div></div></div>;})}
            </div>
            <div className="bg-white rounded-lg border border-slate-200 p-4">
              <div className="text-sm font-semibold text-navy mb-3">Headcount por nível</div>
              {Object.keys(ind.porNivel).length?Object.keys(ind.porNivel).filter(n=>ind.porNivel[n]).sort((a,b)=>nivelIdx(a)-nivelIdx(b)).map(n=>(
                <div key={n} className="flex items-center gap-2 mb-1.5"><span className="text-xs text-slate-400 w-8">Nv {n}</span>
                  <div className="flex-1 h-4 bg-slate-100 rounded overflow-hidden"><div className="h-full bg-brand/70" style={{width:(ind.porNivel[n]/ind.comCargo*100)+"%"}}></div></div>
                  <span className="text-xs text-slate-500 w-6 text-right">{ind.porNivel[n]}</span></div>)):<div className="text-sm text-slate-400">—</div>}
              <div className="text-[11px] text-slate-400 mt-2">Amplitude média das faixas: {ind.amplit}%</div>
            </div>
          </div>
          {isRH&&<div className="bg-white rounded-lg border border-slate-200 p-4">
            <div className="text-sm font-semibold text-navy mb-3">Custo de folha por família <span className="text-xs font-normal text-slate-400">(salários — visível ao RH)</span></div>
            {Object.entries(ind.custoFamilia).sort((a,b)=>b[1]-a[1]).map(([fam,v])=>(
              <div key={fam} className="flex items-center gap-2 mb-1.5"><span className="text-xs text-slate-500 w-44 truncate">{fam}</span>
                <div className="flex-1 h-4 bg-slate-100 rounded overflow-hidden"><div className="h-full bg-navy/70" style={{width:(v/ind.folhaTotal*100)+"%"}}></div></div>
                <span className="text-xs text-slate-600 font-mono w-24 text-right">{money(v)}</span></div>))}
            <div className="text-[11px] text-slate-400 mt-2 border-t border-slate-100 pt-2">Folha mensal total (ativos c/ cargo): <b className="text-navy">{money(ind.folhaTotal)}</b></div>
          </div>}
          {/* Alertas + IA */}
          <div className="grid md:grid-cols-2 gap-4">
            <div className="bg-white rounded-lg border border-slate-200 p-4">
              <div className="text-sm font-semibold text-navy mb-2">Alertas</div>
              <ul className="space-y-1.5 text-sm">
                {ind.pos.ABAIXO>0&&<li className="flex gap-2 text-amber-700"><span>⚠</span>{ind.pos.ABAIXO} colaborador(es) abaixo da faixa do cargo.</li>}
                {ind.pos.ACIMA>0&&<li className="flex gap-2 text-violet-700"><span>⚠</span>{ind.pos.ACIMA} colaborador(es) acima da faixa.</li>}
                {ind.elegiveis.length>0&&<li className="flex gap-2 text-emerald-700"><span>◆</span>{ind.elegiveis.length} pessoa(s) elegível(is) a promoção.</li>}
                {ind.semOcupante.length>0&&<li className="flex gap-2 text-slate-500"><span>○</span>{ind.semOcupante.length} cargo(s) sem ocupante.</li>}
                {ind.pos.ABAIXO===0&&ind.pos.ACIMA===0&&ind.elegiveis.length===0&&<li className="text-slate-400">Sem alertas no momento.</li>}
              </ul>
            </div>
            <div className="bg-white rounded-lg border border-slate-200 p-4">
              <div className="text-sm font-semibold text-navy mb-2">Sugestões (IA) <span className="text-[10px] font-normal text-slate-400 uppercase">assistivo</span></div>
              <ul className="space-y-1.5 text-sm text-slate-600">
                {ind.elegiveis.slice(0,3).map(p=><li key={p.id} className="flex gap-2"><span className="text-brand">→</span>Avaliar promoção de <b>{p.nome}</b> — critérios atendidos para {proximoCargo(cargos,p.vinculo.cargo)?.titulo}.</li>)}
                {ativos.map(p=>({p,c:cargoDe(p.vinculo.cargo)})).filter(x=>x.c&&posicaoNaFaixa(x.c,x.p.vinculo.salario)==="ABAIXO").slice(0,2).map(({p})=><li key={p.id} className="flex gap-2"><span className="text-brand">→</span>Revisar salário de <b>{p.nome}</b> — abaixo da faixa do cargo.</li>)}
                {ind.elegiveis.length===0&&<li className="text-slate-400">Sem sugestões no momento.</li>}
              </ul>
            </div>
          </div>
        </div>)}
      </div>

      {selCargo&&<CargoDrawer cargo={cargos.find(x=>x.id===selCargo.id)||selCargo} cargos={cargos} ocupantes={ocupantesDe(selCargo.titulo)} isRH={isRH} onEdit={()=>setEditCargo(selCargo)} onVerRevisao={r=>setCmpRev({cargo:cargos.find(x=>x.id===selCargo.id)||selCargo,rev:r})} onClose={()=>setSelCargo(null)}/>}
      {cmpRev&&<RevisaoCompare cargo={cmpRev.cargo} revInicial={cmpRev.rev} onClose={()=>setCmpRev(null)}/>}
      {editCargo&&<CargoForm cargo={editCargo} cargos={cargos} familias={familias} departamentos={departamentos} competencias={competencias} onClose={()=>setEditCargo(null)} onSave={salvarCargo} notify={notify} iaKey={iaKey} iaModel={iaModel}/>}
      {reatribuir&&(
        <div className="fixed inset-0 z-50 grid place-items-center bg-navy/40 p-4" onClick={()=>setReatribuir(null)}>
          <div className="bg-white rounded-lg shadow-2xl w-full max-w-md" onClick={e=>e.stopPropagation()}>
            <div className="p-4 border-b border-slate-200"><div className="font-bold text-navy">Reatribuir departamento</div>
              <div className="text-xs text-slate-500 mt-0.5">{cargos.filter(c=>c.departamento===reatribuir.de).length} cargo(s) apontam para <b>"{reatribuir.de}"</b>, que não está no cadastro.</div></div>
            <div className="p-4 space-y-2">
              <div className="text-[11px] uppercase tracking-wide text-slate-400">Mover esses cargos para</div>
              <select value={reatribuir.para||""} onChange={e=>setReatribuir(r=>({...r,para:e.target.value}))} className="w-full text-sm border border-slate-300 rounded-md px-2.5 py-2 outline-none focus:ring-2 ring-brand/30">
                <option value="">Selecione um departamento</option>
                {(departamentosMaster||[]).map(d=>d.nome).filter(Boolean).sort((a,b)=>a.localeCompare(b)).map(n=><option key={n} value={n}>{n}</option>)}
              </select>
            </div>
            <div className="p-3 border-t border-slate-200 flex justify-end gap-2 bg-slate-50">
              <button onClick={()=>setReatribuir(null)} className="px-3 py-1.5 text-sm text-slate-500">Cancelar</button>
              <button disabled={!reatribuir.para} onClick={()=>aplicarReatribuicao(reatribuir.de,reatribuir.para)} className={"px-4 py-1.5 text-sm font-medium rounded-md text-white "+(reatribuir.para?"bg-brand hover:bg-navy":"bg-slate-300 cursor-not-allowed")}>Reatribuir</button>
            </div>
          </div>
        </div>

 ["titulo","Título","text"],["departamento","Departamento","text"],["cargoSuperior","Cargo superior","text"],
 ["cbo","CBO","text"],["nivel","Nível da Trilha","text"],["classificacao","Nível do Cargo","text"],["familia","Família (trilha)","text"],
 ["escolaridadeMinima","Escolaridade mínima","text"],["tempoExperiencia","Tempo de experiência","text"],

 ["relacionamentoCliente","Relacionamento c/ cliente","text"],
 ["supervisionaPessoas","Supervisiona pessoas","bool"],["cuidaBensMateriais","Cuida de bens materiais","bool"],
 ["lidaValoresFinanceiros","Lida com valores financeiros","bool"],["acessaInfoConfidenciais","Acessa informações confidenciais","bool"],
 ["missao","Missão","text"],["desafios","Desafios","text"],["recursosFerramentas","Recursos e ferramentas","text"],
 ["responsabilidades","Responsabilidades","list"],["conhecimentos","Conhecimentos (saber)","list"],
 ["habilidades","Habilidades (saber fazer)","list"],["atitudes","Atitudes (querer fazer)","list"],
 ["metas","Metas","list"],["indicadores","Indicadores","list"],["treinamentos","Treinamentos","list"],
 ["cargosAnteriores","Cargos anteriores","list"],["proximosPassos","Próximos passos","list"],
];
const FREQ_ATIV=[["diarias","Ativ. diárias"],["semanais","Ativ. semanais"],["quinzenais","Ativ. quinzenais"],["mensais","Ativ. mensais"],["esporadicas","Ativ. esporádicas"],["anuais","Ativ. anuais"]];
const valTxt=(tipo,v)=>tipo==="money"?money(v||0):tipo==="bool"?(v?"Sim":"Não"):(v==null||v===""?"—":String(v));
function ListaCell({items,base,modo}){ // modo: 'antes' marca removidos, 'depois' marca adicionados
  const set=new Set(base||[]);
  if(!items||!items.length)return <span className="text-slate-300">—</span>;
  return <div className="flex flex-wrap gap-1">{items.map((it,i)=>{
    const igual=set.has(it);
    const cls=igual?"bg-slate-100 text-slate-500":modo==="antes"?"bg-red-50 text-red-600 line-through":"bg-emerald-50 text-emerald-700";
    return <span key={i} className={"text-[11px] px-1.5 py-0.5 rounded "+cls}>{it}</span>;})}</div>;
}
function RevisaoCompare({cargo,revInicial,onClose}){
  const revs=[...(cargo.revisoes||[])].sort((a,b)=>a.rev-b.rev);
  const [antesRev,setAntesRev]=useState(revInicial?revInicial.rev:(revs[0]?.rev||1));
  const [soMud,setSoMud]=useState(true);
  const antesEntry=revs.find(r=>r.rev===antesRev)||revs[0]||{};
  const antes=antesEntry.snapshot||{};
  const depois=snapshotCargo(cargo);
  const linhas=[];
  CAMPOS_DESC.forEach(([k,label,tipo])=>{
    const a=antes[k], b=depois[k];
    if(tipo==="list"){ const la=a||[],lb=b||[]; const changed=JSON.stringify(la)!==JSON.stringify(lb);
      linhas.push({label,tipo,changed,a:la,b:lb}); }
    else { const changed=String(a==null?"":a)!==String(b==null?"":b); linhas.push({label,tipo,changed,a,b}); }
  });
  FREQ_ATIV.forEach(([k,label])=>{ const la=(antes.atividades||{})[k]||[], lb=(depois.atividades||{})[k]||[];
    linhas.push({label,tipo:"list",changed:JSON.stringify(la)!==JSON.stringify(lb),a:la,b:lb}); });
  const visiveis=soMud?linhas.filter(l=>l.changed):linhas;
  const nMud=linhas.filter(l=>l.changed).length;
  return <div className="fixed inset-0 z-[60] grid place-items-center bg-navy/40 p-4" onClick={onClose}>
    <div className="bg-white rounded-lg shadow-2xl w-full max-w-4xl max-h-[92vh] flex flex-col" onClick={e=>e.stopPropagation()}>
      <div className="p-4 border-b border-slate-200 flex items-center justify-between">
        <div><h2 className="text-lg font-bold text-navy">Revisões — {cargo.titulo}</h2>
          <p className="text-sm text-slate-500">Comparando com a versão atual ({fmtRev(cargo.revisao)} · {brDate(cargo.dataRevisao)})</p></div>
        <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl">✕</button>
      </div>
      <div className="px-4 py-2.5 border-b border-slate-200 bg-slate-50 flex items-center gap-3 flex-wrap text-sm">
        <label className="flex items-center gap-2">Ver versão:
          <select value={antesRev} onChange={e=>setAntesRev(Number(e.target.value))} className="border border-slate-300 rounded-md px-2 py-1 bg-white">
            {revs.map(r=><option key={r.rev} value={r.rev}>{fmtRev(r.rev)} · {brDate(r.data)}</option>)}
          </select></label>
        <span className="text-slate-400">→ comparada com Atual ({fmtRev(cargo.revisao)})</span>
        <label className="ml-auto flex items-center gap-2 text-slate-600"><input type="checkbox" checked={soMud} onChange={e=>setSoMud(e.target.checked)} className="accent-brand"/>Somente alterações</label>
      </div>
      <div className="px-4 py-2 flex items-center gap-4 text-[11px] text-slate-500 border-b border-slate-100">
        <span>{nMud} campo(s) alterado(s) entre {fmtRev(antesRev)} e a atual</span>
        <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-emerald-100 inline-block"></span>adicionado</span>
        <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded bg-red-100 inline-block"></span>removido</span>
      </div>
      <div className="flex-1 overflow-auto">
        <table className="w-full text-sm">
          <thead><tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide sticky top-0">
            <th className="text-left font-semibold px-4 py-2 w-48">Campo</th>
            <th className="text-left font-semibold px-3 py-2">{fmtRev(antesRev)}</th>
            <th className="text-left font-semibold px-3 py-2">Atual ({fmtRev(cargo.revisao)})</th></tr></thead>
          <tbody>{visiveis.map((l,i)=>(
            <tr key={i} className={"border-t border-slate-100 "+(l.changed?"bg-amber-50/40":"")}>
              <td className="px-4 py-2 text-slate-500 align-top">{l.label}{l.changed&&<span className="ml-1 text-amber-600">•</span>}</td>
              <td className="px-3 py-2 align-top">{l.tipo==="list"?<ListaCell items={l.a} base={l.b} modo="antes"/>:<span className={l.changed?"text-red-600":"text-slate-600"}>{valTxt(l.tipo,l.a)}</span>}</td>
              <td className="px-3 py-2 align-top">{l.tipo==="list"?<ListaCell items={l.b} base={l.a} modo="depois"/>:<span className={l.changed?"text-emerald-700 font-medium":"text-slate-600"}>{valTxt(l.tipo,l.b)}</span>}</td>
            </tr>))}
            {visiveis.length===0&&<tr><td colSpan="3" className="px-4 py-8 text-center text-slate-400">Nenhuma alteração entre esta revisão e a atual.</td></tr>}
          </tbody>
        </table>
      </div>
      <div className="p-3 border-t border-slate-200 flex justify-end bg-slate-50"><button onClick={onClose} className="px-4 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md">Fechar</button></div>
    </div>
  </div>;
}

    {nome:"Segurança do Trabalho (SESMT)",descricao:"Responsável pela saúde e segurança ocupacional, prevenção de acidentes e conformidade com as normas regulamentadoras."},
    {nome:"Compras / Suprimentos",descricao:"Conduz a aquisição de materiais e serviços com o melhor custo, prazo e qualidade, e a gestão de fornecedores."},
    {nome:"Tecnologia da Informação",descricao:"Sustenta os sistemas, a infraestrutura e a segurança da informação que suportam a operação da empresa."},
    {nome:"Meio Ambiente",descricao:"Garante a conformidade ambiental, a gestão de resíduos e as licenças, promovendo a sustentabilidade da operação."},
    {nome:"Controladoria",descricao:"Responde pelo controle orçamentário, custos, contabilidade gerencial e apoio à tomada de decisão."},
    {nome:"Jurídico",descricao:"Assegura conformidade legal, contratos e a defesa dos interesses da empresa."},
    {nome:"Assuntos Regulatórios",descricao:"Cuida do registro de produtos e da conformidade com órgãos reguladores (ANVISA, Exército, etc.)."},
  ].filter(s=>!existentes.includes(s.nome.toLowerCase()));

  const abrirSugestoes=async()=>{
    setSugOpen(true); setSugestoes([]); setSelSug({});
    if(!iaKey){ setSugestoes(SUG_LOCAIS); return; }
    setSugerindo(true);
    try{
      const prompt=`Você é um especialista em estrutura organizacional de uma indústria brasileira de produtos de limpeza e especialidades químicas (Braskim). A empresa já possui os departamentos: ${departamentos.map(d=>d.nome).join(", ")}.
Sugira de 5 a 8 departamentos ADICIONAIS e relevantes que ainda NÃO existem nessa lista, típicos de uma indústria desse porte.
Responda SOMENTE com um array JSON válido (sem markdown, sem texto fora do JSON), no formato: [{"nome": string, "descricao": string}]. Descrições curtas (1 frase), em português do Brasil.`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"content-type":"application/json","x-api-key":iaKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:iaModel||"claude-sonnet-4-5",max_tokens:1200,messages:[{role:"user",content:prompt}]})});
      if(!res.ok){ const e=await res.text(); throw new Error(res.status+" — "+e.slice(0,120)); }
      const data=await res.json();
      const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const arr=JSON.parse(txt.replace(/```json|```/g,"").trim());
      const nova=(Array.isArray(arr)?arr:[]).filter(s=>s&&s.nome&&!existentes.includes(String(s.nome).toLowerCase()));
      setSugestoes(nova.length?nova:SUG_LOCAIS);
      if(!nova.length) notify("O agente não trouxe novidades — mostrando sugestões locais.");
    }catch(err){ console.error(err); notify("Falha no agente: "+String(err.message||err).slice(0,80)+" — usando sugestões locais."); setSugestoes(SUG_LOCAIS); }
    finally{ setSugerindo(false); }
  };
  const adicionarSelecionados=()=>{
    const escolhidos=sugestoes.filter((s,i)=>selSug[i]);
    if(!escolhidos.length){ notify("Selecione ao menos um departamento."); return; }
    const novos=escolhidos.map(s=>({id:uid(),criadoEm:hoje(),nome:String(s.nome).trim(),superior:""}));
    setDepartamentos(p=>[...p,...novos]);
    addEventos&&addEventos([evt("DepartamentoCriado",null,`${novos.length} departamento(s) criados via agente: ${novos.map(n=>n.nome).join(", ")}`,null,"departamentos")]);
    notify(`${novos.length} departamento(s) adicionado(s)`); setSugOpen(false);
  };

  const salvar=(d,novo)=>{
    if(novo){ const nd={id:uid(),criadoEm:hoje(),nome:(d.nome||"").trim(),superior:d.superior||""}; setDepartamentos(p=>[...p,nd]); addEventos&&addEventos([evt("DepartamentoCriado",null,`Departamento criado: ${nd.nome}`,null,"departamentos")]); notify("Departamento criado"); }
    else {
      const anterior=departamentos.find(x=>x.id===d.id);
      const nomeAntigo=(anterior?.nome||"").trim();
      const nomeNovo=(d.nome||"").trim();
      const renomeou=nomeAntigo&&nomeNovo&&nomeAntigo!==nomeNovo;
      setDepartamentos(p=>p.map(x=>x.id===d.id?{...x,nome:nomeNovo,superior:d.superior||""}:x));
      if(renomeou){
        // cascata: atualiza cargos e o "superior" de outros departamentos que apontavam para o nome antigo
        let nCargosAfetados=0;
        setCargos&&setCargos(prev=>prev.map(c=>{ if(c.departamento===nomeAntigo){nCargosAfetados++;return {...c,departamento:nomeNovo};} return c; }));
        setDepartamentos(prev=>prev.map(x=>x.superior===nomeAntigo?{...x,superior:nomeNovo}:x));
        // colaboradores cujo setor herdava o nome antigo
        if(commit&&pessoas){ pessoas.filter(p=>p.vinculo?.setor===nomeAntigo).forEach(p=>{ commit({...p,vinculo:{...p.vinculo,setor:nomeNovo}}); }); }
        addEventos&&addEventos([evt("DepartamentoAlterado",null,`Departamento renomeado: "${nomeAntigo}" → "${nomeNovo}"`,null,"departamentos")]);
        notify(`Departamento renomeado · cargos e vínculos atualizados`);
      } else {
        addEventos&&addEventos([evt("DepartamentoAlterado",null,`Departamento alterado: ${nomeNovo}`,null,"departamentos")]); notify("Departamento atualizado");
      }
    }
    setEdit(null);
  };
  const excluir=d=>{ const usados=nCargos(d.nome);
    if(usados){ notify(`Não é possível excluir: ${usados} cargo(s) usam "${d.nome}".`); return; }
    if(!window.confirm(`Excluir o departamento "${d.nome}"?`))return;
    setDepartamentos(p=>p.filter(x=>x.id!==d.id)); addEventos&&addEventos([evt("DepartamentoExcluido",null,`Departamento excluído: ${d.nome}`,null,"departamentos")]); notify("Departamento excluído");
  };
  return (
    <main className="flex-1 overflow-auto">
      <div className="max-w-[1800px] mx-auto px-8 py-6">
        <div className="flex items-center justify-between flex-wrap gap-3 mb-4">
          <div className="flex items-center gap-2.5"><span className="w-10 h-10 grid place-items-center rounded-xl bg-brand/10 text-brand"><IcBuilding size={22}/></span><h1 className="text-2xl font-bold text-navy">Departamentos</h1></div>
          {isRH&&<div className="flex items-center gap-2">
            <button onClick={abrirSugestoes} className="text-sm px-3 py-2 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50">🤖 Gerar Sugestões com Agente</button>
            <button onClick={()=>setEdit({novo:true})} className="bg-brand hover:bg-navy text-white text-sm font-medium px-4 py-2 rounded-md shadow-sm">+ Novo Departamento</button>
          </div>}
        </div>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
          <Kpi label="Departamentos" value={departamentos.length}/>
          <Kpi label="Cargos vinculados" value={cargos.length}/>
          <Kpi label="Sem cargos" value={departamentos.filter(d=>nCargos(d.nome)===0).length} accent={departamentos.filter(d=>nCargos(d.nome)===0).length?"warn":undefined}/>
        </div>
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-x-auto">
          <table className="w-full text-sm min-w-[560px]">
            <thead><tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
              <th className="text-left font-semibold px-4 py-2.5">Departamento</th>
              <th className="text-left font-semibold px-3 py-2.5">Superior</th>
              <th className="text-center font-semibold px-4 py-2.5">Ações</th></tr></thead>
            <tbody>{lista.map(d=>(
              <tr key={d.id}
                draggable={podeArrastar}
                onDragStart={e=>{setDragId(d.id);e.dataTransfer.effectAllowed="move";}}
                onDragOver={e=>{if(podeArrastar&&dragId){e.preventDefault();setOverId(d.id);}}}
                onDragLeave={()=>setOverId(o=>o===d.id?null:o)}
                onDrop={e=>{if(podeArrastar&&dragId){e.preventDefault();moverDepto(dragId,d.id);}setDragId(null);setOverId(null);}}
                onDragEnd={()=>{setDragId(null);setOverId(null);}}
                className={"border-t "+(overId===d.id&&dragId!==d.id?"border-t-2 border-brand bg-brand/5":"border-slate-100 hover:bg-slate-50")+(dragId===d.id?" opacity-40":"")}>
                <td className="px-4 py-3"><div className="flex items-center gap-2">
                  {podeArrastar&&<span className="text-slate-300 hover:text-slate-500 cursor-grab active:cursor-grabbing shrink-0" title="Arraste para reordenar"><IcGrip/></span>}
                  <div><div className="font-medium text-navy">{d.nome}</div><div className="text-[11px] text-slate-400 mt-0.5">{nCargos(d.nome)} cargo(s)</div></div></div></td>
                <td className="px-3 py-3 text-slate-600">{d.superior||<span className="text-slate-400">— (topo)</span>}</td>
                <td className="px-4 py-3"><div className="flex items-center justify-center gap-1.5">
                  <IconBtn title="Editar" tint="text-brand" onClick={()=>isRH&&setEdit(d)} disabled={!isRH}><IcEdit/></IconBtn>
                  <IconBtn title="Excluir" onClick={()=>isRH&&excluir(d)} disabled={!isRH}><IcTrash/></IconBtn>
                </div></td>
              </tr>))}
              {lista.length===0&&<tr><td colSpan="3" className="px-4 py-10 text-center text-slate-400">Nenhum departamento encontrado.</td></tr>}
            </tbody>
          </table>
        </div>
        <div className="text-xs text-slate-400 mt-2">{lista.length} departamento(s). O campo <b>Superior</b> define a hierarquia que monta o Organograma. O campo Departamento no cadastro de Cargos escolhe desta lista.</div>
      </div>
      {edit&&<DepartamentoForm dep={edit} departamentos={departamentos} onClose={()=>setEdit(null)} onSave={salvar}/>}
      {sugOpen&&<div className="fixed inset-0 z-50 grid place-items-center bg-navy/40 p-4" onClick={()=>setSugOpen(false)}>
        <div className="bg-white rounded-lg shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col" onClick={e=>e.stopPropagation()}>
          <div className="p-4 border-b border-slate-200 flex items-center justify-between">
            <div><h2 className="text-lg font-bold text-navy">🤖 Sugestões de Departamentos</h2>
              <p className="text-sm text-slate-500">{iaKey?"Geradas pelo agente com base nos departamentos atuais.":"Sem chave de IA — sugestões locais. Configure em Conexões → Agente IA."}</p></div>
            <button onClick={()=>setSugOpen(false)} className="text-slate-400 hover:text-slate-600 text-xl">✕</button>
          </div>
          <div className="flex-1 overflow-auto p-4">
            {sugerindo?<div className="flex items-center gap-3 text-slate-500 text-sm py-8 justify-center"><span className="w-5 h-5 border-2 border-slate-300 border-t-brand rounded-full animate-spin"></span>Gerando sugestões…</div>
              :sugestoes.length===0?<div className="text-center text-slate-400 text-sm py-8">Nenhuma sugestão nova — parece que sua estrutura já está completa.</div>
              :<div className="space-y-2">{sugestoes.map((s,i)=>(
                <label key={i} className={"flex items-start gap-3 p-3 rounded-lg border cursor-pointer "+(selSug[i]?"border-brand bg-brand/5":"border-slate-200 hover:border-slate-300")}>
                  <input type="checkbox" checked={!!selSug[i]} onChange={e=>setSelSug(m=>({...m,[i]:e.target.checked}))} className="mt-1 accent-brand"/>
                  <div><div className="font-medium text-navy text-sm">{s.nome}</div><div className="text-xs text-slate-500 mt-0.5">{s.descricao}</div></div>
                </label>))}</div>}
          </div>
          <div className="p-3 border-t border-slate-200 flex items-center justify-between bg-slate-50">
            <span className="text-xs text-slate-400">{Object.values(selSug).filter(Boolean).length} selecionado(s)</span>
            <div className="flex gap-2"><button onClick={()=>setSugOpen(false)} className="px-3 py-1.5 text-sm text-slate-500">Cancelar</button>
              <button onClick={adicionarSelecionados} disabled={sugerindo||!sugestoes.length} className="px-4 py-1.5 text-sm font-medium bg-brand hover:bg-navy text-white rounded-md disabled:opacity-50">Adicionar selecionados</button></div>
          </div>
        </div></div>}
    </main>
  );
}
function DepartamentoForm({dep,departamentos,onClose,onSave}){
  const novo=!!dep.novo;
  const [nome,setNome]=useState(novo?"":(dep.nome||""));
  const [superior,setSuperior]=useState(novo?"":(dep.superior||""));
  const ok=nome.trim();
  const inp="w-full text-sm border border-slate-300 rounded-md px-2.5 py-1.5 outline-none focus:ring-2 ring-brand/30";
  const opcoes=[...(departamentos||[])].map(d=>d.nome).filter(n=>n!==dep.nome).sort((a,b)=>a.localeCompare(b));
  return <div className="fixed inset-0 z-50 grid place-items-center bg-navy/40 p-4" onClick={onClose}>
    <div className="bg-white rounded-lg shadow-2xl w-full max-w-lg p-5" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between mb-3"><h2 className="text-lg font-bold text-navy">{novo?"Novo Departamento":"Editar Departamento"}</h2>
        <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl">✕</button></div>
      <L t="Nome *"><input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Ex: Comercial & Marketing" className={inp}/></L>
      <L t="Superior"><select value={superior} onChange={e=>setSuperior(e.target.value)} className={inp}><option value="">— Nenhum (topo do organograma)</option>{opcoes.map(n=><option key={n}>{n}</option>)}</select></L>
      <p className="text-[11px] text-slate-400 mt-1">O superior define a que departamento este se reporta — é o que monta o Organograma.</p>
      <div className="flex justify-end gap-2 mt-4"><button onClick={onClose} className="px-3 py-1.5 text-sm text-slate-500">Cancelar</button>
        <button disabled={!ok} onClick={()=>onSave({...dep,nome,superior},novo)} className={"px-4 py-1.5 text-sm font-medium rounded-md text-white "+(ok?"bg-brand hover:bg-navy":"bg-slate-300 cursor-not-allowed")}>{novo?"Criar Departamento":"Salvar"}</button></div>
    </div></div>;
}
